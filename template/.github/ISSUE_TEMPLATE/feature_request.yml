name: Feature Request
description: Suggest a new feature or enhancement
title: '[Feature]: '
labels: ['type: feature']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - app.web
        - service.api
        - lib.*
        - Infrastructure / Docker
        - CI/CD
        - Other
    validations:
      required: true
