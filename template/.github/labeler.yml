# Auto-label pull requests based on changed file paths.

'area: api':
  - changed-files:
      - any-glob-to-any-file: ['service.api/**']

'area: web':
  - changed-files:
      - any-glob-to-any-file: ['app.web/**']

'area: app':
  - changed-files:
      - any-glob-to-any-file: ['app.*/**']

'area: libs':
  - changed-files:
      - any-glob-to-any-file: ['lib.*/**']

'area: ci':
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

'area: config':
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'turbo.json'
          - 'tsconfig.json'
          - 'docker-compose*.yml'
          - 'Dockerfile*'
          - '.eslintrc*'
          - '.prettierrc*'

'area: docs':
  - changed-files:
      - any-glob-to-any-file: ['**/*.md']
