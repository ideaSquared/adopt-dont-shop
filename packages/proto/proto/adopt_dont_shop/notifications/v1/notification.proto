syntax = "proto3";

package adopt_dont_shop.notifications.v1;

// NotificationService is the gRPC contract for the in-app notification
// store. The gateway translates `POST/GET/DELETE /api/notifications/*`
// REST calls into these RPCs after extracting the principal
// (auth.userId, auth.roles, auth.permissions, auth.rescueId?) into
// gRPC metadata. The service uses @adopt-dont-shop/authz.requirePermission
// to gate each RPC; same shape every extracted service will follow.
//
// CAD parallel: this mirrors `cad.incident.v1.IncidentService` —
// command + query split, opaque cursor pagination, ISO-8601 timestamps
// as strings (proto's Timestamp adds a tonne of marshalling weight for
// little gain when downstream consumers are JSON anyway).
service NotificationService {
  // Create a new notification. Publishes `notifications.created` on
  // NATS after the DB commits (publish-after-commit pattern via
  // @adopt-dont-shop/events.withTransaction). Caller MUST have the
  // `notifications.create` permission (only system services + admins).
  rpc Create(CreateNotificationRequest) returns (CreateNotificationResponse);

  // List notifications for the calling principal with keyset pagination.
  // user_id scope is enforced via gRPC metadata, not the request body —
  // callers can only list their own notifications. super_admin bypasses
  // the scope check.
  rpc List(ListNotificationsRequest) returns (ListNotificationsResponse);

  // Mark a notification as dismissed (status -> read, read_at -> now).
  // Idempotent: a second Dismiss on the same notification_id returns
  // the same row without error. Publishes `notifications.dismissed`
  // on NATS after the DB commits.
  rpc Dismiss(DismissNotificationRequest) returns (DismissNotificationResponse);

  // Fetch a single notification by id. Ownership-scoped — adopters can
  // only read their own. Returns NOT_FOUND for non-existent OR for
  // notifications owned by another user (no enumeration).
  rpc GetNotification(GetNotificationRequest) returns (GetNotificationResponse);

  // Count unread (read_at IS NULL, not expired) for the calling
  // principal. Self-scoped — no target user_id field, the gateway
  // pins it to the principal.
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);

  // Mark every unread notification owned by the calling principal as
  // read. Returns the affected row count. Idempotent: a second call
  // returns affected_count = 0.
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse);

  // Soft-delete a notification (deleted_at stamped). Ownership-scoped.
  // Idempotent: a second Delete on the same notification_id returns
  // the already-deleted row without error.
  rpc DeleteNotification(DeleteNotificationRequest) returns (DeleteNotificationResponse);

  // --- User notification preferences (in-app channel control) ---------
  // Distinct from EmailPreferences above — these are the per-user
  // master switches for the email/push/sms channels plus per-category
  // toggles (application_updates, pet_matches, etc.). The
  // user_notification_prefs row is 1:1 with auth.users and is
  // auto-created on first read.

  rpc GetNotificationPreferences(GetNotificationPreferencesRequest)
      returns (GetNotificationPreferencesResponse);

  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest)
      returns (UpdateNotificationPreferencesResponse);

  // Destroy + recreate so the table-level defaults are the single
  // source of truth for "factory settings". Idempotent.
  rpc ResetNotificationPreferences(ResetNotificationPreferencesRequest)
      returns (ResetNotificationPreferencesResponse);

  // Admin-only: soft-delete notifications older than N days (default 30).
  // Returns the affected row count. Requires `notifications.cleanup`.
  // Operates on rows where `deleted_at IS NULL` so a re-run is a no-op
  // for already-cleaned rows.
  rpc CleanupExpiredNotifications(CleanupExpiredNotificationsRequest)
      returns (CleanupExpiredNotificationsResponse);

  // --- Email queue ----------------------------------------------------
  // Phase 7 round-out. The service owns the email_queue table; other
  // services (auth, applications, chat) call SendEmail to enqueue a
  // transactional message and a background worker drains the queue,
  // routing to the configured provider (console / ethereal / Resend).

  // Enqueue an email. Returns the email_id immediately; delivery happens
  // asynchronously in the worker. Callers can supply a templateId +
  // templateData OR a pre-rendered subject + html_content; if both are
  // present the template wins. `idempotency_key` is optional — when set
  // a duplicate Send with the same key returns the same email_id.
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);

  // --- Email preferences ----------------------------------------------
  // Per-user opt-in/opt-out for the email channel.

  // Read the calling principal's email preferences (or a target user's
  // when the caller has email-prefs:read:any). Returns the canonical
  // row, creating defaults on first read.
  rpc GetEmailPreferences(GetEmailPreferencesRequest) returns (GetEmailPreferencesResponse);

  // Partially update email preferences. Only provided fields are
  // touched — unset fields keep their current value.
  rpc UpdateEmailPreferences(UpdateEmailPreferencesRequest)
      returns (UpdateEmailPreferencesResponse);

  // --- Email template admin ------------------------------------------
  // Admin CRUD over the email_templates table the SendEmail render path
  // reads. Each RPC gates on the matching email.templates.* permission.

  rpc ListEmailTemplates(ListEmailTemplatesRequest) returns (ListEmailTemplatesResponse);
  rpc GetEmailTemplate(GetEmailTemplateRequest) returns (GetEmailTemplateResponse);
  rpc CreateEmailTemplate(CreateEmailTemplateRequest) returns (CreateEmailTemplateResponse);
  rpc UpdateEmailTemplate(UpdateEmailTemplateRequest) returns (UpdateEmailTemplateResponse);
  rpc DeleteEmailTemplate(DeleteEmailTemplateRequest) returns (DeleteEmailTemplateResponse);
  // Render a template with caller-supplied sample variables — returns the
  // resolved subject + html without queueing anything.
  rpc PreviewEmailTemplate(PreviewEmailTemplateRequest) returns (PreviewEmailTemplateResponse);

  // --- Push device tokens --------------------------------------------
  // Phase 7 round-out. Clients (mobile, browser PWAs) register their
  // FCM / APNs / web-push token with the notifications service; the
  // push worker consumes `notifications.created` events for push-
  // channel rows and dispatches via the configured provider.

  // Idempotent on (user_id, device_token): a second Register with the
  // same pair refreshes `last_used_at` and returns the existing row.
  rpc RegisterDeviceToken(RegisterDeviceTokenRequest)
      returns (RegisterDeviceTokenResponse);

  // Soft-delete by token_id. Called when the client logs out or the
  // user disables push. Idempotent: a second Unregister on the same
  // token_id returns the same row without error.
  rpc UnregisterDeviceToken(UnregisterDeviceTokenRequest)
      returns (UnregisterDeviceTokenResponse);

  // List active tokens for the calling principal. Self-scoped (admins
  // need device-tokens:list:any to read another user's tokens).
  rpc ListDeviceTokens(ListDeviceTokensRequest) returns (ListDeviceTokensResponse);

  // --- Broadcast ----------------------------------------------------

  // Fan a single in-app notification across a cohort of users. The
  // service resolves the cohort via AuthService.ListUserIdsByCohort
  // and creates one notification row per recipient, honouring each
  // user's in-app preference and DND window (skipping silently if
  // either says no). Returns aggregate counters so the admin UI can
  // confirm the reach. admin.notifications.broadcast.
  rpc Broadcast(BroadcastRequest) returns (BroadcastResponse);
}

// Notification mirrors the `notifications.notifications` row plus the
// JSON-stringified `data` / `template_variables` payloads. Kept as
// strings at the proto layer so the service doesn't have to enumerate
// every possible event-data shape — the gateway parses them back to
// JSON when translating to REST.
message Notification {
  string notification_id = 1;
  string user_id = 2;
  NotificationType type = 3;
  NotificationChannel channel = 4;
  NotificationPriority priority = 5;
  NotificationStatus status = 6;
  string title = 7;
  string message = 8;
  string data_json = 9;
  optional string template_id = 10;
  string template_variables_json = 11;
  optional NotificationRelatedEntityType related_entity_type = 12;
  optional string related_entity_id = 13;
  // RFC 3339 timestamps — `optional` markers mirror the table's
  // NULL columns. created_at / updated_at are never null.
  optional string scheduled_for = 14;
  optional string sent_at = 15;
  optional string delivered_at = 16;
  optional string read_at = 17;
  optional string clicked_at = 18;
  optional string expires_at = 19;
  uint32 retry_count = 20;
  uint32 max_retries = 21;
  optional string error_message = 22;
  optional string external_id = 23;
  string created_at = 24;
  string updated_at = 25;
}

// --- ENUMs — value lists mirror the Postgres types verbatim ----------
// Names use the standard proto3 SCREAMING_SNAKE_CASE convention with
// a type prefix; the handler maps to/from the Postgres value strings
// via a single switch statement on each side.

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_APPLICATION_STATUS = 1;
  NOTIFICATION_TYPE_MESSAGE_RECEIVED = 2;
  NOTIFICATION_TYPE_PET_AVAILABLE = 3;
  NOTIFICATION_TYPE_INTERVIEW_SCHEDULED = 4;
  NOTIFICATION_TYPE_HOME_VISIT_SCHEDULED = 5;
  NOTIFICATION_TYPE_ADOPTION_APPROVED = 6;
  NOTIFICATION_TYPE_ADOPTION_REJECTED = 7;
  NOTIFICATION_TYPE_REFERENCE_REQUEST = 8;
  NOTIFICATION_TYPE_SYSTEM_ANNOUNCEMENT = 9;
  NOTIFICATION_TYPE_ACCOUNT_SECURITY = 10;
  NOTIFICATION_TYPE_REMINDER = 11;
  NOTIFICATION_TYPE_MARKETING = 12;
  NOTIFICATION_TYPE_RESCUE_INVITATION = 13;
  NOTIFICATION_TYPE_STAFF_ASSIGNMENT = 14;
  NOTIFICATION_TYPE_PET_UPDATE = 15;
  NOTIFICATION_TYPE_FOLLOW_UP = 16;
}

enum NotificationChannel {
  NOTIFICATION_CHANNEL_UNSPECIFIED = 0;
  NOTIFICATION_CHANNEL_IN_APP = 1;
  NOTIFICATION_CHANNEL_EMAIL = 2;
  NOTIFICATION_CHANNEL_PUSH = 3;
  NOTIFICATION_CHANNEL_SMS = 4;
}

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_PRIORITY_LOW = 1;
  NOTIFICATION_PRIORITY_NORMAL = 2;
  NOTIFICATION_PRIORITY_HIGH = 3;
  NOTIFICATION_PRIORITY_URGENT = 4;
}

enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  NOTIFICATION_STATUS_PENDING = 1;
  NOTIFICATION_STATUS_SENT = 2;
  NOTIFICATION_STATUS_DELIVERED = 3;
  NOTIFICATION_STATUS_READ = 4;
  NOTIFICATION_STATUS_FAILED = 5;
  NOTIFICATION_STATUS_CANCELLED = 6;
}

enum NotificationRelatedEntityType {
  NOTIFICATION_RELATED_ENTITY_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_RELATED_ENTITY_TYPE_APPLICATION = 1;
  NOTIFICATION_RELATED_ENTITY_TYPE_PET = 2;
  NOTIFICATION_RELATED_ENTITY_TYPE_MESSAGE = 3;
  NOTIFICATION_RELATED_ENTITY_TYPE_USER = 4;
  NOTIFICATION_RELATED_ENTITY_TYPE_RESCUE = 5;
  NOTIFICATION_RELATED_ENTITY_TYPE_CONVERSATION = 6;
  NOTIFICATION_RELATED_ENTITY_TYPE_INTERVIEW = 7;
  NOTIFICATION_RELATED_ENTITY_TYPE_HOME_VISIT = 8;
  NOTIFICATION_RELATED_ENTITY_TYPE_REMINDER = 9;
  NOTIFICATION_RELATED_ENTITY_TYPE_ANNOUNCEMENT = 10;
  NOTIFICATION_RELATED_ENTITY_TYPE_ADOPTION = 11;
  NOTIFICATION_RELATED_ENTITY_TYPE_EVENT = 12;
  NOTIFICATION_RELATED_ENTITY_TYPE_REFERENCE = 13;
  NOTIFICATION_RELATED_ENTITY_TYPE_SECURITY = 14;
}

// --- Create -----------------------------------------------------------

message CreateNotificationRequest {
  // Target user — the principal calling Create is typically a service
  // (notifications.create permission), not the recipient.
  string user_id = 1;
  NotificationType type = 2;
  NotificationChannel channel = 3;
  // Defaults to NOTIFICATION_PRIORITY_NORMAL when UNSPECIFIED.
  NotificationPriority priority = 4;
  string title = 5;
  string message = 6;
  // JSON-stringified opaque payload. Empty string == `{}`.
  string data_json = 7;
  optional string template_id = 8;
  string template_variables_json = 9;
  optional NotificationRelatedEntityType related_entity_type = 10;
  optional string related_entity_id = 11;
  optional string scheduled_for = 12;
  optional string expires_at = 13;
  // External tracking id (e.g. SendGrid message id). Optional at create
  // time; the email/SMS workers stamp it later when they ship the message.
  optional string external_id = 14;
}

message CreateNotificationResponse {
  Notification notification = 1;
}

// --- List -------------------------------------------------------------

message ListNotificationsRequest {
  // Opaque base64-JSON keyset cursor — same shape CAD uses for the
  // audit query. Callers pass the previous response's next_cursor
  // back here; the format is the service's private concern.
  optional string cursor = 1;
  // Defaults to 20, max 100 — server enforces the bound, returns
  // INVALID_ARGUMENT on overflow.
  uint32 limit = 2;
  // Optional filters. UNSPECIFIED in the enum = "no filter on this
  // field" — same convention every notification ENUM in this file uses.
  NotificationStatus status_filter = 3;
  NotificationChannel channel_filter = 4;
  NotificationType type_filter = 5;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  // Absent when the result set is exhausted. Same string a future
  // ListNotificationsRequest.cursor would carry.
  optional string next_cursor = 2;
}

// --- Dismiss ----------------------------------------------------------

message DismissNotificationRequest {
  string notification_id = 1;
}

message DismissNotificationResponse {
  // The updated row (status=READ, read_at=now). Idempotent: a second
  // Dismiss on the same notification_id returns the same payload.
  Notification notification = 1;
}

// --- Email queue ENUMs ------------------------------------------------

enum EmailType {
  EMAIL_TYPE_UNSPECIFIED = 0;
  EMAIL_TYPE_TRANSACTIONAL = 1;
  EMAIL_TYPE_NOTIFICATION = 2;
  EMAIL_TYPE_MARKETING = 3;
  EMAIL_TYPE_SYSTEM = 4;
}

enum EmailPriority {
  EMAIL_PRIORITY_UNSPECIFIED = 0;
  EMAIL_PRIORITY_LOW = 1;
  EMAIL_PRIORITY_NORMAL = 2;
  EMAIL_PRIORITY_HIGH = 3;
  EMAIL_PRIORITY_URGENT = 4;
}

enum EmailStatus {
  EMAIL_STATUS_UNSPECIFIED = 0;
  EMAIL_STATUS_QUEUED = 1;
  EMAIL_STATUS_SENDING = 2;
  EMAIL_STATUS_SENT = 3;
  EMAIL_STATUS_DELIVERED = 4;
  EMAIL_STATUS_OPENED = 5;
  EMAIL_STATUS_CLICKED = 6;
  EMAIL_STATUS_FAILED = 7;
  EMAIL_STATUS_BOUNCED = 8;
  EMAIL_STATUS_UNSUBSCRIBED = 9;
}

enum EmailDigestFrequency {
  EMAIL_DIGEST_FREQUENCY_UNSPECIFIED = 0;
  EMAIL_DIGEST_FREQUENCY_IMMEDIATE = 1;
  EMAIL_DIGEST_FREQUENCY_DAILY = 2;
  EMAIL_DIGEST_FREQUENCY_WEEKLY = 3;
  EMAIL_DIGEST_FREQUENCY_MONTHLY = 4;
  EMAIL_DIGEST_FREQUENCY_NEVER = 5;
}

enum EmailFormat {
  EMAIL_FORMAT_UNSPECIFIED = 0;
  EMAIL_FORMAT_HTML = 1;
  EMAIL_FORMAT_TEXT = 2;
  EMAIL_FORMAT_BOTH = 3;
}

// --- SendEmail --------------------------------------------------------

message SendEmailRequest {
  // Recipient. Required.
  string to_email = 1;
  optional string to_name = 2;

  // Sender override (defaults to the service's configured From).
  optional string from_email = 3;
  optional string from_name = 4;
  optional string reply_to_email = 5;

  // CC / BCC. Empty when omitted.
  repeated string cc_emails = 6;
  repeated string bcc_emails = 7;

  // Either supply (subject + html_content) OR (template_id + template_data_json).
  // When both arrive, template wins and the inline subject/content are ignored.
  optional string subject = 8;
  optional string html_content = 9;
  optional string text_content = 10;
  optional string template_id = 11;
  // JSON-stringified payload for template variable substitution.
  // Empty string == `{}`.
  string template_data_json = 12;

  EmailType type = 13;
  EmailPriority priority = 14;

  // Schedule for a future delivery. Absent = send as soon as the worker
  // picks it up.
  optional string scheduled_for = 15;

  // Free-form metadata + tags for the row. JSON-stringified; empty string == `{}`.
  string metadata_json = 16;
  repeated string tags = 17;

  // Tie the row to a user (for prefs enforcement + audit). Optional.
  optional string user_id = 18;
  optional string campaign_id = 19;

  // Opt-in idempotency. When set, a duplicate SendEmail with the same
  // key returns the same email_id without enqueueing a second row.
  optional string idempotency_key = 20;
}

message SendEmailResponse {
  // The row's emailId. Caller can poll the queue table for status; the
  // worker publishes status changes on `notifications.email.*` topics.
  string email_id = 1;
  // True when the row was already present (idempotency_key collision).
  bool already_queued = 2;
}

// --- EmailPreferences -------------------------------------------------

message EmailPreferences {
  string preference_id = 1;
  string user_id = 2;
  bool is_email_enabled = 3;
  bool global_unsubscribe = 4;
  // JSON-stringified array of per-category opt-in/out rows. Shape:
  // [{type, enabled, frequency?}, ...]. Empty string == `[]`.
  string preferences_json = 5;
  string language = 6;
  string timezone = 7;
  EmailFormat email_format = 8;
  EmailDigestFrequency digest_frequency = 9;
  // HH:MM 24h.
  string digest_time = 10;
  string unsubscribe_token = 11;
  optional string last_digest_sent = 12;
  uint32 bounce_count = 13;
  optional string last_bounce_at = 14;
  bool is_blacklisted = 15;
  optional string blacklist_reason = 16;
  optional string blacklisted_at = 17;
  string metadata_json = 18;
  string created_at = 19;
  string updated_at = 20;
}

message GetEmailPreferencesRequest {
  // Optional target. Defaults to the calling principal. Callers without
  // `email-prefs:read:any` may only read their own row.
  optional string user_id = 1;
}

message GetEmailPreferencesResponse {
  EmailPreferences preferences = 1;
}

message UpdateEmailPreferencesRequest {
  optional string user_id = 1;

  // All fields optional — only present fields are written.
  optional bool is_email_enabled = 2;
  optional bool global_unsubscribe = 3;
  optional string preferences_json = 4;
  optional string language = 5;
  optional string timezone = 6;
  EmailFormat email_format = 7;
  EmailDigestFrequency digest_frequency = 8;
  optional string digest_time = 9;
}

message UpdateEmailPreferencesResponse {
  EmailPreferences preferences = 1;
}

// --- Device token ENUMs ----------------------------------------------

enum DevicePlatform {
  DEVICE_PLATFORM_UNSPECIFIED = 0;
  DEVICE_PLATFORM_IOS = 1;
  DEVICE_PLATFORM_ANDROID = 2;
  DEVICE_PLATFORM_WEB = 3;
}

enum DeviceTokenStatus {
  DEVICE_TOKEN_STATUS_UNSPECIFIED = 0;
  DEVICE_TOKEN_STATUS_ACTIVE = 1;
  DEVICE_TOKEN_STATUS_INACTIVE = 2;
  DEVICE_TOKEN_STATUS_EXPIRED = 3;
  DEVICE_TOKEN_STATUS_INVALID = 4;
}

// --- DeviceToken row -------------------------------------------------

message DeviceToken {
  string token_id = 1;
  string user_id = 2;
  string device_token = 3;
  DevicePlatform platform = 4;
  optional string app_version = 5;
  // JSON-stringified jsonb payload. Empty string == `{}`.
  string device_info_json = 6;
  DeviceTokenStatus status = 7;
  optional string last_used_at = 8;
  optional string expires_at = 9;
  string created_at = 10;
  string updated_at = 11;
}

// --- RegisterDeviceToken ---------------------------------------------

message RegisterDeviceTokenRequest {
  // Target user — optional. Defaults to the calling principal when
  // omitted; cross-user registration requires device-tokens:write:any.
  optional string user_id = 1;
  string device_token = 2;
  DevicePlatform platform = 3;
  optional string app_version = 4;
  // Optional jsonb metadata (model, OS version, app build, etc.).
  // Empty string == `{}`.
  string device_info_json = 5;
}

message RegisterDeviceTokenResponse {
  DeviceToken token = 1;
  // True when the (user_id, device_token) pair was already present
  // and the call just refreshed last_used_at.
  bool already_registered = 2;
}

// --- UnregisterDeviceToken -------------------------------------------

message UnregisterDeviceTokenRequest {
  string token_id = 1;
}

message UnregisterDeviceTokenResponse {
  // The soft-deleted row (deleted_at stamped, status='inactive').
  // Idempotent.
  DeviceToken token = 1;
}

// --- ListDeviceTokens ------------------------------------------------

message ListDeviceTokensRequest {
  // Optional target. Defaults to the calling principal. Callers without
  // device-tokens:list:any may only list their own tokens.
  optional string user_id = 1;
  // When true, include soft-deleted (deleted_at IS NOT NULL) rows.
  // Default false.
  bool include_inactive = 2;
}

message ListDeviceTokensResponse {
  repeated DeviceToken tokens = 1;
}

// --- GetNotification --------------------------------------------------

message GetNotificationRequest {
  string notification_id = 1;
}

message GetNotificationResponse {
  Notification notification = 1;
}

// --- GetUnreadCount ---------------------------------------------------

message GetUnreadCountRequest {}

message GetUnreadCountResponse {
  uint32 count = 1;
}

// --- MarkAllRead ------------------------------------------------------

message MarkAllReadRequest {}

message MarkAllReadResponse {
  uint32 affected_count = 1;
}

// --- DeleteNotification ----------------------------------------------

message DeleteNotificationRequest {
  string notification_id = 1;
}

message DeleteNotificationResponse {
  Notification notification = 1;
}

// --- Notification preferences (in-app channel control) --------------

enum NotificationDigestFrequency {
  NOTIFICATION_DIGEST_FREQUENCY_UNSPECIFIED = 0;
  NOTIFICATION_DIGEST_FREQUENCY_IMMEDIATE = 1;
  NOTIFICATION_DIGEST_FREQUENCY_DAILY = 2;
  NOTIFICATION_DIGEST_FREQUENCY_WEEKLY = 3;
  NOTIFICATION_DIGEST_FREQUENCY_NEVER = 4;
}

// NotificationPreferences mirrors user_notification_prefs verbatim.
// Quiet-hours columns are nullable; empty string == NULL.
message NotificationPreferences {
  string user_id = 1;
  bool email_enabled = 2;
  bool push_enabled = 3;
  bool sms_enabled = 4;
  NotificationDigestFrequency digest_frequency = 5;
  bool application_updates = 6;
  bool pet_matches = 7;
  bool rescue_updates = 8;
  bool chat_messages = 9;
  // HH:MM strings; absent when NULL.
  optional string quiet_hours_start = 10;
  optional string quiet_hours_end = 11;
  string timezone = 12;
  string created_at = 13;
  string updated_at = 14;
}

message GetNotificationPreferencesRequest {
  // Optional target. Defaults to the calling principal. Callers
  // without `notification-prefs:read:any` may only read their own row.
  optional string user_id = 1;
}

message GetNotificationPreferencesResponse {
  NotificationPreferences preferences = 1;
}

message UpdateNotificationPreferencesRequest {
  optional string user_id = 1;

  // Scalar booleans don't carry proto3 presence by default, so each is
  // optional + paired with the `set_<field>` companion flag below. The
  // handler only writes a column when its set_ flag is true. This
  // mirrors the partial-update shape used by Phase 1.5 device tokens
  // and the matching-profile upsert (PR #965).
  optional bool email_enabled = 2;
  optional bool push_enabled = 3;
  optional bool sms_enabled = 4;
  NotificationDigestFrequency digest_frequency = 5;
  optional bool application_updates = 6;
  optional bool pet_matches = 7;
  optional bool rescue_updates = 8;
  optional bool chat_messages = 9;
  // Empty string clears the column (NULL). Absent leaves it untouched —
  // distinguished via the set_ flag.
  optional string quiet_hours_start = 10;
  optional string quiet_hours_end = 11;
  optional string timezone = 12;
}

message UpdateNotificationPreferencesResponse {
  NotificationPreferences preferences = 1;
}

message ResetNotificationPreferencesRequest {
  optional string user_id = 1;
}

message ResetNotificationPreferencesResponse {
  NotificationPreferences preferences = 1;
}

// --- CleanupExpiredNotifications ------------------------------------

message CleanupExpiredNotificationsRequest {
  // Number of days of history to keep — anything older gets soft-
  // deleted. Server enforces 1..3650 (10 years). Defaults to 30 when
  // unset (treated as 0 here → DEFAULT).
  uint32 days_to_keep = 1;
}

message CleanupExpiredNotificationsResponse {
  // Number of rows that transitioned from kept → soft-deleted.
  uint32 deleted_count = 1;
}

// --- Email template admin --------------------------------------------

enum EmailTemplateType {
  EMAIL_TEMPLATE_TYPE_UNSPECIFIED = 0;
  EMAIL_TEMPLATE_TYPE_TRANSACTIONAL = 1;
  EMAIL_TEMPLATE_TYPE_NOTIFICATION = 2;
  EMAIL_TEMPLATE_TYPE_MARKETING = 3;
  EMAIL_TEMPLATE_TYPE_SYSTEM = 4;
  EMAIL_TEMPLATE_TYPE_ADMINISTRATIVE = 5;
}

enum EmailTemplateStatus {
  EMAIL_TEMPLATE_STATUS_UNSPECIFIED = 0;
  EMAIL_TEMPLATE_STATUS_DRAFT = 1;
  EMAIL_TEMPLATE_STATUS_ACTIVE = 2;
  EMAIL_TEMPLATE_STATUS_INACTIVE = 3;
  EMAIL_TEMPLATE_STATUS_ARCHIVED = 4;
}

// EmailTemplate mirrors the authoring-relevant columns of
// email_templates. Category is kept as a raw string (the Postgres enum
// has 12 values that evolve per-feature; a string avoids a proto rebuild
// each time one is added).
message EmailTemplate {
  string template_id = 1;
  string name = 2;
  optional string description = 3;
  EmailTemplateType type = 4;
  string category = 5;
  EmailTemplateStatus status = 6;
  string subject = 7;
  string html_content = 8;
  optional string text_content = 9;
  // JSON-stringified array of declared variables. Empty string == [].
  string variables_json = 10;
  string locale = 11;
  uint32 usage_count = 12;
  optional string last_used_at = 13;
  string created_at = 14;
  string updated_at = 15;
}

message ListEmailTemplatesRequest {
  // Optional filters. UNSPECIFIED = no filter on that field.
  EmailTemplateType type_filter = 1;
  EmailTemplateStatus status_filter = 2;
  optional string category_filter = 3;
  optional string search = 4;
  uint32 page = 5;
  uint32 limit = 6;
}

message ListEmailTemplatesResponse {
  repeated EmailTemplate templates = 1;
  uint32 total = 2;
  uint32 page = 3;
  uint32 total_pages = 4;
}

message GetEmailTemplateRequest {
  string template_id = 1;
}

message GetEmailTemplateResponse {
  EmailTemplate template = 1;
}

message CreateEmailTemplateRequest {
  string name = 1;
  optional string description = 2;
  EmailTemplateType type = 3;
  string category = 4;
  EmailTemplateStatus status = 5;
  string subject = 6;
  string html_content = 7;
  optional string text_content = 8;
  string variables_json = 9;
  optional string locale = 10;
}

message CreateEmailTemplateResponse {
  EmailTemplate template = 1;
}

message UpdateEmailTemplateRequest {
  string template_id = 1;
  // Only set fields are written.
  optional string name = 2;
  optional string description = 3;
  EmailTemplateType type = 4;
  optional string category = 5;
  EmailTemplateStatus status = 6;
  optional string subject = 7;
  optional string html_content = 8;
  optional string text_content = 9;
  optional string variables_json = 10;
}

message UpdateEmailTemplateResponse {
  EmailTemplate template = 1;
}

message DeleteEmailTemplateRequest {
  string template_id = 1;
}

message DeleteEmailTemplateResponse {
  bool deleted = 1;
}

message PreviewEmailTemplateRequest {
  string template_id = 1;
  // JSON-stringified variable map for substitution. Empty string == {}.
  string variables_json = 2;
}

message PreviewEmailTemplateResponse {
  string subject = 1;
  string html_content = 2;
  optional string text_content = 3;
}

// --- Broadcast --------------------------------------------------------

// Recipient cohort. Reuses the auth-side filter shape so the admin UI
// builds a single payload that flows through Broadcast → auth.
message BroadcastCohort {
  // String form of auth.UserRole (admin / adopter / rescue_staff / ...).
  // Empty means any.
  repeated string user_types = 1;
  // String form of auth.UserStatus. Empty means active-only (the safe
  // broadcast default).
  repeated string statuses = 2;
  optional bool email_verified = 3;
}

message BroadcastRequest {
  // The cohort that should receive the notification.
  BroadcastCohort cohort = 1;
  // Type tag — drives the per-user channel toggle on the prefs check
  // (e.g. NOTIFICATION_TYPE_ANNOUNCEMENT is admin-broadcast). Defaults
  // to NOTIFICATION_TYPE_ANNOUNCEMENT when omitted.
  NotificationType type = 2;
  string title = 3;
  string message = 4;
  // Per-notification action URL embedded into the row.
  optional string action_url = 5;
  // Free-form JSON-encoded blob the SPA may render alongside the
  // message.
  optional string data_json = 6;
  // Defer delivery to a future timestamp (server stores; worker fires
  // when due). Empty = send immediately.
  optional string scheduled_for = 7;
}

message BroadcastResponse {
  // Number of users the cohort lookup returned.
  uint32 targeted = 1;
  // Number actually written to the notifications table (after prefs +
  // DND filtering).
  uint32 delivered = 2;
  // Suppressed by per-user channel preference or DND window.
  uint32 suppressed = 3;
  // Failed inserts (unexpected DB errors); the loop continues so a
  // single bad row doesn't poison the batch.
  uint32 failed = 4;
}
