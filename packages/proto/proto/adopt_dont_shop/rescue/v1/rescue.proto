syntax = "proto3";

package adopt_dont_shop.rescue.v1;

// RescueService is the gRPC contract for the rescue vertical. It owns
// the `rescue.*` schema (Rescue, RescueSettings, StaffMember, Invitation,
// FosterPlacement, ApplicationQuestion) and exposes classical CRUD plus
// a few status transitions (verify, invite-staff, accept-invitation).
//
// Classical service (no event sourcing) — but still uses
// publish-after-commit on NATS for the cross-vertical events
// downstream services consume.
//
// Convention (matches the other extracted services): ISO-8601
// timestamps as strings, opaque base64-JSON keyset cursors, enums
// mirroring the Postgres ENUM types verbatim, JSON-stringified blobs
// for the open-ended fields (settings) so the proto doesn't have to
// enumerate every nested key.
service RescueService {
  // Create a new rescue organisation. Caller MUST have `rescues.create`
  // (typically admin or self-registration via the verify flow).
  // Publishes `rescue.created` on NATS after commit.
  rpc Create(CreateRescueRequest) returns (CreateRescueResponse);

  // Fetch a single rescue by id. NOT_FOUND when missing or
  // soft-deleted. Public-ish — adopters need to render rescue details
  // on a pet's listing page.
  rpc Get(GetRescueRequest) returns (GetRescueResponse);

  // List rescues with keyset pagination + optional status filter.
  // No rescue-scope on this — the public list returns verified rescues
  // by default; admins can filter on the other statuses.
  rpc List(ListRescuesRequest) returns (ListRescuesResponse);

  // Update mutable rescue fields. Does NOT change verification status
  // — that's Verify's job. Caller MUST have `rescues.update` scoped to
  // the rescue. Publishes `rescue.updated` on NATS after commit.
  rpc Update(UpdateRescueRequest) returns (UpdateRescueResponse);

  // Mark a rescue as verified (or transition to rejected/suspended).
  // Caller MUST have `admin.security.manage` (admin-only).
  // Publishes `rescue.verified` (or `rescue.rejected` etc.) on NATS
  // after commit.
  rpc Verify(VerifyRescueRequest) returns (VerifyRescueResponse);

  // Mint a staff-invitation token + persist the row. Caller MUST have
  // `staff.create` scoped to the rescue. Publishes
  // `rescue.staffInvited` on NATS — the notifications service emails
  // the invitee.
  rpc InviteStaff(InviteStaffRequest) returns (InviteStaffResponse);

  // --- Staff -----------------------------------------------------------

  // Return the calling principal's staff-member record (their rescue
  // membership). NOT_FOUND when the user is not staff at any rescue.
  // Self-scoped — no user_id field.
  rpc GetMyStaffMembership(GetMyStaffMembershipRequest)
      returns (GetMyStaffMembershipResponse);

  // List all staff members at a rescue. Caller MUST be a verified staff
  // member of that rescue (or admin). Used by the staff "colleagues"
  // view.
  rpc ListStaffMembers(ListStaffMembersRequest) returns (ListStaffMembersResponse);

  // --- Foster placements ----------------------------------------------

  // Create a foster placement. Caller MUST have `foster.create` scoped
  // to the rescue. Publishes `rescue.fosterPlacementCreated`.
  rpc CreateFosterPlacement(CreateFosterPlacementRequest)
      returns (CreateFosterPlacementResponse);

  // List foster placements with optional filters (rescue, foster user,
  // status). Caller MUST have `foster.read` for the rescue.
  rpc ListFosterPlacements(ListFosterPlacementsRequest)
      returns (ListFosterPlacementsResponse);

  // Fetch a single foster placement by id.
  rpc GetFosterPlacement(GetFosterPlacementRequest)
      returns (GetFosterPlacementResponse);

  // End an active placement (return-to-rescue / adopted-by-foster /
  // cancelled). Idempotent on already-ended placements. Publishes
  // `rescue.fosterPlacementEnded`.
  rpc EndFosterPlacement(EndFosterPlacementRequest)
      returns (EndFosterPlacementResponse);

  // --- Invitations -----------------------------------------------------

  // Read an invitation's public details by token (for the accept page).
  // Returns the email + rescue + expiry so the SPA can render the
  // accept form. NOT_FOUND when the token is unknown, expired, or used.
  // Public — no principal required (the token IS the credential).
  rpc GetInvitationByToken(GetInvitationByTokenRequest)
      returns (GetInvitationByTokenResponse);

  // Consume a pending invitation: mark it used + attach the given user
  // as a staff member of the invited rescue. The gateway calls this
  // AFTER provisioning the auth user (the token-bearer's account), so it
  // supplies the resolved user_id. Validates the token again (unused +
  // unexpired) inside the transaction. Idempotent: re-accepting an
  // already-consumed invitation for the same user returns the existing
  // membership rather than erroring. NOT_FOUND when the token is unknown
  // or expired; FAILED_PRECONDITION when it was already used by a
  // DIFFERENT user. Public — the token IS the credential.
  rpc AcceptInvitation(AcceptInvitationRequest)
      returns (AcceptInvitationResponse);

  // --- Application questions -------------------------------------------

  // List a rescue's adoption-application questions: the shared `core`
  // baseline plus the rescue's own `rescue_specific` rows. Caller MUST
  // have `applications.read` scoped to the rescue.
  rpc ListApplicationQuestions(ListApplicationQuestionsRequest)
      returns (ListApplicationQuestionsResponse);

  // Create a rescue-specific custom question. Caller MUST have
  // `applications.update` scoped to the rescue. Publishes
  // `rescue.applicationQuestionCreated`.
  rpc CreateApplicationQuestion(CreateApplicationQuestionRequest)
      returns (CreateApplicationQuestionResponse);

  // Soft-delete a rescue-specific question. Caller MUST have
  // `applications.update` scoped to the question's rescue. Core
  // questions cannot be deleted (FAILED_PRECONDITION).
  rpc DeleteApplicationQuestion(DeleteApplicationQuestionRequest)
      returns (DeleteApplicationQuestionResponse);
}

// --- ENUMs — value lists mirror the Postgres types verbatim ----------

enum RescueStatus {
  RESCUE_STATUS_UNSPECIFIED = 0;
  RESCUE_STATUS_PENDING = 1;
  RESCUE_STATUS_VERIFIED = 2;
  RESCUE_STATUS_SUSPENDED = 3;
  RESCUE_STATUS_INACTIVE = 4;
  RESCUE_STATUS_REJECTED = 5;
}

enum RescueVerificationSource {
  RESCUE_VERIFICATION_SOURCE_UNSPECIFIED = 0;
  RESCUE_VERIFICATION_SOURCE_COMPANIES_HOUSE = 1;
  RESCUE_VERIFICATION_SOURCE_CHARITY_COMMISSION = 2;
  RESCUE_VERIFICATION_SOURCE_MANUAL = 3;
}

// --- Rescue — denormalised listing row -------------------------------
//
// Carries the columns the SPA + admin app render today: identity,
// address, status / verification, contact, the registration numbers.
// Settings rides as a JSON-stringified blob so the proto doesn't have
// to enumerate every nested key.
message Rescue {
  string rescue_id = 1;
  string name = 2;
  string email = 3;
  optional string phone = 4;
  string address = 5;
  string city = 6;
  // Model attribute `county` maps to the legacy column `state` (matches
  // the monolith's getter/setter pair).
  optional string county = 7;
  string postcode = 8;
  string country = 9;
  optional string website = 10;
  optional string description = 11;
  optional string mission = 12;
  optional string companies_house_number = 13;
  optional string charity_registration_number = 14;
  string contact_person = 15;
  optional string contact_title = 16;
  optional string contact_email = 17;
  optional string contact_phone = 18;
  RescueStatus status = 19;
  optional string verified_at = 20;
  optional string verified_by = 21;
  optional RescueVerificationSource verification_source = 22;
  optional string verification_failure_reason = 23;
  // JSON-stringified blob (the rescue_settings 1:1 row merged in OR the
  // free-form jsonb settings on the row — depends on whether the
  // typed-settings table is loaded). Empty string == `{}`.
  string settings_json = 24;
  string created_at = 25;
  string updated_at = 26;
}

// Invitation mirrors the rescue.invitations row — the pending-staff
// invitation surfaced to the inviter for revocation / resend.
message Invitation {
  string invitation_id = 1;
  string email = 2;
  string rescue_id = 3;
  optional string user_id = 4;
  optional string title = 5;
  optional string invited_by = 6;
  string expiration = 7;
  bool used = 8;
  string created_at = 9;
}

// --- Create ----------------------------------------------------------

message CreateRescueRequest {
  string name = 1;
  string email = 2;
  optional string phone = 3;
  string address = 4;
  string city = 5;
  optional string county = 6;
  string postcode = 7;
  // Defaults to 'GB' if omitted/empty.
  optional string country = 8;
  optional string website = 9;
  optional string description = 10;
  optional string mission = 11;
  optional string companies_house_number = 12;
  optional string charity_registration_number = 13;
  string contact_person = 14;
  optional string contact_title = 15;
  optional string contact_email = 16;
  optional string contact_phone = 17;
}

message CreateRescueResponse {
  Rescue rescue = 1;
}

// --- Get --------------------------------------------------------------

message GetRescueRequest {
  string rescue_id = 1;
}

message GetRescueResponse {
  Rescue rescue = 1;
}

// --- List -------------------------------------------------------------

message ListRescuesRequest {
  optional string cursor = 1;
  // Defaults to 20, max 100.
  uint32 limit = 2;
  // Optional status filter. UNSPECIFIED = "verified only" (the public
  // default). Admins can pass any other status to scope.
  RescueStatus status_filter = 3;
  // Free-text search on rescue name (ILIKE). Empty/unset = no filter.
  optional string name_search = 4;
  // When set, results are ordered randomly instead of by created_at DESC.
  // Powers the "featured rescues" surface.
  optional bool randomize = 5;
  // Geo filters — when all three are set we approximate "nearby" using
  // the legacy location columns. Distance math is best-effort (no PostGIS
  // required); a future revision can switch to earth_distance / GIST.
  optional double latitude = 6;
  optional double longitude = 7;
  optional double radius_km = 8;
}

message ListRescuesResponse {
  repeated Rescue rescues = 1;
  optional string next_cursor = 2;
}

// --- Update -----------------------------------------------------------

message UpdateRescueRequest {
  string rescue_id = 1;
  // All optional — only the supplied fields are written.
  optional string name = 2;
  optional string phone = 3;
  optional string address = 4;
  optional string city = 5;
  optional string county = 6;
  optional string postcode = 7;
  optional string country = 8;
  optional string website = 9;
  optional string description = 10;
  optional string mission = 11;
  optional string contact_person = 12;
  optional string contact_title = 13;
  optional string contact_email = 14;
  optional string contact_phone = 15;
  // Replaces the settings JSON blob wholesale when present.
  optional string settings_json = 16;
}

message UpdateRescueResponse {
  Rescue rescue = 1;
}

// --- Verify -----------------------------------------------------------

message VerifyRescueRequest {
  string rescue_id = 1;
  // The target status — typically VERIFIED, but REJECTED + SUSPENDED
  // pass through here too so the admin app drives the lifecycle from
  // one RPC. Rejected by the service when the transition is illegal.
  RescueStatus to_status = 2;
  // For VERIFIED transitions: how the rescue was verified.
  optional RescueVerificationSource verification_source = 3;
  // For REJECTED: optional rejection reason persisted to the row.
  optional string failure_reason = 4;
}

message VerifyRescueResponse {
  Rescue rescue = 1;
}

// --- InviteStaff ------------------------------------------------------

message InviteStaffRequest {
  string rescue_id = 1;
  string email = 2;
  optional string title = 3;
  // Optional TTL override; defaults to 7 days when omitted.
  optional uint32 expires_in_seconds = 4;
}

message InviteStaffResponse {
  Invitation invitation = 1;
  // Plain-text invitation token returned ONCE at creation time so the
  // caller can dispatch the email. NOT readable through Get/List
  // afterwards.
  string token = 2;
}

// --- StaffMember ------------------------------------------------------

// StaffMember mirrors the rescue.staff_members row. The user's name /
// email aren't stored here (they live in auth.users) — the gateway
// joins them in when the SPA needs the colleague list with names, or
// the SPA fetches them separately. This message carries only the
// rescue-owned columns.
message StaffMember {
  string staff_member_id = 1;
  string user_id = 2;
  string rescue_id = 3;
  optional string title = 4;
  bool is_verified = 5;
  optional string verified_by = 6;
  optional string verified_at = 7;
  string added_by = 8;
  string added_at = 9;
  string created_at = 10;
  string updated_at = 11;
}

message GetMyStaffMembershipRequest {}

message GetMyStaffMembershipResponse {
  StaffMember staff_member = 1;
}

message ListStaffMembersRequest {
  // Rescue to list staff for. When empty, the service resolves the
  // caller's own rescue from their staff membership (the "colleagues"
  // case).
  optional string rescue_id = 1;
}

message ListStaffMembersResponse {
  repeated StaffMember staff_members = 1;
}

// --- FosterPlacement --------------------------------------------------

enum FosterPlacementStatus {
  FOSTER_PLACEMENT_STATUS_UNSPECIFIED = 0;
  FOSTER_PLACEMENT_STATUS_ACTIVE = 1;
  FOSTER_PLACEMENT_STATUS_COMPLETED = 2;
  FOSTER_PLACEMENT_STATUS_CANCELLED = 3;
}

message FosterPlacement {
  string placement_id = 1;
  string rescue_id = 2;
  string pet_id = 3;
  string foster_user_id = 4;
  string start_date = 5;
  optional string end_date = 6;
  FosterPlacementStatus status = 7;
  optional string notes = 8;
  string created_at = 9;
  string updated_at = 10;
}

message CreateFosterPlacementRequest {
  string rescue_id = 1;
  string pet_id = 2;
  string foster_user_id = 3;
  string start_date = 4;
  optional string notes = 5;
}

message CreateFosterPlacementResponse {
  FosterPlacement placement = 1;
}

message ListFosterPlacementsRequest {
  optional string rescue_id = 1;
  optional string foster_user_id = 2;
  // UNSPECIFIED = no status filter.
  FosterPlacementStatus status_filter = 3;
}

message ListFosterPlacementsResponse {
  repeated FosterPlacement placements = 1;
}

message GetFosterPlacementRequest {
  string placement_id = 1;
}

message GetFosterPlacementResponse {
  FosterPlacement placement = 1;
}

// Outcome maps onto the terminal status: return_to_rescue / cancelled
// → CANCELLED-or-COMPLETED per the monolith's semantics; adopted_by_
// foster → COMPLETED.
enum FosterEndOutcome {
  FOSTER_END_OUTCOME_UNSPECIFIED = 0;
  FOSTER_END_OUTCOME_RETURN_TO_RESCUE = 1;
  FOSTER_END_OUTCOME_ADOPTED_BY_FOSTER = 2;
  FOSTER_END_OUTCOME_CANCELLED = 3;
}

message EndFosterPlacementRequest {
  string placement_id = 1;
  FosterEndOutcome outcome = 2;
  optional string end_date = 3;
  optional string notes = 4;
}

message EndFosterPlacementResponse {
  FosterPlacement placement = 1;
}

// --- GetInvitationByToken --------------------------------------------

message GetInvitationByTokenRequest {
  string token = 1;
}

message GetInvitationByTokenResponse {
  Invitation invitation = 1;
}

// --- AcceptInvitation -------------------------------------------------

message AcceptInvitationRequest {
  // The invitation token from the email link (the credential).
  string token = 1;
  // The auth user that the gateway provisioned (or found) for the
  // invitee's email. Becomes the staff member's user_id.
  string user_id = 2;
}

message AcceptInvitationResponse {
  // The staff membership the invitee now holds at the rescue.
  StaffMember staff_member = 1;
}

// --- Application questions --------------------------------------------

enum ApplicationQuestionScope {
  APPLICATION_QUESTION_SCOPE_UNSPECIFIED = 0;
  APPLICATION_QUESTION_SCOPE_CORE = 1;
  APPLICATION_QUESTION_SCOPE_RESCUE_SPECIFIC = 2;
}

// category / question_type are carried as the raw Postgres ENUM strings
// (e.g. 'personal_information', 'text') rather than proto enums — the DB
// type is the source of truth and the REST surface speaks those strings.
message ApplicationQuestion {
  string question_id = 1;
  optional string rescue_id = 2;
  string question_key = 3;
  ApplicationQuestionScope scope = 4;
  string category = 5;
  string question_type = 6;
  string question_text = 7;
  optional string help_text = 8;
  optional string placeholder = 9;
  repeated string options = 10;
  int32 display_order = 11;
  bool is_enabled = 12;
  bool is_required = 13;
  string created_at = 14;
  string updated_at = 15;
}

message ListApplicationQuestionsRequest {
  string rescue_id = 1;
}

message ListApplicationQuestionsResponse {
  repeated ApplicationQuestion questions = 1;
}

message CreateApplicationQuestionRequest {
  string rescue_id = 1;
  string question_key = 2;
  string category = 3;
  string question_type = 4;
  string question_text = 5;
  optional string help_text = 6;
  optional string placeholder = 7;
  repeated string options = 8;
  int32 display_order = 9;
  bool is_required = 10;
}

message CreateApplicationQuestionResponse {
  ApplicationQuestion question = 1;
}

message DeleteApplicationQuestionRequest {
  string question_id = 1;
}

message DeleteApplicationQuestionResponse {
  bool deleted = 1;
}
