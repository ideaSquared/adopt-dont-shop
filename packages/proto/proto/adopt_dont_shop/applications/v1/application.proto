syntax = "proto3";

package adopt_dont_shop.applications.v1;

// ApplicationService is the gRPC contract for the applications
// vertical — the EVENT-SOURCED extraction. Owns the `applications.*`
// schema (Application, ApplicationDraft, ApplicationAnswer,
// ApplicationTimelineEntry, HomeVisit, Reference) and exposes the
// command + query split CAD's incident service pioneered.
//
// Commands are the only mutation entry points; each one validates
// invariants against the pure domain (Phase 5.2), appends an event
// to the Postgres event store, denormalises into the read model, and
// publishes the corresponding `applications.*` subject AFTER commit.
// Queries read the denormalised projection.
//
// State machine (the canonical lifecycle):
//
//   draft → submitted → under_review → home_visit_scheduled →
//   home_visit_completed → approved | rejected | withdrawn → adopted
//
// Plus self-loops `under_review` → `under_review` for additional
// answers/references, and `withdrawn` as a terminal exit from
// `draft` / `submitted` / `under_review` at any point.
service ApplicationService {
  // Mint a fresh draft for an adopter applying to a specific pet.
  // Caller MUST be the adopter (own user_id) or super_admin.
  // Publishes `applications.draftCreated` after commit.
  rpc StartDraft(StartDraftRequest) returns (StartDraftResponse);

  // Persist answers / reference contacts to an existing draft.
  // Idempotent on (application_id, version) — the read model
  // checks optimistic concurrency. Caller MUST be the adopter or
  // super_admin.
  rpc SaveDraftAnswers(SaveDraftAnswersRequest) returns (SaveDraftAnswersResponse);

  // Transition draft → submitted. Validates that all required core
  // questions plus the rescue's required questions are answered.
  // Publishes `applications.submitted` after commit — the
  // notifications service consumes this and pings both the adopter
  // and rescue staff.
  rpc SubmitDraft(SubmitDraftRequest) returns (SubmitDraftResponse);

  // Transition submitted → under_review (rescue staff opens the
  // application for review). Idempotent — repeat calls return the
  // current row. Caller MUST be rescue staff scoped to the
  // application's rescue.
  rpc StartReview(StartReviewRequest) returns (StartReviewResponse);

  // Transition under_review → home_visit_scheduled. Carries the
  // scheduled timestamp + visitor name. Publishes
  // `applications.homeVisitScheduled`.
  rpc ScheduleHomeVisit(ScheduleHomeVisitRequest) returns (ScheduleHomeVisitResponse);

  // Transition home_visit_scheduled → home_visit_completed. Carries
  // the home_visit notes + outcome. Publishes
  // `applications.homeVisitCompleted`.
  rpc CompleteHomeVisit(CompleteHomeVisitRequest) returns (CompleteHomeVisitResponse);

  // Terminal: approve the application. Carries optional notes for
  // the adopter. Publishes `applications.approved`.
  rpc Approve(ApproveRequest) returns (ApproveResponse);

  // Terminal: reject with a reason. Publishes
  // `applications.rejected`.
  rpc Reject(RejectRequest) returns (RejectResponse);

  // Terminal (adopter-initiated): withdraw an application from any
  // pre-decision state. Publishes `applications.withdrawn`.
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);

  // Final-terminal: mark the pet adopted. Triggered when the
  // service.pets `pets.statusChanged → adopted` event references
  // this application, OR via a manual admin override. Publishes
  // `applications.adopted`.
  rpc MarkAdopted(MarkAdoptedRequest) returns (MarkAdoptedResponse);

  // Read-side: fetch a single application's current projected state
  // (status + answers + timeline). NOT_FOUND when missing or soft-
  // deleted.
  rpc Get(GetApplicationRequest) returns (GetApplicationResponse);

  // Read-side: keyset paginated list, scoped by status or rescue
  // for the adopter / staff dashboards. Adopters see their own;
  // staff see their rescue's; admins see all.
  rpc List(ListApplicationsRequest) returns (ListApplicationsResponse);

  // Read-side: application counts grouped by status, scoped the same
  // way List is (adopters see their own; staff see their rescue's;
  // admins see all and may narrow by rescue/adopter). Powers the
  // rescue dashboard's stats cards. Returns RAW per-service-status
  // counts — the gateway collapses them to the SPA's 4-state shape.
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);

  // Read-side: cross-service attribution count (ADS-941). Given a
  // caller-supplied set of adopter user ids (e.g. an event's
  // registrants, resolved by the calling service), returns how many of
  // them have at least one application that reached APPROVED or
  // ADOPTED status with created_at inside [created_after,
  // created_before]. Deliberately narrow: the caller already knows the
  // adopter_ids (it resolved them itself); the response reveals only
  // the count, never which ids matched or which rescue/pet was
  // involved. Caller MUST hold applications.read.
  rpc CountAdoptedAdopters(CountAdoptedAdoptersRequest) returns (CountAdoptedAdoptersResponse);

  // Document metadata — append a row referencing an already-stored
  // file URL. The gateway owns the multipart upload + object storage;
  // this surface only persists the METADATA. Caller MUST hold
  // applications.update for the application's rescue.
  rpc AddDocument(AddDocumentRequest) returns (AddDocumentResponse);

  // Document metadata — list the non-deleted documents attached to an
  // application, scoped the same way Get is (adopter-owns OR rescue-
  // staff-of-the-app's-rescue OR admin).
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);

  // Document metadata — soft-delete one document. Caller MUST hold
  // applications.update for the application's rescue.
  rpc RemoveDocument(RemoveDocumentRequest) returns (RemoveDocumentResponse);

  // Adopter's reusable application defaults (personal info / living
  // situation / pet experience / references) used to pre-populate new
  // applications. Always scoped to the calling principal's own
  // user_id — there is no cross-adopter read or write.
  rpc GetApplicationDefaults(GetApplicationDefaultsRequest)
      returns (GetApplicationDefaultsResponse);

  // Deep-merge a partial defaults patch into the adopter's saved
  // defaults and return the merged result. Top-level keys absent from
  // the patch are left untouched.
  rpc UpdateApplicationDefaults(UpdateApplicationDefaultsRequest)
      returns (UpdateApplicationDefaultsResponse);

  // Backend-synced application DRAFT for a (caller, pet) pair — the
  // autosave scratchpad the SPA writes while the adopter fills out the
  // form, distinct from the event-sourced draft Application above. Always
  // scoped to the calling principal's own user_id. `found` is false when
  // the adopter has no draft for that pet (the SPA starts fresh).
  rpc GetApplicationDraft(GetApplicationDraftRequest)
      returns (GetApplicationDraftResponse);

  // Upsert the (caller, pet) draft — last-write-wins, stamping a fresh
  // 30-day TTL on every write.
  rpc SaveApplicationDraft(SaveApplicationDraftRequest)
      returns (SaveApplicationDraftResponse);

  // Delete the (caller, pet) draft. Idempotent — deleting a draft that
  // isn't there succeeds (the SPA calls this best-effort on submit).
  rpc DeleteApplicationDraft(DeleteApplicationDraftRequest)
      returns (DeleteApplicationDraftResponse);
}

// --- ENUMs — value lists mirror the Postgres types verbatim ----------

enum ApplicationStatus {
  APPLICATION_STATUS_UNSPECIFIED = 0;
  APPLICATION_STATUS_DRAFT = 1;
  APPLICATION_STATUS_SUBMITTED = 2;
  APPLICATION_STATUS_UNDER_REVIEW = 3;
  APPLICATION_STATUS_HOME_VISIT_SCHEDULED = 4;
  APPLICATION_STATUS_HOME_VISIT_COMPLETED = 5;
  APPLICATION_STATUS_APPROVED = 6;
  APPLICATION_STATUS_REJECTED = 7;
  APPLICATION_STATUS_WITHDRAWN = 8;
  APPLICATION_STATUS_ADOPTED = 9;
}

enum HomeVisitOutcome {
  HOME_VISIT_OUTCOME_UNSPECIFIED = 0;
  HOME_VISIT_OUTCOME_PASSED = 1;
  HOME_VISIT_OUTCOME_FAILED = 2;
  HOME_VISIT_OUTCOME_RESCHEDULE = 3;
}

// --- Application — denormalised read-model row -----------------------

message Application {
  string application_id = 1;
  string adopter_id = 2;
  string pet_id = 3;
  string rescue_id = 4;
  ApplicationStatus status = 5;
  // JSON-stringified key→value answers map. Empty string == `{}`.
  string answers_json = 6;
  // JSON-stringified reference contact list. Empty string == `[]`.
  string references_json = 7;
  // Optimistic-concurrency version — bumped on every event append.
  uint32 version = 8;
  optional string submitted_at = 9;
  optional string review_started_at = 10;
  optional string home_visit_scheduled_at = 11;
  optional string home_visit_completed_at = 12;
  optional HomeVisitOutcome home_visit_outcome = 13;
  optional string home_visit_notes = 14;
  optional string decided_at = 15;
  optional string decided_by = 16;
  optional string decision_notes = 17;
  optional string rejection_reason = 18;
  optional string adopted_at = 19;
  string created_at = 20;
  string updated_at = 21;
}

// TimelineEntry mirrors the applications.application_timeline_entries
// audit row — every event-store row gets a denormalised entry the SPA
// renders chronologically.
message TimelineEntry {
  string entry_id = 1;
  string application_id = 2;
  ApplicationStatus from_status = 3;
  ApplicationStatus to_status = 4;
  string actor_user_id = 5;
  string occurred_at = 6;
  optional string note = 7;
}

// --- StartDraft ------------------------------------------------------

message StartDraftRequest {
  // adopter_id MUST match the calling principal (adopters own their
  // drafts). super_admin can pass any.
  string adopter_id = 1;
  string pet_id = 2;
}

message StartDraftResponse {
  Application application = 1;
}

// --- SaveDraftAnswers ------------------------------------------------

message SaveDraftAnswersRequest {
  string application_id = 1;
  // Optimistic-concurrency guard — the caller's last-known version.
  // The service rejects with FAILED_PRECONDITION when the row has
  // moved beyond this version.
  uint32 expected_version = 2;
  // JSON-stringified answers patch. The handler merges this into
  // the existing answers map (NOT replace) so callers can save
  // partial progress.
  string answers_patch_json = 3;
  // Optional reference contact list replacement (wholesale). Empty
  // string = leave unchanged.
  optional string references_json = 4;
}

message SaveDraftAnswersResponse {
  Application application = 1;
}

// --- SubmitDraft -----------------------------------------------------

message SubmitDraftRequest {
  string application_id = 1;
  uint32 expected_version = 2;
}

message SubmitDraftResponse {
  Application application = 1;
}

// --- StartReview -----------------------------------------------------

message StartReviewRequest {
  string application_id = 1;
  // Optional staff note ("opening for review").
  optional string note = 2;
}

message StartReviewResponse {
  Application application = 1;
}

// --- ScheduleHomeVisit -----------------------------------------------

message ScheduleHomeVisitRequest {
  string application_id = 1;
  string scheduled_at = 2;
  // Optional pre-visit note (visitor name, preferences, etc.).
  optional string note = 3;
}

message ScheduleHomeVisitResponse {
  Application application = 1;
}

// --- CompleteHomeVisit -----------------------------------------------

message CompleteHomeVisitRequest {
  string application_id = 1;
  HomeVisitOutcome outcome = 2;
  optional string notes = 3;
}

message CompleteHomeVisitResponse {
  Application application = 1;
}

// --- Approve / Reject / Withdraw / MarkAdopted -----------------------

message ApproveRequest {
  string application_id = 1;
  optional string notes = 2;
}

message ApproveResponse {
  Application application = 1;
}

message RejectRequest {
  string application_id = 1;
  string reason = 2;
}

message RejectResponse {
  Application application = 1;
}

message WithdrawRequest {
  string application_id = 1;
  optional string reason = 2;
}

message WithdrawResponse {
  Application application = 1;
}

message MarkAdoptedRequest {
  string application_id = 1;
}

message MarkAdoptedResponse {
  Application application = 1;
}

// --- Get -------------------------------------------------------------

message GetApplicationRequest {
  string application_id = 1;
  // Set true to include the timeline projection in the response.
  // Defaults false to keep the GET cheap when the SPA already has
  // the timeline cached.
  bool include_timeline = 2;
}

message GetApplicationResponse {
  Application application = 1;
  repeated TimelineEntry timeline = 2;
}

// --- List ------------------------------------------------------------

message ListApplicationsRequest {
  // Opaque base64-JSON keyset cursor.
  optional string cursor = 1;
  // Defaults to 20, max 100.
  uint32 limit = 2;
  // Optional filters. UNSPECIFIED in each enum = "no filter".
  ApplicationStatus status_filter = 3;
  optional string rescue_id_filter = 4;
  // Adopters can only see their own (the handler enforces scope
  // from principal.userId); admins + super_admin can pass any
  // adopter_id_filter explicitly.
  optional string adopter_id_filter = 5;
}

message ListApplicationsResponse {
  repeated Application applications = 1;
  optional string next_cursor = 2;
}

// --- GetStats --------------------------------------------------------

message GetStatsRequest {
  // Optional filters. Admins + super_admin may pass either to narrow
  // the counted set; rescue staff are pinned to their own rescue and
  // adopters to their own user id regardless of these (the handler
  // enforces scope from the principal).
  optional string rescue_id_filter = 1;
  optional string adopter_id_filter = 2;
  // Inclusive lower / upper bounds on created_at. Used by the report
  // builder's "application funnel" widget to scope counts to the
  // report's date-range filter; omit either for an open-ended range.
  optional string created_after = 3;
  optional string created_before = 4;
}

message GetStatsResponse {
  // Total non-deleted applications in scope (sum of the per-status
  // counts below).
  uint32 total = 1;
  // RAW per-service-status counts — zero-filled for statuses with no
  // rows. The gateway collapses these to the SPA's 4-state shape.
  uint32 draft = 2;
  uint32 submitted = 3;
  uint32 under_review = 4;
  uint32 home_visit_scheduled = 5;
  uint32 home_visit_completed = 6;
  uint32 approved = 7;
  uint32 rejected = 8;
  uint32 withdrawn = 9;
  uint32 adopted = 10;
}

// --- CountAdoptedAdopters ---------------------------------------------

message CountAdoptedAdoptersRequest {
  // Candidate adopter user ids to check — e.g. an event's registrant
  // list, resolved by the calling service. No filter/scope semantics;
  // the caller decides which ids are in play.
  repeated string adopter_ids = 1;
  // Inclusive lower bound (RFC3339) on the application's created_at.
  string created_after = 2;
  // Inclusive upper bound (RFC3339) on the application's created_at.
  string created_before = 3;
}

message CountAdoptedAdoptersResponse {
  // Distinct count of adopter_ids (from the request) with at least one
  // non-deleted application whose status is APPROVED or ADOPTED and
  // whose created_at falls in [created_after, created_before].
  uint32 count = 1;
}

// --- Documents -------------------------------------------------------

// Document — metadata for a file attached to an application. The file
// bytes live in object storage (owned by the gateway); this row only
// references the stored `url`. Mirrors the SPA's Document shape.
message Document {
  string document_id = 1;
  string application_id = 2;
  string type = 3;
  string filename = 4;
  string url = 5;
  optional uint32 size = 6;
  optional string mime_type = 7;
  string uploaded_at = 8;
}

message AddDocumentRequest {
  string application_id = 1;
  string type = 2;
  string filename = 3;
  // URL of the already-stored file (the caller owns the upload).
  string url = 4;
  optional uint32 size = 5;
  optional string mime_type = 6;
}

message AddDocumentResponse {
  Document document = 1;
}

message ListDocumentsRequest {
  string application_id = 1;
}

message ListDocumentsResponse {
  repeated Document documents = 1;
}

message RemoveDocumentRequest {
  string application_id = 1;
  string document_id = 2;
}

message RemoveDocumentResponse {}

// --- Application defaults ---------------------------------------------

message GetApplicationDefaultsRequest {}

message GetApplicationDefaultsResponse {
  // JSON-stringified ApplicationDefaults. Empty string when the adopter
  // has never saved any defaults.
  string defaults_json = 1;
}

message UpdateApplicationDefaultsRequest {
  // JSON-stringified partial ApplicationDefaults patch, deep-merged
  // into the stored value.
  string defaults_patch_json = 1;
}

message UpdateApplicationDefaultsResponse {
  // JSON-stringified ApplicationDefaults after the merge.
  string defaults_json = 1;
}

// --- Application drafts (autosave scratchpad) ------------------------

message GetApplicationDraftRequest {
  string pet_id = 1;
}

message GetApplicationDraftResponse {
  // False when the caller has no draft for this pet. The other fields
  // are unset / empty in that case.
  bool found = 1;
  // JSON-stringified answers map. Empty string == `{}`.
  string answers_json = 2;
  string updated_at = 3;
  // TTL — when the daily purge will reap the row. Unset when the row
  // carries no expiry.
  optional string expires_at = 4;
}

message SaveApplicationDraftRequest {
  string pet_id = 1;
  // JSON-stringified answers map. Stored verbatim (last-write-wins).
  string answers_json = 2;
}

message SaveApplicationDraftResponse {
  string answers_json = 1;
  string updated_at = 2;
  optional string expires_at = 3;
}

message DeleteApplicationDraftRequest {
  string pet_id = 1;
}

message DeleteApplicationDraftResponse {}
