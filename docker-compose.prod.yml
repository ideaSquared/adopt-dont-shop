# ============================================================================
# Production Docker Compose Configuration
# ============================================================================
# ⚠️ CRITICAL SECURITY REQUIREMENTS:
# 1. All secrets MUST be provided via environment variables or Docker secrets
# 2. No default values are provided - you MUST set them explicitly
# 3. Use strong, randomly generated passwords and secrets
# 4. Consider using external secrets management (AWS Secrets Manager, Vault)
# ============================================================================
# Pulls pre-built images from GHCR. Deploy via .github/workflows/deploy.yml,
# which sets DEPLOY_SHA in /opt/ads/production/.env on the host.
# Public TLS is handled by the gateway stack
# (deploy/gateway/docker-compose.gateway.yml); per-stack nginx serves /uploads
# directly via auth_request [ADS-422] and is exposed on the internal network
# only — the gateway proxies to it.
# ============================================================================

# Reusable JSON-file log driver with rotation. Without this Docker's default
# json-file driver retains logs unboundedly and fills the host disk. [ADS-432]
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# ----------------------------------------------------------------------------
# Shared config for the extracted gRPC services (replaces the service.backend
# monolith, deleted in phase 11). Mirrors the dev docker-compose.yml `*-env` /
# `*-deps` anchors but for the prebuilt-image production stack. Every service
# shares one Postgres (schema-per-service) + NATS + Redis and migrates its own
# schema on start (entrypoint runs `pnpm run --if-present db:migrate`).
#
# Credentials flow through file-mounted Docker secrets via the shared
# @adopt-dont-shop/config-secrets loader — each service reads e.g.
# DATABASE_URL_FILE / JWT_SECRET_FILE rather than the raw env value, keeping
# secrets out of `docker inspect`. This restores the readSecretOrEnv() shape
# the deleted monolith used (ADS-675). The loader still honours the plaintext
# env value when *_FILE is unset, which is what the dev compose relies on.
# ----------------------------------------------------------------------------
x-service-common: &service-common
  restart: always
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging: *default-logging
  depends_on:
    database:
      condition: service_healthy
    nats:
      condition: service_healthy
  # Default secret mounts for every domain service: DATABASE_URL_FILE +
  # REDIS_URL_FILE come from these. Services that need additional secrets
  # (auth → jwt; gateway → upload signing) override this list.
  secrets:
    - database_url
    - redis_url
    - principal_signing_key
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512m
      reservations:
        cpus: '0.1'
        memory: 128m

x-service-env: &service-env
  NODE_ENV: production
  # See the comment block above the anchor — the loader prefers the *_FILE
  # path and only consults the raw env var as a documented escape hatch.
  DATABASE_URL_FILE: /run/secrets/database_url
  NATS_URL: "nats://nats:4222"
  REDIS_URL_FILE: /run/secrets/redis_url
  # ADS-800: shared HMAC key for signed principal tokens. Present → each
  # service REQUIRES a valid x-principal-token (forged x-user-* headers
  # lose); the gateway signs with the same key.
  PRINCIPAL_SIGNING_KEY_FILE: /run/secrets/principal_signing_key

# Healthcheck timing tiers (mirrors the dev docker-compose.yml ADS-860
# standard): infra probes fast without a start_period (database) or with a
# short one (redis/nats); the gRPC services get a longer start_period to
# cover cold-start + migrations.
x-healthcheck-infra: &hc-infra-timing
  interval: 10s
  timeout: 5s
  retries: 5

x-healthcheck-service: &hc-service-timing
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

# Every app-* container (nginx serving a built SPA, read-only rootfs
# hardened tier) shares this exact shape — only image/container_name differ.
x-app-common: &app-common
  restart: always
  volumes: []  # No volumes in production
  # ADS-924: read-only root FS, matching the x-service-common hardened tier.
  # nginx (unprivileged, UID 101) only needs these writable at runtime — the
  # custom nginx.conf baked into Dockerfile.app has no `pid`/temp-path
  # directives of its own, so it falls back to nginx's compiled-in defaults:
  #   /tmp             — general scratch space
  #   /var/run         — nginx.pid (default pid path)
  #   /var/cache/nginx — client_temp/proxy_temp/fastcgi_temp/uwsgi_temp/scgi_temp
  read_only: true
  tmpfs:
    - /tmp
    - /var/run
    - /var/cache/nginx
  # ADS-701: nginx runs unprivileged and listens on 8080.
  expose:
    - "8080"
  stdin_open: false
  tty: false
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  healthcheck:
    test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080']
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging: *default-logging
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256m
      reservations:
        cpus: '0.1'
        memory: 64m

services:
  # Database - Production configuration
  database:
    image: postgis/postgis:16-3.4@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5
    container_name: ads_prod_db
    # ADS-752: read the DB password from the file-mounted Docker secret rather
    # than the env var. POSTGRES_PASSWORD_FILE is honoured by the postgres
    # entrypoint and keeps the value out of `docker inspect` and the host .env.
    environment:
      # NO DEFAULTS - Must be explicitly set
      POSTGRES_USER: "${POSTGRES_USER:?Error: POSTGRES_USER required in production}"
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: "${POSTGRES_DB:?Error: POSTGRES_DB required in production}"
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
    restart: always
    # Production: Don't expose database port to host
    ports: []
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
        reservations:
          cpus: '0.5'
          memory: 512m

  # Redis - Production configuration
  redis:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: ads_prod_redis
    restart: always
    ports: []  # Don't expose Redis port to host in production
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    # ADS-886: the password is read from the file-mounted secret at container
    # start rather than interpolated into `command`/`environment`, both of
    # which `docker inspect` (Config.Cmd / Config.Env) reads back in
    # plaintext. Mirrors the docker-compose.staging.yml pattern (ADS-878).
    # The deploy workflow materialises ./secrets/redis_password.
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"'
    # Healthcheck so dependent services can wait for service_healthy. Without
    # this the backend may start before Redis is ready and crash on first
    # connection. [ADS-431]
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'redis-cli -a "$$(cat /run/secrets/redis_password)" ping | grep -q PONG']
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 128m

  # NATS JetStream — event backbone for the extracted services.
  nats:
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    container_name: ads_prod_nats
    restart: always
    ports: []
    command: '-js -sd /data -m 8222'
    volumes:
      - nats_data:/data
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1']
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 128m

  # ==========================================================================
  # GATEWAY + EXTRACTED MICROSERVICES (replaces the service.backend monolith,
  # deleted in phase 11). The gateway is the REST/WS edge on :4000; the
  # per-stack nginx proxies /api, /auth, /socket.io and /uploads to it. Each
  # domain service exposes HTTP health on :500x and gRPC on :600x. Service
  # *compose keys* (service-auth, …) are the DNS names the gateway's gRPC URL
  # defaults resolve, so the gateway needs no explicit *_GRPC_URL env.
  # ==========================================================================

  service-gateway:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-gateway:${SERVICE_GATEWAY_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_gateway
    environment:
      NODE_ENV: production
      NATS_URL: "nats://nats:4222"
      CORS_ORIGIN: "${CORS_ORIGIN:?Error: CORS_ORIGIN required}"
      # ADS-422: the per-stack nginx serves /uploads via auth_request; disable
      # the gateway's own file streaming in production.
      SERVE_LOCAL_UPLOADS: "false"
      UPLOAD_SIGNING_SECRET_FILE: /run/secrets/upload_signing_secret
      # ADS-800: the gateway signs the x-principal-token it forwards on
      # every downstream gRPC call.
      PRINCIPAL_SIGNING_KEY_FILE: /run/secrets/principal_signing_key
    # Gateway has no DB; it needs the upload-signing secret plus the
    # principal-signing key (ADS-800 — it is the token signer).
    secrets:
      - upload_signing_secret
      - principal_signing_key
    volumes:
      - uploads:/app/uploads
    expose:
      - "4000"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/health/simple']
    # The gateway only needs NATS + the downstream services; it has no DB.
    depends_on:
      nats:
        condition: service_healthy

  service-auth:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-auth:${SERVICE_AUTH_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_auth
    environment:
      <<: *service-env
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      # ADS-914: AES-256-GCM key for encrypting TOTP 2FA secrets at rest.
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
    # Auth needs the JWT signing secrets + the TOTP encryption key on top of
    # the common DB/Redis ones.
    secrets:
      - database_url
      - redis_url
      - jwt_secret
      - jwt_refresh_secret
      - encryption_key
      - principal_signing_key
    expose:
      - "5002"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5002/health/simple']

  service-notifications:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-notifications:${SERVICE_NOTIFICATIONS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_notifications
    environment:
      <<: *service-env
    expose:
      - "5001"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5001/health/simple']

  service-pets:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-pets:${SERVICE_PETS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_pets
    environment:
      <<: *service-env
    expose:
      - "5003"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5003/health/simple']

  service-rescue:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-rescue:${SERVICE_RESCUE_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_rescue_svc
    environment:
      <<: *service-env
    expose:
      - "5004"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5004/health/simple']

  service-applications:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-applications:${SERVICE_APPLICATIONS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_applications
    environment:
      <<: *service-env
      PETS_GRPC_URL: service-pets:6003
    expose:
      - "5005"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5005/health/simple']

  service-chat:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-chat:${SERVICE_CHAT_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_chat
    environment:
      <<: *service-env
    expose:
      - "5006"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5006/health/simple']

  service-moderation:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-moderation:${SERVICE_MODERATION_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_moderation
    environment:
      <<: *service-env
    expose:
      - "5007"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5007/health/simple']

  service-matching:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-matching:${SERVICE_MATCHING_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_matching
    environment:
      <<: *service-env
      PETS_GRPC_URL: service-pets:6003
    expose:
      - "5008"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5008/health/simple']

  service-audit:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-audit:${SERVICE_AUDIT_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_audit
    environment:
      <<: *service-env
    expose:
      - "5009"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5009/health/simple']

  service-cms:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-cms:${SERVICE_CMS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_cms
    environment:
      <<: *service-env
    expose:
      - "5010"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5010/health/simple']

  # Frontend Apps - Production
  app-admin:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-admin:${APP_ADMIN_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_admin
    <<: *app-common

  app-client:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-client:${APP_CLIENT_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_client
    <<: *app-common

  app-rescue:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-rescue:${APP_RESCUE_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_prod_rescue
    <<: *app-common

  # Per-stack nginx: routes traffic between backend/apps and serves /uploads
  # via auth_request to the backend. [ADS-422]
  # Public TLS is handled by the gateway stack — this nginx only listens on
  # the internal network and is reverse-proxied by the gateway.
  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: ads_prod_nginx
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # ADS-693: shared security-header snippet — included by every server
      # block AND every location block that uses `add_header`, so per-location
      # Cache-Control directives don't strip server-level CSP/HSTS/etc.
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt certificates (if using)
      - letsencrypt:/etc/letsencrypt:ro
      # ADS-422: shared uploads volume mounted read-only so nginx can serve
      # files directly after a successful auth_request to the backend.
      # Must match the path used in the nginx `root` directive (/srv/uploads).
      - uploads:/srv/uploads:ro
    expose:
      - "80"
      - "443"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # The per-stack nginx listens on port 80 (HTTP) internally; the default
    # server returns 444 for unknown hosts but nginx itself is alive and
    # accepting connections. `nginx -t` validates config; checking the master
    # PID file confirms the daemon is running. Both together confirm liveness.
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t 2>/dev/null && test -f /var/run/nginx.pid']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - service-gateway
      - app-client
      - app-admin
      - app-rescue
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

# ============================================================================
# Production Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  uploads:
    driver: local
  letsencrypt:
    driver: local

networks:
  default:
    name: ads-prod-network
    external: false

# ============================================================================
# Docker Secrets
# ============================================================================
# Mounted as in-memory tmpfs files at /run/secrets/<name>; never written to
# disk and invisible to `docker inspect`. Each gRPC service reads credentials
# through the @adopt-dont-shop/config-secrets loader (NAME_FILE wins over
# NAME), restoring the file-mounted-secret layout the deleted monolith
# consumed via readSecretOrEnv(). The deploy workflow
# (.github/workflows/deploy.yml) materialises ./secrets/<name> on the host
# before `docker compose up -d`.
secrets:
  db_password:
    file: ./secrets/db_password
  database_url:
    file: ./secrets/database_url
  redis_url:
    file: ./secrets/redis_url
  redis_password:
    file: ./secrets/redis_password
  jwt_secret:
    file: ./secrets/jwt_secret
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret
  encryption_key:
    file: ./secrets/encryption_key
  upload_signing_secret:
    file: ./secrets/upload_signing_secret
  principal_signing_key:
    file: ./secrets/principal_signing_key
