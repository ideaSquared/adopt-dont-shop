# Production Docker Compose — pulls pre-built images from GHCR
# Deploy via: .github/workflows/deploy.yml (sets DEPLOY_SHA)
# Nginx/SSL handled by gateway stack (docker-compose.gateway.yml)

services:
  database:
    image: postgis/postgis:16-3.4
    container_name: ads_prod_db
    restart: always
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Error: POSTGRES_USER required in production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD required in production}
      POSTGRES_DB: ${POSTGRES_DB:?Error: POSTGRES_DB required in production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ads_prod_redis
    restart: always
    ports: []
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required in production}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  service-backend:
    image: ghcr.io/ideasquared/adopt-dont-shop/backend:${DEPLOY_SHA:-latest}
    container_name: ads_prod_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:?Error: POSTGRES_USER required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD required}
      PROD_DB_NAME: ${POSTGRES_DB:?Error: POSTGRES_DB required}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required}
      JWT_SECRET: ${JWT_SECRET:?Error: JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Error: JWT_REFRESH_SECRET required}
      SESSION_SECRET: ${SESSION_SECRET:?Error: SESSION_SECRET required}
      CSRF_SECRET: ${CSRF_SECRET:?Error: CSRF_SECRET required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Error: ENCRYPTION_KEY required}
      API_URL: ${API_URL:?Error: API_URL required}
      FRONTEND_URL: ${FRONTEND_URL:?Error: FRONTEND_URL required}
      CORS_ORIGIN: ${CORS_ORIGIN:?Error: CORS_ORIGIN required}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:?Error: EMAIL_PROVIDER required}
      EMAIL_FROM: ${EMAIL_FROM:?Error: EMAIL_FROM required}
      FORCE_SEED: "false"
      DB_LOGGING: "false"
    volumes:
      - uploads:/app/service.backend/uploads
    expose:
      - "5000"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app-client:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-client:${DEPLOY_SHA:-latest}
    container_name: ads_prod_client
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  app-admin:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-admin:${DEPLOY_SHA:-latest}
    container_name: ads_prod_admin
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  app-rescue:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-rescue:${DEPLOY_SHA:-latest}
    container_name: ads_prod_rescue
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  default:
    name: ads-prod-network
