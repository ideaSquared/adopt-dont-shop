# ============================================================================
# Production Docker Compose Configuration
# ============================================================================
# ⚠️ CRITICAL SECURITY REQUIREMENTS:
# 1. All secrets MUST be provided via environment variables or Docker secrets
# 2. No default values are provided - you MUST set them explicitly
# 3. Use strong, randomly generated passwords and secrets
# 4. Consider using external secrets management (AWS Secrets Manager, Vault)
# ============================================================================

# Reusable JSON-file log driver with rotation. Without this Docker's default
# json-file driver retains logs unboundedly and fills the host disk. [ADS-432]
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # Database - Production configuration
  database:
    environment:
      # NO DEFAULTS - Must be explicitly set
      POSTGRES_USER: ${POSTGRES_USER:?Error: POSTGRES_USER required in production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD required in production}
      POSTGRES_DB: ${POSTGRES_DB:?Error: POSTGRES_DB required in production}
    restart: always
    # Production: Don't expose database port to host
    ports: []
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
        reservations:
          cpus: '0.5'
          memory: 512m
    # Optional: Use Docker secrets instead of environment variables
    # secrets:
    #   - postgres_password
    # environment:
    #   POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password

  # Redis - Production configuration
  redis:
    restart: always
    ports: []  # Don't expose Redis port to host in production
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required in production}
    # Healthcheck so dependent services can wait for service_healthy. Without
    # this the backend may start before Redis is ready and crash on first
    # connection. [ADS-431]
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 128m

  # Migration runner - one-shot init container that applies pending migrations
  # before the backend starts. Skipping this leaves the running service hitting
  # a stale schema on every release. [ADS-393]
  service-backend-migrate:
    build:
      context: .
      dockerfile: ./service.backend/Dockerfile
      target: build
    restart: 'no'
    command: ['npx', 'sequelize-cli', 'db:migrate']
    working_dir: /app/service.backend
    environment:
      NODE_ENV: production
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:?Error: POSTGRES_USER required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD required}
      PROD_DB_NAME: ${POSTGRES_DB:?Error: POSTGRES_DB required}
    depends_on:
      database:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  # Backend Service - Production
  service-backend:
    build:
      context: .
      dockerfile: ./service.backend/Dockerfile
      target: production
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      # Database - NO DEFAULTS
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:?Error: POSTGRES_USER required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD required}
      PROD_DB_NAME: ${POSTGRES_DB:?Error: POSTGRES_DB required}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      # Redis - NO DEFAULTS
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required}
      # Security - REQUIRED
      JWT_SECRET: ${JWT_SECRET:?Error: JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Error: JWT_REFRESH_SECRET required}
      SESSION_SECRET: ${SESSION_SECRET:?Error: SESSION_SECRET required}
      CSRF_SECRET: ${CSRF_SECRET:?Error: CSRF_SECRET required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Error: ENCRYPTION_KEY required}
      # URLs
      API_URL: ${API_URL:?Error: API_URL required}
      CORS_ORIGIN: ${CORS_ORIGIN:?Error: CORS_ORIGIN required}
      # ADS-410: backend builds password-reset / verification / invitation
      # email links from these. Without them, every email links to localhost.
      FRONTEND_URL: ${FRONTEND_URL:?Error: FRONTEND_URL required (used to build email links)}
      RESCUE_FRONTEND_URL: ${RESCUE_FRONTEND_URL:?Error: RESCUE_FRONTEND_URL required (used to build rescue invitation links)}
      # Email (required for production)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:?Error: EMAIL_PROVIDER required}
      EMAIL_FROM: ${EMAIL_FROM:?Error: EMAIL_FROM required}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-${EMAIL_FROM}}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-${EMAIL_FROM}}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-${EMAIL_FROM}}
      # ADS-411: feature flags silently default-off without this key.
      STATSIG_SERVER_SECRET_KEY: ${STATSIG_SERVER_SECRET_KEY:?Error: STATSIG_SERVER_SECRET_KEY required (server-side feature flags silently disabled when missing)}
      # ADS-451: optional / operational
      WORKER_ENABLED: ${WORKER_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-logs}
      SMS_DEFAULT_COUNTRY_CODE: ${SMS_DEFAULT_COUNTRY_CODE:-GB}
      JWT_REPORT_SHARE_SECRET: ${JWT_REPORT_SHARE_SECRET:-}
      # ADS-422: nginx serves /uploads directly; disable Express fallback.
      SERVE_LOCAL_UPLOADS: false
      # Disable development features
      FORCE_SEED: false
      DB_LOGGING: false
      # ADS-512: never enable raw error responses in production. The startup
      # validator also enforces this, but make the default explicit.
      DEBUG_ERRORS: false
    volumes:
      # Only mount uploads directory in production
      - uploads:/app/uploads
    # ADS-454/468: harden the backend container filesystem. Application code
    # and node_modules are baked into the image; the only writable surface is
    # the uploads volume (mounted above) and a small tmpfs for /tmp.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    # Don't expose port directly - use nginx
    expose:
      - "5000"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Optional: Use Docker secrets
    # secrets:
    #   - db_password
    #   - jwt_secret
    #   - redis_password
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-backend-migrate:
        condition: service_completed_successfully
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
        reservations:
          cpus: '0.5'
          memory: 512m

  # Frontend Apps - Production
  app-admin:
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: production
      args:
        APP_NAME: app.admin
    restart: always
    volumes: []  # No volumes in production
    expose:
      - "80"
    stdin_open: false
    tty: false
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

  app-client:
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: production
      args:
        APP_NAME: app.client
    restart: always
    volumes: []  # No volumes in production
    expose:
      - "80"
    stdin_open: false
    tty: false
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

  app-rescue:
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: production
      args:
        APP_NAME: app.rescue
    restart: always
    volumes: []  # No volumes in production
    expose:
      - "80"
    stdin_open: false
    tty: false
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

  # Nginx - Production with SSL
  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt certificates (if using)
      - letsencrypt:/etc/letsencrypt:ro
      # ADS-422: shared uploads volume mounted read-only so nginx can serve
      # files directly after a successful auth_request to the backend.
      # Must match the path used in the nginx `root` directive (/srv/uploads).
      - uploads:/srv/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

# ============================================================================
# Production Volumes
# ============================================================================
volumes:
  uploads:
    driver: local
  letsencrypt:
    driver: local

# ============================================================================
# Docker Secrets (Optional but Recommended)
# ============================================================================
# Uncomment to use Docker secrets instead of environment variables
# More secure as secrets are only available to containers that need them
# and are never stored in container images or visible in docker inspect
#
# secrets:
#   postgres_password:
#     external: true  # Created with: echo "password" | docker secret create postgres_password -
#   jwt_secret:
#     external: true
#   redis_password:
#     external: true
#   db_password:
#     external: true
#
# Usage in services:
# services:
#   database:
#     secrets:
#       - postgres_password
#     environment:
#       POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
