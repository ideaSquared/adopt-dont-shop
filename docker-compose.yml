# 🚀 OPTIMIZED Docker Compose - Industry Standard Monorepo Pattern
# Eliminates unnecessary library services and uses pnpm workspace
# Performance: 5-8 minutes instead of 60+ minutes

# ⚠️ Most services below are behind `profiles:` gates.
# `docker compose up` alone starts ONLY infrastructure (database, redis, nats,
# lib-types-watcher) — no apps, no gateway, connection-refused on localhost:3000.
# Use `pnpm docker:dev` (recommended) or `docker compose --profile full up`
# for the full stack. See docs/DOCKER.md for the profile map.

# ----------------------------------------------------------------------------
# Extracted-microservices shared config (anchors). The CAD-style services
# (services/*) run under the `services` / `full` profiles so the default
# `docker compose up` is unchanged (monolith-only). Bring the full topology
# up with:  docker compose --profile services up --build
# All extracted services share one Postgres (schema-per-service) + NATS + Redis.
# ----------------------------------------------------------------------------
x-service-env: &ms-env
  NODE_ENV: ${NODE_ENV:-development}
  DATABASE_URL: postgresql://${POSTGRES_USER:-adopt_user}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-adopt_dont_shop_dev}
  NATS_URL: nats://nats:4222
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  # ADS-800: shared HMAC key for signed principal tokens. When set, the
  # gateway stamps x-principal-token on every downstream gRPC call and the
  # services REQUIRE it (forged x-user-* headers lose). Optional — unset
  # keeps the legacy header-trust behaviour for phased rollout.
  PRINCIPAL_SIGNING_KEY: ${PRINCIPAL_SIGNING_KEY:-}

x-service-deps: &ms-deps
  database:
    condition: service_healthy
  nats:
    condition: service_healthy

x-service-defaults: &service-defaults
  profiles: ['services', 'full']
  restart: unless-stopped
  depends_on: *ms-deps

x-service-build: &service-build-defaults
  context: .
  dockerfile: Dockerfile.service
  target: development

x-app-build: &app-build-defaults
  context: .
  dockerfile: Dockerfile.app
  target: development

# Healthcheck timing standard (ADS-860): every service probes on a uniform
# interval 10s / timeout 5s / retries 5 so Docker reports healthy promptly.
# start_period varies by tier — infra 10s, application containers 40s.
# Observability (loki/prometheus) probes on a slower 30s cadence.
x-healthcheck-infra: &hc-infra-timing
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-healthcheck-standard: &hc-standard-timing
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 40s

x-healthcheck-observability: &hc-observability-timing
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-development}
  DOCKER_ENV: 'true'
  VITE_API_BASE_URL: ''
  VITE_WS_BASE_URL: ws://localhost:4000
  # File-watcher polling — only set on macOS/Windows (see ADS-766).
  CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
  CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
  CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
  NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'

x-app-common: &app-common
  depends_on:
    service-gateway:
      condition: service_healthy
      required: false
  healthcheck:
    <<: *hc-standard-timing
    test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
  mem_limit: 2g
  memswap_limit: 2g

services:
  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================

  # Database service - Single database for all microservices
  # Environment Separation Strategy:
  # - Development: adopt_dont_shop_dev (default in Docker)
  # - Test: adopt_dont_shop_test (CI/CD creates separately)
  # - Production: adopt_dont_shop_prod (separate infrastructure)
  #
  # ⚠️ SECURITY: Requires POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB in .env file
  # Development uses sensible defaults, production MUST override
  database:
    image: postgis/postgis:16-3.4
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      # Development defaults - MUST be overridden for production
      POSTGRES_USER: ${POSTGRES_USER:-adopt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-adopt_dont_shop_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      <<: *hc-infra-timing
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-adopt_user} -d ${POSTGRES_DB:-adopt_dont_shop_dev}']

  # NATS JetStream — async event bus between backend microservices.
  # Phase 0 foundation (ADS-microservices migration). Mirrors the CAD pattern:
  # publish-after-commit from each service, idempotent subscribers fan out to
  # consumers. JetStream enables durable consumers + replay; without `-js`
  # NATS is core pub/sub only (lost on disconnect). Monitoring port 8222 is
  # used by the healthcheck and by `nats-top` / curl probes for ops.
  nats:
    image: nats:2.10-alpine
    restart: always
    ports:
      - '127.0.0.1:4222:4222'  # client protocol
      - '127.0.0.1:8222:8222'  # monitoring + healthz
    command: '-js -sd /data -m 8222'
    volumes:
      - nats_data:/data
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1']

  # Redis for caching and sessions
  redis:
    image: redis:7.4-alpine
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    # ADS-878: the password is read from the file-mounted secret at container
    # start rather than interpolated into `environment:`, which `docker
    # inspect` can read back in plaintext. `pnpm docker:dev` materialises
    # ./secrets/redis_password from .env's REDIS_PASSWORD before `up`.
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"'
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'redis-cli -a "$$(cat /run/secrets/redis_password)" ping | grep -q PONG']

  # ============================================================================
  # LIB.TYPES WATCHER - Continuously compiles lib.types so the backend picks
  # up changes automatically via the workspace symlink (no manual rebuild)
  # ============================================================================

  lib-types-watcher:
    image: node:22.15.1-alpine
    working_dir: /app
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    volumes:
      - .:/app
      - /app/node_modules
      - lib_types_node_modules:/app/packages/lib.types/node_modules
    # Corepack provides pnpm (version pinned by package.json "packageManager").
    # A full workspace install ensures the root toolchain (typescript) is present
    # for lib.types' tsc --watch; --prefer-offline keeps restarts fast.
    command: sh -c "corepack enable && pnpm install --prefer-offline && pnpm --filter @adopt-dont-shop/lib.types dev"
    restart: unless-stopped

  # ============================================================================
  # FRONTEND APPLICATIONS - Using Optimized Workspace Pattern
  # ============================================================================

  # Admin application - Internal rescue management
  app-admin:
    profiles: ["admin", "full"]
    build:
      <<: *app-build-defaults
      args:
        APP_NAME: admin
    ports:
      - '127.0.0.1:3001:3000'
    volumes:
      # Single workspace mount - pnpm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/apps/admin/node_modules
    environment:
      <<: *app-env
    <<: *app-common

  # Client application - Public-facing adoption portal
  app-client:
    profiles: ["client", "full"]
    build:
      <<: *app-build-defaults
      args:
        APP_NAME: client
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      # Single workspace mount - pnpm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/apps/client/node_modules
    environment:
      <<: *app-env
    <<: *app-common

  # Rescue application - Rescue organization portal
  app-rescue:
    profiles: ["rescue", "full"]
    build:
      <<: *app-build-defaults
      args:
        APP_NAME: rescue
    ports:
      - '127.0.0.1:3002:3000'
    volumes:
      # Single workspace mount - pnpm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/apps/rescue/node_modules
    environment:
      <<: *app-env
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-}
      FAST_REFRESH: true
    <<: *app-common

  # ============================================================================
  # REVERSE PROXY
  # ============================================================================

  # Nginx reverse proxy with subdomain routing.
  #
  # Profile-gated (proxy / full) — without this, nginx would start on EVERY
  # `docker compose up` (including the bare/services-only invocation used by
  # CI's two-step boot), then crash-loop because its upstream `app-client:3000`
  # DNS doesn't resolve until the app-* services come up. Adding it to the
  # `full` profile means it only boots when the apps that back its upstreams
  # are also part of the start command, and `proxy` lets devs opt into nginx
  # alongside a single frontend profile when they want subdomain routing.
  nginx:
    profiles: ['proxy', 'full']
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    ports:
      - '127.0.0.1:80:80'
      - '127.0.0.1:443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # ADS-714: app-* services are profile-gated (client/admin/rescue/full) so
    # devs can boot a single frontend. Mark their dependencies optional so
    # nginx still starts under any profile combination — including the "plain"
    # `docker compose up` case where no app services are active.
    depends_on:
      app-client:
        condition: service_started
        required: false
      app-admin:
        condition: service_started
        required: false
      app-rescue:
        condition: service_started
        required: false
    restart: unless-stopped

  # ============================================================================
  # OBSERVABILITY STACK (profile: observability)
  # ----------------------------------------------------------------------------
  # Opt-in log aggregator. Bring up with:
  #   docker compose --profile observability up -d loki grafana
  # The backend container ships logs via winston-loki when LOKI_URL is set;
  # add LOKI_URL=http://loki:3100 to your .env to enable.
  # ============================================================================

  loki:
    profiles: ["observability", "full"]
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      <<: *hc-observability-timing
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1']

  prometheus:
    profiles: ["observability", "full"]
    image: prom/prometheus:v3.1.0
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    healthcheck:
      <<: *hc-observability-timing
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9090/-/ready || exit 1']

  grafana:
    profiles: ["observability", "full"]
    image: grafana/grafana:11.3.0
    ports:
      - '127.0.0.1:3030:3000'
    environment:
      # ADS-925: anonymous Admin let any SSRF-capable container on the shared
      # network reach Grafana at http://grafana:3000/ and get Admin for free.
      # ADS-968: anonymous access is now OFF by default (a loopback-reachable
      # anonymous Viewer is still a free look for any locally-listening
      # process/container, and it was one `admin/admin` guess away from full
      # Admin since no GF_SECURITY_ADMIN_PASSWORD was ever set). Devs who want
      # read-only anonymous dashboards can opt in with
      # GRAFANA_ANONYMOUS_ENABLED=true in .env — see observability/grafana/README.md.
      # The admin password is a real secret now, generated by
      # `pnpm secrets:generate` / `pnpm bootstrap` like the other app secrets;
      # compose refuses to start Grafana without it.
      GF_AUTH_ANONYMOUS_ENABLED: '${GRAFANA_ANONYMOUS_ENABLED:-false}'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Viewer'
      GF_AUTH_DISABLE_LOGIN_FORM: 'false'
      GF_SECURITY_ADMIN_PASSWORD: '${GF_SECURITY_ADMIN_PASSWORD:?Error: GF_SECURITY_ADMIN_PASSWORD required — run pnpm secrets:generate}'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # EXTRACTED MICROSERVICES (CAD-style). Opt-in via `--profile services`.
  # The gateway is the single REST surface fronting /api/* and routes each
  # domain to its gRPC service. gRPC URL defaults in the gateway config
  # (service-<name>:<port>) match these container names.
  # ==========================================================================

  service-gateway:
    profiles: ['services', 'full']
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.gateway'
        SERVICE_DIR: services/gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NATS_URL: nats://nats:4222
      # Shared Redis store for cross-replica rate limiting (ADS-805).
      # Same Redis the other microservices use; the gateway gets its own
      # key namespace via the plugin's default nameSpace.
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # ADS-800: same shared key as the *ms-env services — the gateway is
      # the signer, the services are the verifiers.
      PRINCIPAL_SIGNING_KEY: ${PRINCIPAL_SIGNING_KEY:-}
      # Global per-IP rate limit (req/min). Defaults to the production-like 100
      # so dev is unchanged; the e2e CI stack raises it via .env — a full
      # Playwright run drives the whole SPA (favourites, chats, notifications,
      # permissions, legal, match, csrf) from a single docker-side IP, bursting
      # past 100/min.
      GATEWAY_RATE_LIMIT_MAX: ${GATEWAY_RATE_LIMIT_MAX:-100}
      # Per-route auth limits (login/register/...). Unset in dev/prod (strict
      # anti-abuse defaults stand); the e2e stack raises it so a full Playwright
      # run's many logins from one IP don't trip the 10/min login cap.
      GATEWAY_AUTH_RATE_LIMIT_MAX: ${GATEWAY_AUTH_RATE_LIMIT_MAX:-}
      # ADS-871 test-only token-peek seam. OFF unless E2E_TOKEN_PEEK=true (the
      # e2e CI stack sets it; dev/prod leave it unset). The gateway refuses to
      # boot with this on under NODE_ENV=production, and the seam additionally
      # needs DATABASE_URL — which is only wired here for the seam's direct
      # reads of the one-time reset/verify/invitation tokens.
      E2E_TOKEN_PEEK: ${E2E_TOKEN_PEEK:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-adopt_user}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-adopt_dont_shop_dev}
    ports:
      - '127.0.0.1:4000:4000'
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      # ADS-871: the test-only token-peek seam reads tokens straight from
      # Postgres, so the gateway now needs the database up. (The seam is OFF
      # unless E2E_TOKEN_PEEK=true; the dependency is harmless when it's off.)
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/health/simple']

  service-notifications:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.notifications'
        SERVICE_DIR: services/notifications
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5001:5001'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5001/health/simple']

  service-auth:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.auth'
        SERVICE_DIR: services/auth
    environment:
      <<: *ms-env
      JWT_SECRET: '${JWT_SECRET:?Error: JWT_SECRET required}'
      JWT_REFRESH_SECRET: '${JWT_REFRESH_SECRET:?Error: JWT_REFRESH_SECRET required}'
      # ADS-914: AES-256-GCM key for encrypting TOTP 2FA secrets at rest.
      ENCRYPTION_KEY: '${ENCRYPTION_KEY:?Error: ENCRYPTION_KEY required}'
    ports:
      - '127.0.0.1:5002:5002'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5002/health/simple']

  service-pets:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.pets'
        SERVICE_DIR: services/pets
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5003:5003'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5003/health/simple']

  service-rescue:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.rescue'
        SERVICE_DIR: services/rescue
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5004:5004'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5004/health/simple']

  service-applications:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.applications'
        SERVICE_DIR: services/applications
    environment:
      <<: *ms-env
      PETS_GRPC_URL: service-pets:6003
    ports:
      - '127.0.0.1:5005:5005'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5005/health/simple']

  service-chat:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.chat'
        SERVICE_DIR: services/chat
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5006:5006'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5006/health/simple']

  service-moderation:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.moderation'
        SERVICE_DIR: services/moderation
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5007:5007'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5007/health/simple']

  service-matching:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.matching'
        SERVICE_DIR: services/matching
    environment:
      <<: *ms-env
      PETS_GRPC_URL: service-pets:6003
    ports:
      - '127.0.0.1:5008:5008'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5008/health/simple']

  service-audit:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.audit'
        SERVICE_DIR: services/audit
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5009:5009'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5009/health/simple']

  # ADS-898: this block was missing entirely — service-cms existed in the
  # codebase (services/cms/), was wired into the gateway
  # (config.ts's DEFAULT_CMS_GRPC_URL) and the deploy pipeline, but had no
  # local dev container, so `pnpm docker:dev --profile full` never actually
  # started it. Found while writing docs/infrastructure/new-microservice.md.
  service-cms:
    <<: *service-defaults
    build:
      <<: *service-build-defaults
      args:
        SERVICE: '@adopt-dont-shop/service.cms'
        SERVICE_DIR: services/cms
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5010:5010'
    healthcheck:
      <<: *hc-standard-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5010/health/simple']

# ============================================================================
# VOLUMES - Simplified to only what's needed
# ============================================================================

volumes:
  postgres_data:
  redis_data:
  nats_data:
  lib_types_node_modules:
  loki_data:
  grafana_data:
  prometheus_data:

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  default:
    name: adopt-dont-shop-network

# ============================================================================
# DOCKER SECRETS (ADS-878)
# ============================================================================
# File-mounted at /run/secrets/<name>, invisible to `docker inspect`.
# `pnpm docker:dev` materialises ./secrets/redis_password from .env's
# REDIS_PASSWORD before bringing the stack up (see scripts/docker-dev.mjs).
secrets:
  redis_password:
    file: ./secrets/redis_password
