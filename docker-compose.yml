# 🚀 OPTIMIZED Docker Compose - Industry Standard Monorepo Pattern
# Eliminates unnecessary library services and uses npm workspace
# Performance: 5-8 minutes instead of 60+ minutes

services:
  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================

  # Database service - Single database for all microservices
  # Environment Separation Strategy:
  # - Development: adopt_dont_shop_dev (default in Docker)
  # - Test: adopt_dont_shop_test (CI/CD creates separately)
  # - Production: adopt_dont_shop_prod (separate infrastructure)
  #
  # ⚠️ SECURITY: Requires POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB in .env file
  # Development uses sensible defaults, production MUST override
  database:
    image: postgis/postgis:16-3.4
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      # Development defaults - MUST be overridden for production
      POSTGRES_USER: ${POSTGRES_USER:-adopt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-adopt_dont_shop_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-adopt_user} -d ${POSTGRES_DB:-adopt_dont_shop_dev}']
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS JetStream — async event bus between backend microservices.
  # Phase 0 foundation (ADS-microservices migration). Mirrors the CAD pattern:
  # publish-after-commit from each service, idempotent subscribers fan out to
  # consumers. JetStream enables durable consumers + replay; without `-js`
  # NATS is core pub/sub only (lost on disconnect). Monitoring port 8222 is
  # used by the healthcheck and by `nats-top` / curl probes for ops.
  nats:
    image: nats:2.10-alpine
    restart: always
    ports:
      - '127.0.0.1:4222:4222'  # client protocol
      - '127.0.0.1:8222:8222'  # monitoring + healthz
    command: '-js -sd /data -m 8222'
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    command: "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required (run `npm run secrets:generate` or copy .env.example)}"
    # REDIS_PASSWORD must be in the container env (not just interpolated into
    # `command`) so the healthcheck's `redis-cli -a "$$REDIS_PASSWORD"` can
    # authenticate — otherwise it gets NOAUTH, never reports healthy, and
    # dependents gated on `service_healthy` fail to start.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # BACKEND SERVICE
  # ============================================================================

  # Main backend service - Connects to single database
  service-backend:
    build:
      context: .
      dockerfile: ./service.backend/Dockerfile
      target: development
    ports:
      - '127.0.0.1:5000:5000'
    volumes:
      - ./service.backend:/app/service.backend
      - ./lib.types:/app/lib.types
      - /app/service.backend/node_modules
      - lib_types_node_modules:/app/lib.types/node_modules
      - ./uploads:/app/service.backend/uploads
      # legal-content.service.ts reads markdown from /app/docs/legal/*.md
      - ./docs:/app/docs:ro
    entrypoint: /app/service.backend/docker-entrypoint.sh
    command: npm run dev
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      # Database configuration - using backend's expected variable names
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${POSTGRES_USER:-adopt_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DEV_DB_NAME: ${POSTGRES_DB:-adopt_dont_shop_dev}
      DB_LOGGING: ${DB_LOGGING:-false}
      # Development mode configuration
      FORCE_SEED: ${FORCE_SEED:-false}
      # ADS-536: deterministic seed password for local + CI fixtures. Without
      # this the seeder mints a fresh random password each run, which breaks
      # the Playwright `john.smith@gmail.com / DevPassword123!` API probe in
      # global-setup.ts. docker-compose.prod.yml sets FORCE_SEED=false so the
      # seeder doesn't run in production at all.
      SEED_PASSWORD: ${SEED_PASSWORD:-DevPassword123!}
      # Redis configuration. The backend's lib/redis.ts and BullMQ scheduler
      # read REDIS_URL — without it Redis stays disabled, the /health probe
      # returns 503 (ADS-446/460), and the docker healthcheck fails. Build it
      # from the discrete vars so existing per-component overrides still work.
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Error: REDIS_PASSWORD required}"
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}}
      # Security - JWT tokens (REQUIRED)
      JWT_SECRET: "${JWT_SECRET:?Error: JWT_SECRET required}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?Error: JWT_REFRESH_SECRET required}"
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Security - Session & CSRF
      SESSION_SECRET: "${SESSION_SECRET:?Error: SESSION_SECRET required}"
      CSRF_SECRET: "${CSRF_SECRET:?Error: CSRF_SECRET required}"
      # Security - Encryption key for at-rest secrets (TOTP).
      # 64 hex chars = 32 bytes for AES-256. Required by env validation.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_URL: ${API_URL:-http://api.localhost}
      # URL the user clicks in verification / password-reset emails.
      # Default to app.client (3000); override per-env.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGIN: "${CORS_ORIGIN:?Error: CORS_ORIGIN required (set to comma-separated allowed origins, e.g. http://localhost:3000,http://localhost:3001,http://localhost:3002)}"
      # Loki log shipping (optional). When set, winston-loki ships every log
      # line (including audit events tagged `audit: true`) to the Loki
      # service. Leave unset in dev to keep logs to console + file only.
      LOKI_URL: ${LOKI_URL:-}
      # File watching for hot reload — polling is only needed on macOS/Windows
      # where Docker bind-mounts cross a VM boundary and don't propagate
      # inotify events. Linux contributors should leave these unset.
      # See docs/DOCKER.md "Hot reload" and ADS-766.
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck so a crash-looping backend is caught by Docker health
    # machinery and dependents can wait on service_healthy. [ADS-449, ADS-463]
    healthcheck:
      # ADS-545: probe /health/simple (cheap, no service detail leak).
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:5000/health/simple || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1.0'

  # ============================================================================
  # LIB.TYPES WATCHER - Continuously compiles lib.types so the backend picks
  # up changes automatically via the workspace symlink (no manual rebuild)
  # ============================================================================

  lib-types-watcher:
    image: node:22.15.1-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - lib_types_node_modules:/app/lib.types/node_modules
    command: sh -c "npm install --workspace=@adopt-dont-shop/lib.types --include-workspace-root --prefer-offline && npm run -w @adopt-dont-shop/lib.types dev"
    restart: unless-stopped

  # ============================================================================
  # FRONTEND APPLICATIONS - Using Optimized Workspace Pattern
  # ============================================================================

  # Admin application - Internal rescue management
  app-admin:
    profiles: ["admin", "full"]
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: development
      args:
        APP_NAME: app.admin
    ports:
      - '127.0.0.1:3001:3000'
    volumes:
      # Single workspace mount - npm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/app.admin/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DOCKER_ENV: 'true'
      VITE_API_BASE_URL: ''
      VITE_WS_BASE_URL: ws://localhost:5000
      # File-watcher polling — only set on macOS/Windows (see ADS-766).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
      CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
      NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'
    depends_on:
      - service-backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g

  # Client application - Public-facing adoption portal
  app-client:
    profiles: ["client", "full"]
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: development
      args:
        APP_NAME: app.client
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      # Single workspace mount - npm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/app.client/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DOCKER_ENV: 'true'
      VITE_API_BASE_URL: ''
      VITE_WS_BASE_URL: ws://localhost:5000
      # File-watcher polling — only set on macOS/Windows (see ADS-766).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
      CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
      NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'
    depends_on:
      - service-backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g

  # Rescue application - Rescue organization portal
  app-rescue:
    profiles: ["rescue", "full"]
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: development
      args:
        APP_NAME: app.rescue
    ports:
      - '127.0.0.1:3002:3000'
    volumes:
      # Single workspace mount - npm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/app.rescue/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DOCKER_ENV: 'true'
      VITE_API_BASE_URL: ''
      VITE_WS_BASE_URL: ws://localhost:5000
      # File-watcher polling — only set on macOS/Windows (see ADS-766).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
      CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-}
      FAST_REFRESH: true
      NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'
    depends_on:
      - service-backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g

  # ============================================================================
  # REVERSE PROXY
  # ============================================================================

  # Nginx reverse proxy with subdomain routing
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '127.0.0.1:80:80'
      - '127.0.0.1:443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # ADS-714: app-* services are profile-gated (client/admin/rescue/full) so
    # devs can boot a single frontend. Mark their dependencies optional so
    # nginx still starts under any profile combination — including the "plain"
    # `docker compose up` case where no app services are active.
    depends_on:
      service-backend:
        condition: service_started
      app-client:
        condition: service_started
        required: false
      app-admin:
        condition: service_started
        required: false
      app-rescue:
        condition: service_started
        required: false
    restart: unless-stopped

  # ============================================================================
  # OBSERVABILITY STACK (profile: observability)
  # ----------------------------------------------------------------------------
  # Opt-in log aggregator. Bring up with:
  #   docker compose --profile observability up -d loki grafana
  # The backend container ships logs via winston-loki when LOKI_URL is set;
  # add LOKI_URL=http://loki:3100 to your .env to enable.
  # ============================================================================

  loki:
    profiles: ["observability", "full"]
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    profiles: ["observability", "full"]
    image: grafana/grafana:11.3.0
    ports:
      - '127.0.0.1:3030:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

# ============================================================================
# VOLUMES - Simplified to only what's needed
# ============================================================================

volumes:
  postgres_data:
  redis_data:
  nats_data:
  lib_types_node_modules:
  loki_data:
  grafana_data:

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  default:
    name: adopt-dont-shop-network
