# 🚀 OPTIMIZED Docker Compose - Industry Standard Monorepo Pattern
# Eliminates unnecessary library services and uses npm workspace
# Performance: 5-8 minutes instead of 60+ minutes

# ----------------------------------------------------------------------------
# Extracted-microservices shared config (anchors). The CAD-style services
# (services/*) run under the `services` / `full` profiles so the default
# `docker compose up` is unchanged (monolith-only). Bring the full topology
# up with:  docker compose --profile services up --build
# All extracted services share one Postgres (schema-per-service) + NATS + Redis.
# ----------------------------------------------------------------------------
x-service-env: &ms-env
  NODE_ENV: ${NODE_ENV:-development}
  DATABASE_URL: postgresql://${POSTGRES_USER:-adopt_user}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-adopt_dont_shop_dev}
  NATS_URL: nats://nats:4222
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

x-service-deps: &ms-deps
  database:
    condition: service_healthy
  nats:
    condition: service_healthy

services:
  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================

  # Database service - Single database for all microservices
  # Environment Separation Strategy:
  # - Development: adopt_dont_shop_dev (default in Docker)
  # - Test: adopt_dont_shop_test (CI/CD creates separately)
  # - Production: adopt_dont_shop_prod (separate infrastructure)
  #
  # ⚠️ SECURITY: Requires POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB in .env file
  # Development uses sensible defaults, production MUST override
  database:
    image: postgis/postgis:16-3.4
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      # Development defaults - MUST be overridden for production
      POSTGRES_USER: ${POSTGRES_USER:-adopt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-adopt_dont_shop_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-adopt_user} -d ${POSTGRES_DB:-adopt_dont_shop_dev}']
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS JetStream — async event bus between backend microservices.
  # Phase 0 foundation (ADS-microservices migration). Mirrors the CAD pattern:
  # publish-after-commit from each service, idempotent subscribers fan out to
  # consumers. JetStream enables durable consumers + replay; without `-js`
  # NATS is core pub/sub only (lost on disconnect). Monitoring port 8222 is
  # used by the healthcheck and by `nats-top` / curl probes for ops.
  nats:
    image: nats:2.10-alpine
    restart: always
    ports:
      - '127.0.0.1:4222:4222'  # client protocol
      - '127.0.0.1:8222:8222'  # monitoring + healthz
    command: '-js -sd /data -m 8222'
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    command: "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required (run `npm run secrets:generate` or copy .env.example)}"
    # REDIS_PASSWORD must be in the container env (not just interpolated into
    # `command`) so the healthcheck's `redis-cli -a "$$REDIS_PASSWORD"` can
    # authenticate — otherwise it gets NOAUTH, never reports healthy, and
    # dependents gated on `service_healthy` fail to start.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # LIB.TYPES WATCHER - Continuously compiles lib.types so the backend picks
  # up changes automatically via the workspace symlink (no manual rebuild)
  # ============================================================================

  lib-types-watcher:
    image: node:22.15.1-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - lib_types_node_modules:/app/lib.types/node_modules
    command: sh -c "npm install --workspace=@adopt-dont-shop/lib.types --include-workspace-root --prefer-offline && npm run -w @adopt-dont-shop/lib.types dev"
    restart: unless-stopped

  # ============================================================================
  # FRONTEND APPLICATIONS - Using Optimized Workspace Pattern
  # ============================================================================

  # Admin application - Internal rescue management
  app-admin:
    profiles: ["admin", "full"]
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: development
      args:
        APP_NAME: app.admin
    ports:
      - '127.0.0.1:3001:3000'
    volumes:
      # Single workspace mount - npm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/app.admin/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DOCKER_ENV: 'true'
      VITE_API_BASE_URL: ''
      VITE_WS_BASE_URL: ws://localhost:5000
      # File-watcher polling — only set on macOS/Windows (see ADS-766).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
      CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
      NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g

  # Client application - Public-facing adoption portal
  app-client:
    profiles: ["client", "full"]
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: development
      args:
        APP_NAME: app.client
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      # Single workspace mount - npm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/app.client/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DOCKER_ENV: 'true'
      VITE_API_BASE_URL: ''
      VITE_WS_BASE_URL: ws://localhost:5000
      # File-watcher polling — only set on macOS/Windows (see ADS-766).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
      CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
      NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g

  # Rescue application - Rescue organization portal
  app-rescue:
    profiles: ["rescue", "full"]
    build:
      context: .
      dockerfile: Dockerfile.app.optimized
      target: development
      args:
        APP_NAME: app.rescue
    ports:
      - '127.0.0.1:3002:3000'
    volumes:
      # Single workspace mount - npm workspace handles library resolution
      - .:/app
      - /app/node_modules
      - /app/app.rescue/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DOCKER_ENV: 'true'
      VITE_API_BASE_URL: ''
      VITE_WS_BASE_URL: ws://localhost:5000
      # File-watcher polling — only set on macOS/Windows (see ADS-766).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-}
      CHOKIDAR_AWAITWRITEFINISH: ${CHOKIDAR_AWAITWRITEFINISH:-}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-}
      FAST_REFRESH: true
      NODE_OPTIONS: '--max-old-space-size=3072 --max-semi-space-size=128'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    memswap_limit: 2g

  # ============================================================================
  # REVERSE PROXY
  # ============================================================================

  # Nginx reverse proxy with subdomain routing.
  #
  # Profile-gated (proxy / full) — without this, nginx would start on EVERY
  # `docker compose up` (including the bare/services-only invocation used by
  # CI's two-step boot), then crash-loop because its upstream `app-client:3000`
  # DNS doesn't resolve until the app-* services come up. Adding it to the
  # `full` profile means it only boots when the apps that back its upstreams
  # are also part of the start command, and `proxy` lets devs opt into nginx
  # alongside a single frontend profile when they want subdomain routing.
  nginx:
    profiles: ['proxy', 'full']
    image: nginx:1.27-alpine
    ports:
      - '127.0.0.1:80:80'
      - '127.0.0.1:443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # ADS-714: app-* services are profile-gated (client/admin/rescue/full) so
    # devs can boot a single frontend. Mark their dependencies optional so
    # nginx still starts under any profile combination — including the "plain"
    # `docker compose up` case where no app services are active.
    depends_on:
      app-client:
        condition: service_started
        required: false
      app-admin:
        condition: service_started
        required: false
      app-rescue:
        condition: service_started
        required: false
    restart: unless-stopped

  # ============================================================================
  # OBSERVABILITY STACK (profile: observability)
  # ----------------------------------------------------------------------------
  # Opt-in log aggregator. Bring up with:
  #   docker compose --profile observability up -d loki grafana
  # The backend container ships logs via winston-loki when LOKI_URL is set;
  # add LOKI_URL=http://loki:3100 to your .env to enable.
  # ============================================================================

  loki:
    profiles: ["observability", "full"]
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    profiles: ["observability", "full"]
    image: grafana/grafana:11.3.0
    ports:
      - '127.0.0.1:3030:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # EXTRACTED MICROSERVICES (CAD-style). Opt-in via `--profile services`.
  # The gateway fronts /api/* and proxies to the monolith for every domain
  # whose CUTOVER_<DOMAIN> flag is off (the default), so bringing these up
  # changes nothing until a flag is flipped. gRPC URL defaults in the gateway
  # config (service-<name>:<port>) match these container names.
  # ==========================================================================

  service-gateway:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.gateway'
        SERVICE_DIR: services/gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NATS_URL: nats://nats:4222
      # Phase 11: the monolith is deleted, so there is no proxy fall-through —
      # a domain whose flag is off just 404s at the gateway. Dev and e2e want
      # every extracted domain live, so default each flag on (overridable via
      # .env). Without these the gateway registers no /api/v1/* routes at all.
      CUTOVER_AUTH: ${CUTOVER_AUTH:-true}
      CUTOVER_NOTIFICATIONS: ${CUTOVER_NOTIFICATIONS:-true}
      CUTOVER_PETS: ${CUTOVER_PETS:-true}
      CUTOVER_RESCUE: ${CUTOVER_RESCUE:-true}
      CUTOVER_APPLICATIONS: ${CUTOVER_APPLICATIONS:-true}
      CUTOVER_MODERATION: ${CUTOVER_MODERATION:-true}
      CUTOVER_MATCHING: ${CUTOVER_MATCHING:-true}
      CUTOVER_AUDIT: ${CUTOVER_AUDIT:-true}
      CUTOVER_CHAT: ${CUTOVER_CHAT:-true}
      CUTOVER_CMS: ${CUTOVER_CMS:-true}
    ports:
      - '127.0.0.1:4000:4000'
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-notifications:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.notifications'
        SERVICE_DIR: services/notifications
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5001:5001'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5001/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-auth:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.auth'
        SERVICE_DIR: services/auth
    environment:
      <<: *ms-env
      JWT_SECRET: '${JWT_SECRET:?Error: JWT_SECRET required}'
      JWT_REFRESH_SECRET: '${JWT_REFRESH_SECRET:?Error: JWT_REFRESH_SECRET required}'
    ports:
      - '127.0.0.1:5002:5002'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5002/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-pets:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.pets'
        SERVICE_DIR: services/pets
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5003:5003'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5003/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-rescue:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.rescue'
        SERVICE_DIR: services/rescue
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5004:5004'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5004/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-applications:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.applications'
        SERVICE_DIR: services/applications
    environment:
      <<: *ms-env
      PETS_GRPC_URL: service-pets:6003
    ports:
      - '127.0.0.1:5005:5005'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5005/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-moderation:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.moderation'
        SERVICE_DIR: services/moderation
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5007:5007'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5007/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-matching:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.matching'
        SERVICE_DIR: services/matching
    environment:
      <<: *ms-env
      PETS_GRPC_URL: service-pets:6003
    ports:
      - '127.0.0.1:5008:5008'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5008/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  service-audit:
    profiles: ['services', 'full']
    build:
      context: .
      dockerfile: Dockerfile.service
      target: development
      args:
        SERVICE: '@adopt-dont-shop/service.audit'
        SERVICE_DIR: services/audit
    environment:
      <<: *ms-env
    ports:
      - '127.0.0.1:5009:5009'
    depends_on: *ms-deps
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5009/health/simple']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

# ============================================================================
# VOLUMES - Simplified to only what's needed
# ============================================================================

volumes:
  postgres_data:
  redis_data:
  nats_data:
  lib_types_node_modules:
  loki_data:
  grafana_data:

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  default:
    name: adopt-dont-shop-network
