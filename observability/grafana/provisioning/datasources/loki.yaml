apiVersion: 1

# Auto-provisioned Loki datasource. Grafana picks this up on boot via the
# bind-mount in docker-compose.yml (grafana service, observability profile).
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
