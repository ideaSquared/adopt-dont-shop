    container_name: ads_staging_rescue
    restart: always
    # ADS-701: nginx runs unprivileged and listens on 8080.
    expose:
      - "8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/']
      interval: 30s
      timeout: 10s
      retries: 3
