# ============================================================================
# Staging Docker Compose — pulls pre-built images from GHCR
# ============================================================================
# Runs on the same server as production, isolated network + volumes.
# Nginx/SSL handled by the gateway stack (deploy/gateway/docker-compose.gateway.yml).
# Deploy via .github/workflows/deploy.yml (sets DEPLOY_SHA in .env).
# ============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  database:
    image: postgis/postgis:16-3.4
    container_name: ads_staging_db
    restart: always
    ports: []
    # ADS-752: read the DB password from the file-mounted Docker secret
    # rather than the env var. POSTGRES_PASSWORD_FILE is honoured by the
    # postgres entrypoint and keeps the value out of `docker inspect`.
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?Error: POSTGRES_USER required}"
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: "${POSTGRES_DB:?Error: POSTGRES_DB required}"
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
        reservations:
          cpus: '0.25'
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: ads_staging_redis
    restart: always
    ports: []
    volumes:
      - redis_data:/data
    command: "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD required}"
    # REDIS_PASSWORD must be in the container env (not just interpolated into
    # `command`) so the healthcheck's `redis-cli -a "$$REDIS_PASSWORD"` can
    # authenticate — without it the check gets NOAUTH and never goes healthy.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

  # NATS JetStream — the event backbone for the extracted services
  # (publish-after-commit + idempotent subscribers). Required once any
  # CUTOVER_<DOMAIN> flag is flipped on; harmless when all are off.
  nats:
    image: nats:2.10-alpine
    container_name: ads_staging_nats
    restart: always
    ports: []
    command: '-js -sd /data -m 8222'
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

  # One-shot init container: applies pending migrations before the backend
  # starts. [ADS-393]
  service-backend-migrate:
    image: ghcr.io/ideasquared/adopt-dont-shop/backend:${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}
    container_name: ads_staging_backend_migrate
    restart: 'no'
    command: ['node', 'dist/migrations/runner.js', 'up']
    working_dir: /app/service.backend
    environment:
      NODE_ENV: production
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: "${POSTGRES_USER:?Error: POSTGRES_USER required}"
      # ADS-752: DB_PASSWORD is read from /run/secrets/db_password via
      # readSecretOrEnv() (config/env.ts). Same file-secret pattern as prod;
      # no plaintext env var is left to leak via `docker inspect`.
      PROD_DB_NAME: "${POSTGRES_DB:?Error: POSTGRES_DB required}"
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      ALLOW_INSECURE_DB: ${ALLOW_INSECURE_DB:-}
      DB_SSL_ROOT_CERT: ${DB_SSL_ROOT_CERT:-}
    secrets:
      - db_password
    depends_on:
      database:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256m

  service-backend:
    image: ghcr.io/ideasquared/adopt-dont-shop/backend:${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}
    container_name: ads_staging_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: "${POSTGRES_USER:?Error: POSTGRES_USER required}"
      # ADS-752: every signing/credential secret below is mounted at
      # /run/secrets/<lowercase-name> and read by readSecretOrEnv()
      # (service.backend/src/config/env.ts). Do NOT add plaintext env
      # equivalents — secret files take priority and the env value would
      # show up in `docker inspect`.
      PROD_DB_NAME: "${POSTGRES_DB:?Error: POSTGRES_DB required}"
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: "${API_URL:?Error: API_URL required}"
      CORS_ORIGIN: "${CORS_ORIGIN:?Error: CORS_ORIGIN required}"
      FRONTEND_URL: "${FRONTEND_URL:?Error: FRONTEND_URL required}"
      RESCUE_FRONTEND_URL: "${RESCUE_FRONTEND_URL:?Error: RESCUE_FRONTEND_URL required}"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-staging@adoptdontshop.com}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-${EMAIL_FROM:-staging@adoptdontshop.com}}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-${EMAIL_FROM:-staging@adoptdontshop.com}}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-${EMAIL_FROM:-staging@adoptdontshop.com}}
      STATSIG_SERVER_SECRET_KEY: ${STATSIG_SERVER_SECRET_KEY:-}
      WORKER_ENABLED: ${WORKER_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-logs}
      SMS_DEFAULT_COUNTRY_CODE: ${SMS_DEFAULT_COUNTRY_CODE:-GB}
      JWT_REPORT_SHARE_SECRET: ${JWT_REPORT_SHARE_SECRET:-}
      # UPLOAD_SIGNING_SECRET now read from /run/secrets/upload_signing_secret (ADS-752).
      # Staging has no per-stack nginx; backend serves /uploads itself.
      SERVE_LOCAL_UPLOADS: "true"
      FORCE_SEED: "false"
      DB_LOGGING: "false"
      DEBUG_ERRORS: "false"
    volumes:
      - uploads:/app/uploads
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    expose:
      - "5000"
    healthcheck:
      # ADS-545: probe /health/simple (cheap, no service detail leak).
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health/simple']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # ADS-752: secrets mounted at /run/secrets/<name>; backend reads via
    # readSecretOrEnv() (config/env.ts) with env-var fallback.
    secrets:
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
      - csrf_secret
      - encryption_key
      - upload_signing_secret
      - db_password
      - redis_password
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-backend-migrate:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
        reservations:
          cpus: '0.25'
          memory: 256m

  app-client:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-client:${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}
    container_name: ads_staging_client
    restart: always
    # ADS-701: nginx runs unprivileged and listens on 8080.
    expose:
      - "8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
        reservations:
          cpus: '0.05'
          memory: 32m

  app-admin:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-admin:${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}
    container_name: ads_staging_admin
    restart: always
    # ADS-701: nginx runs unprivileged and listens on 8080.
    expose:
      - "8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
        reservations:
          cpus: '0.05'
          memory: 32m

  app-rescue:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-rescue:${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}
    container_name: ads_staging_rescue
    restart: always
    # ADS-701: nginx runs unprivileged and listens on 8080.
    expose:
      - "8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m
        reservations:
          cpus: '0.05'
          memory: 32m

volumes:
  postgres_data:
  redis_data:
  nats_data:
  uploads:

networks:
  default:
    name: ads-staging-network
    external: false

# ============================================================================
# Docker Secrets (ADS-752)
# ============================================================================
# Mounted as in-memory tmpfs files at /run/secrets/<name>; never written to
# disk and invisible to `docker inspect`. The backend reads these via
# readSecretOrEnv() (service.backend/src/config/env.ts). The deploy workflow
# (.github/workflows/deploy.yml) is responsible for materialising each
# secrets/<name> file on the host before running `docker compose up -d`
# (and removing them afterwards) — mirrors the existing production path.
secrets:
  jwt_secret:
    file: ./secrets/jwt_secret
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret
  session_secret:
    file: ./secrets/session_secret
  csrf_secret:
    file: ./secrets/csrf_secret
  encryption_key:
    file: ./secrets/encryption_key
  upload_signing_secret:
    file: ./secrets/upload_signing_secret
  db_password:
    file: ./secrets/db_password
  redis_password:
    file: ./secrets/redis_password
