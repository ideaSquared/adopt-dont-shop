# ============================================================================
# Staging Docker Compose — pulls pre-built images from GHCR
# ============================================================================
# Runs on the same server as production, isolated network + volumes.
# Nginx/SSL handled by the gateway stack (deploy/gateway/docker-compose.gateway.yml).
# Deploy via .github/workflows/deploy.yml (sets DEPLOY_SHA in .env).
# ============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# ----------------------------------------------------------------------------
# Shared config for the extracted gRPC services. Mirrors the dev
# docker-compose.yml `*-env` / `*-deps` anchors but for the prebuilt-image
# staging stack. Every service shares one Postgres (schema-per-service) + NATS
# + Redis and migrates its own schema on start (entrypoint runs
# `pnpm run --if-present db:migrate`).
#
# Credentials are sourced from file-mounted Docker secrets via the shared
# `@adopt-dont-shop/config-secrets` loader (readSecret/requireSecret) — each
# service reads e.g. DATABASE_URL_FILE / JWT_SECRET_FILE instead of the raw
# env value. The loader also accepts plaintext env vars (NAME=…) as a
# documented escape hatch, which is what the dev compose still uses.
# ----------------------------------------------------------------------------
x-service-common: &service-common
  restart: always
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging: *default-logging
  depends_on:
    database:
      condition: service_healthy
    nats:
      condition: service_healthy
  # Default secret mounts for every domain service: DATABASE_URL_FILE +
  # REDIS_URL_FILE come from these. Services that need additional secrets
  # (auth → jwt; gateway → upload signing) override this list.
  secrets:
    - database_url
    - redis_url
    - principal_signing_key
  # staging mirrors prod limits so performance regressions surface pre-prod (ADS-836)
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512m
      reservations:
        cpus: '0.1'
        memory: 128m

x-service-env: &service-env
  NODE_ENV: production
  # The loader (@adopt-dont-shop/config-secrets) reads ${NAME}_FILE when set
  # and falls back to ${NAME} otherwise. Staging gives every service the file
  # path; the deploy workflow materialises ./secrets/<name> on the host before
  # `docker compose up -d`.
  DATABASE_URL_FILE: /run/secrets/database_url
  NATS_URL: "nats://nats:4222"
  REDIS_URL_FILE: /run/secrets/redis_url
  # ADS-800: shared HMAC key for signed principal tokens. Present → each
  # service REQUIRES a valid x-principal-token (forged x-user-* headers
  # lose); the gateway signs with the same key.
  PRINCIPAL_SIGNING_KEY_FILE: /run/secrets/principal_signing_key

# Healthcheck timing tiers (mirrors the dev docker-compose.yml ADS-860
# standard): infra probes fast without a start_period (database) or with a
# short one (redis/nats); the gRPC services get a longer start_period to
# cover cold-start + migrations.
x-healthcheck-infra: &hc-infra-timing
  interval: 10s
  timeout: 5s
  retries: 5

x-healthcheck-service: &hc-service-timing
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

# Every app-* container (nginx serving a built SPA) shares this exact
# hardened shape — only image/container_name differ per app.
x-app-common: &app-common
  restart: always
  expose:
    - "8080"
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  healthcheck:
    test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/']
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  logging: *default-logging
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256m
      reservations:
        cpus: '0.1'
        memory: 64m

services:
  database:
    image: postgis/postgis:16-3.4@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5
    container_name: ads_staging_db
    restart: always
    ports: []
    # ADS-752: read the DB password from the file-mounted Docker secret
    # rather than the env var. POSTGRES_PASSWORD_FILE is honoured by the
    # postgres entrypoint and keeps the value out of `docker inspect`.
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?Error: POSTGRES_USER required}"
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: "${POSTGRES_DB:?Error: POSTGRES_DB required}"
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
        reservations:
          cpus: '0.5'
          memory: 512m

  redis:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: ads_staging_redis
    restart: always
    ports: []
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    # ADS-878: the password is read from the file-mounted secret at container
    # start rather than interpolated into `environment:`, which `docker
    # inspect` can read back in plaintext. The deploy workflow materialises
    # ./secrets/redis_password from the host .env's REDIS_PASSWORD.
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"'
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'redis-cli -a "$$(cat /run/secrets/redis_password)" ping | grep -q PONG']
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 128m

  # NATS JetStream — the event backbone for the extracted services
  # (publish-after-commit + idempotent subscribers).
  nats:
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    container_name: ads_staging_nats
    restart: always
    ports: []
    command: '-js -sd /data -m 8222'
    volumes:
      - nats_data:/data
    healthcheck:
      <<: *hc-infra-timing
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1']
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 128m

  # ==========================================================================
  # GATEWAY + EXTRACTED MICROSERVICES (replaces the service.backend monolith,
  # deleted in phase 11). The gateway is the REST/WS edge on :4000; every
  # domain service exposes HTTP health on :500x and gRPC on :600x. Service
  # *compose keys* (service-auth, …) are the DNS names the gateway's gRPC URL
  # defaults resolve, so the gateway needs no explicit *_GRPC_URL env.
  # ==========================================================================

  service-gateway:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-gateway:${SERVICE_GATEWAY_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_gateway
    environment:
      NODE_ENV: production
      NATS_URL: nats://nats:4222
      CORS_ORIGIN: "${CORS_ORIGIN:?Error: CORS_ORIGIN required}"
      # Staging has no per-stack nginx; the gateway serves /uploads itself.
      SERVE_LOCAL_UPLOADS: "true"
      UPLOAD_SIGNING_SECRET_FILE: /run/secrets/upload_signing_secret
      # ADS-800: the gateway signs the x-principal-token it forwards on
      # every downstream gRPC call.
      PRINCIPAL_SIGNING_KEY_FILE: /run/secrets/principal_signing_key
    # Gateway has no DB; it needs the upload-signing secret plus the
    # principal-signing key (ADS-800 — it is the token signer).
    secrets:
      - upload_signing_secret
      - principal_signing_key
    volumes:
      - uploads:/app/uploads
    expose:
      - "4000"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/health/simple']
    # The gateway only needs NATS + the downstream services; it has no DB.
    depends_on:
      nats:
        condition: service_healthy

  service-auth:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-auth:${SERVICE_AUTH_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_auth
    environment:
      <<: *service-env
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      # ADS-914: AES-256-GCM key for encrypting TOTP 2FA secrets at rest.
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
    # Auth needs the JWT signing secrets + the TOTP encryption key on top of
    # the common DB/Redis ones.
    secrets:
      - database_url
      - redis_url
      - jwt_secret
      - jwt_refresh_secret
      - encryption_key
      - principal_signing_key
    expose:
      - "5002"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5002/health/simple']

  service-notifications:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-notifications:${SERVICE_NOTIFICATIONS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_notifications
    environment:
      <<: *service-env
    expose:
      - "5001"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5001/health/simple']

  service-pets:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-pets:${SERVICE_PETS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_pets
    environment:
      <<: *service-env
    expose:
      - "5003"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5003/health/simple']

  service-rescue:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-rescue:${SERVICE_RESCUE_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_rescue_svc
    environment:
      <<: *service-env
    expose:
      - "5004"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5004/health/simple']

  service-applications:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-applications:${SERVICE_APPLICATIONS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_applications
    environment:
      <<: *service-env
      PETS_GRPC_URL: service-pets:6003
    expose:
      - "5005"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5005/health/simple']

  service-chat:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-chat:${SERVICE_CHAT_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_chat
    environment:
      <<: *service-env
    expose:
      - "5006"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5006/health/simple']

  service-moderation:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-moderation:${SERVICE_MODERATION_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_moderation
    environment:
      <<: *service-env
    expose:
      - "5007"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5007/health/simple']

  service-matching:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-matching:${SERVICE_MATCHING_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_matching
    environment:
      <<: *service-env
      PETS_GRPC_URL: service-pets:6003
    expose:
      - "5008"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5008/health/simple']

  service-audit:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-audit:${SERVICE_AUDIT_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_audit
    environment:
      <<: *service-env
    expose:
      - "5009"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5009/health/simple']

  service-cms:
    <<: *service-common
    image: ghcr.io/ideasquared/adopt-dont-shop/service-cms:${SERVICE_CMS_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_cms
    environment:
      <<: *service-env
    expose:
      - "5010"
    healthcheck:
      <<: *hc-service-timing
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5010/health/simple']

  app-client:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-client:${APP_CLIENT_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_client
    <<: *app-common

  app-admin:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-admin:${APP_ADMIN_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_admin
    <<: *app-common

  app-rescue:
    image: ghcr.io/ideasquared/adopt-dont-shop/app-rescue:${APP_RESCUE_TAG:-${DEPLOY_SHA:?DEPLOY_SHA must be set to a specific git SHA}}
    container_name: ads_staging_rescue
    <<: *app-common

volumes:
  postgres_data:
  redis_data:
  nats_data:
  uploads:

networks:
  default:
    name: ads-staging-network
    external: false

# ============================================================================
# Docker Secrets (ADS-752)
# ============================================================================
# Mounted as in-memory tmpfs files at /run/secrets/<name>; never written to
# disk and invisible to `docker inspect`. The database container reads
# db_password via POSTGRES_PASSWORD_FILE; the gRPC services read every other
# credential through the @adopt-dont-shop/config-secrets loader (NAME_FILE wins
# over NAME). The deploy workflow (.github/workflows/deploy.yml) materialises
# these files on the host before `docker compose up -d`.
secrets:
  db_password:
    file: ./secrets/db_password
  database_url:
    file: ./secrets/database_url
  redis_url:
    file: ./secrets/redis_url
  redis_password:
    file: ./secrets/redis_password
  jwt_secret:
    file: ./secrets/jwt_secret
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret
  encryption_key:
    file: ./secrets/encryption_key
  upload_signing_secret:
    file: ./secrets/upload_signing_secret
  principal_signing_key:
    file: ./secrets/principal_signing_key
