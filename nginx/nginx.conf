# TLS termination is expected at an upstream load balancer / CDN
# (e.g. Cloudflare, AWS ALB, GCP HTTPS LB). This nginx receives
# plaintext on port 80 over the internal network. If you intend to
# terminate TLS here directly, add a `listen 443 ssl` block per
# server and a `listen 80; return 301 https://...;` redirect block.
# Cert provisioning is deployment-specific, hence not configured in-tree.
# [ADS-214]
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;
    # Default timeout for non-websocket proxy responses; websocket locations
    # override this to 86400s individually.
    proxy_read_timeout 60s;

    # Gzip compression — disabled for JSON API responses (BREACH attack mitigation).
    # Static assets and HTML are still compressed.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # ADS-962: Socket.IO handshakes are one-shot (not a steady request stream
    # like /api/), so a modest rate with a small burst absorbs page-load
    # reconnect storms without giving an unauthenticated flood room to hammer
    # service.auth's ValidateToken RPC.
    limit_req_zone $binary_remote_addr zone=socketio:10m rate=2r/s;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # Upstream servers
    # The Fastify gateway is the single REST/WS edge in front of the gRPC
    # microservices; it terminates Socket.IO itself (health: /health/simple).
    upstream backend {
        server service-gateway:4000;
    }

    upstream client {
        server app-client:3000;
    }

    upstream admin {
        server app-admin:3000;
    }

    upstream rescue {
        server app-rescue:3000;
    }

    # Admin subdomain server
    server {
        listen 80;
        server_name admin.localhost;

        # Security headers — mirrored at the edge so they survive
        # error responses and any path that bypasses the upstream app
        # (maintenance pages, misrouted requests). [ADS-214]
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS must not be sent over plain HTTP — removed from HTTP server block.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        # ADS-594: strict CSP — no 'unsafe-inline' / 'unsafe-eval' anywhere.
        # Inline `onload=` handler in index.html was removed (deferred stylesheet
        # promotion is now done via CSSOM from main.tsx). React's `style={{}}`
        # prop applies styles via CSSOM property assignment, which is not
        # constrained by `style-src-attr`, so no inline-attribute carve-out is
        # required. Google Fonts hosts are whitelisted explicitly.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Static asset caching — re-emit security headers so server-level
        # headers are not dropped when this location adds Cache-Control. [ADS-693]
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://admin;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
            proxy_set_header Host $host;
        }

        # Admin app
        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # 86400s timeout belongs on /socket.io/ only; default 60s applies here.
        }
    }

    # Rescue subdomain server
    server {
        listen 80;
        server_name rescue.localhost;

        # Security headers — mirrored at the edge so they survive
        # error responses and any path that bypasses the upstream app
        # (maintenance pages, misrouted requests). [ADS-214]
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS must not be sent over plain HTTP — removed from HTTP server block.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        # ADS-594: strict CSP — no 'unsafe-inline' / 'unsafe-eval' anywhere.
        # Inline `onload=` handler in index.html was removed (deferred stylesheet
        # promotion is now done via CSSOM from main.tsx). React's `style={{}}`
        # prop applies styles via CSSOM property assignment, which is not
        # constrained by `style-src-attr`, so no inline-attribute carve-out is
        # required. Google Fonts hosts are whitelisted explicitly.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Static asset caching — re-emit security headers so server-level
        # headers are not dropped when this location adds Cache-Control. [ADS-693]
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://rescue;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
            proxy_set_header Host $host;
        }

        # Rescue app
        location / {
            proxy_pass http://rescue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # 86400s timeout belongs on /socket.io/ only; default 60s applies here.
        }
    }

    # API subdomain server
    server {
        listen 80;
        server_name api.localhost;

        # Security headers — mirrored at the edge so they survive
        # error responses and any path that bypasses the upstream app
        # (maintenance pages, misrouted requests). [ADS-214]
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS must not be sent over plain HTTP — removed from HTTP server block.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        # ADS-594: strict CSP — no 'unsafe-inline' / 'unsafe-eval' anywhere.
        # Inline `onload=` handler in index.html was removed (deferred stylesheet
        # promotion is now done via CSSOM from main.tsx). React's `style={{}}`
        # prop applies styles via CSSOM property assignment, which is not
        # constrained by `style-src-attr`, so no inline-attribute carve-out is
        # required. Google Fonts hosts are whitelisted explicitly.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Block public Prometheus scrape endpoint, mirroring nginx.prod.conf.
        # Metrics must only be scraped by an internal Prometheus instance,
        # not exposed publicly. [ADS-932]
        location = /metrics {
            deny all;
            return 403;
        }

        # API routes
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Auth routes (stricter rate limiting)
        location /auth/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /socket.io/ {
            limit_req zone=socketio burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }
    }

    # Main client app server (default)
    server {
        listen 80 default_server;
        server_name localhost *.localhost;

        # Security headers — mirrored at the edge so they survive
        # error responses and any path that bypasses the upstream app
        # (maintenance pages, misrouted requests). [ADS-214]
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS must not be sent over plain HTTP — removed from HTTP server block.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        # ADS-594: strict CSP — no 'unsafe-inline' / 'unsafe-eval' anywhere.
        # Inline `onload=` handler in index.html was removed (deferred stylesheet
        # promotion is now done via CSSOM from main.tsx). React's `style={{}}`
        # prop applies styles via CSSOM property assignment, which is not
        # constrained by `style-src-attr`, so no inline-attribute carve-out is
        # required. Google Fonts hosts are whitelisted explicitly.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Static asset caching — re-emit security headers so server-level
        # headers are not dropped when this location adds Cache-Control. [ADS-693]
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://client;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
            proxy_set_header Host $host;
        }

        # API routes - proxy to backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Main client app (default)
        location / {
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # 86400s timeout belongs on /socket.io/ only; default 60s applies here.
        }
    }
}
