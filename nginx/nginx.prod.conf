# ============================================================================
# Production nginx configuration — TLS-terminated, HTTPS-only.
#
# Differences from the dev `nginx.conf`:
#   * HTTP/80 server is a redirect-only block; HSTS is emitted only on 443
#     so browsers never see HSTS over plain HTTP. [ADS-435]
#   * Content-Security-Policy drops `unsafe-inline` / `unsafe-eval` from
#     script-src and style-src; adds Google Fonts allowlist to style-src and
#     font-src; pins connect-src to api.__PROD_HOSTNAME__ (matches helmet).
#     [ADS-434, ADS-682]
#   * Default-server returns 444 (no response) for unknown Host headers
#     instead of catching `*.localhost`. [ADS-501]
#
# Cert provisioning is deployment-specific; mount your fullchain.pem +
# privkey.pem at /etc/nginx/ssl/ or use the bundled letsencrypt volume.
#
# DEPLOYMENT: Replace every `__PROD_HOSTNAME__` placeholder with your prod
# hostname (e.g. `adoptdontshop.example`) before mounting this file into the
# nginx container. nginx does not perform variable expansion in server_name
# directives, so this is a build-time substitution. See
# `docs/operations/deploy.md` for the documented procedure.
# ============================================================================
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;
    # Default timeout for non-websocket proxy responses; websocket locations
    # override this to 86400s individually.
    proxy_read_timeout 60s;

    # Gzip — disabled for JSON API responses (BREACH attack mitigation).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # ADS-962: Socket.IO handshakes are one-shot (not a steady request stream
    # like /api/), so a modest rate with a small burst absorbs page-load
    # reconnect storms without giving an unauthenticated flood room to hammer
    # service.auth's ValidateToken RPC.
    limit_req_zone $binary_remote_addr zone=socketio:10m rate=2r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # The Fastify gateway is the single REST/WS edge in front of the gRPC
    # microservices; it terminates Socket.IO itself (health: /health/simple).
    upstream backend { server service-gateway:4000; }
    # Frontend containers run the unprivileged nginx image and listen on 8080. [ADS-701]
    upstream client  { server app-client:8080; }
    upstream admin   { server app-admin:8080; }
    upstream rescue  { server app-rescue:8080; }

    # ------------------------------------------------------------------------
    # Shared SSL settings
    # ------------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    # ECDHE-only modern cipher list (Mozilla Intermediate compatibility).
    # ssl_prefer_server_ciphers off lets TLS 1.3 negotiate ciphers freely.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Strengthen TLS: disable session tickets (forward secrecy), enable OCSP stapling.
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.11 valid=30s;

    # ------------------------------------------------------------------------
    # Default server — closes connections from unknown Host headers (ADS-501).
    # 444 is nginx's "drop connection without response" sentinel.
    # Listens on both 80 and 443 so unrecognised hosts are dropped uniformly.
    # ------------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        http2 on;
        server_name _;
        return 444;
    }

    # ------------------------------------------------------------------------
    # HTTP -> HTTPS redirect for known hostnames. No HSTS here. [ADS-435]
    # ------------------------------------------------------------------------
    server {
        listen 80;
        server_name __PROD_HOSTNAME__ api.__PROD_HOSTNAME__ admin.__PROD_HOSTNAME__ rescue.__PROD_HOSTNAME__;
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------------------
    # Security headers — split into two parts:
    #   1. nginx/security-headers.conf: the six headers that are identical
    #      across vhosts (X-Frame-Options, X-Content-Type-Options,
    #      X-XSS-Protection, Referrer-Policy, HSTS, Permissions-Policy).
    #      Included from every 443 server block AND from every location block
    #      that uses its own `add_header` (nginx's add_header inheritance
    #      drops parent-scope headers as soon as a child scope defines one).
    #      [ADS-693, ADS-435]
    #   2. Content-Security-Policy is inlined per-vhost because the api
    #      vhost's CSP differs from the frontend vhosts (no Google Fonts,
    #      no api/wss connect-src). Re-set in any location block that uses
    #      add_header. [ADS-434, ADS-682, ADS-693]
    # ------------------------------------------------------------------------

    # ------------------------------------------------------------------------
    # Admin app
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.__PROD_HOSTNAME__;

        include /etc/nginx/security-headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://admin;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ------------------------------------------------------------------------
    # Rescue app
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name rescue.__PROD_HOSTNAME__;

        include /etc/nginx/security-headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://rescue;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://rescue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ------------------------------------------------------------------------
    # API
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name api.__PROD_HOSTNAME__;

        include /etc/nginx/security-headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

        # Block public Prometheus scrape endpoint. Metrics must only be
        # scraped by an internal Prometheus instance, not exposed publicly.
        location = /metrics {
            deny all;
            return 403;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /auth/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            limit_req zone=socketio burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }
    }

    # ------------------------------------------------------------------------
    # Main client app
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name __PROD_HOSTNAME__;

        include /etc/nginx/security-headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
            include /etc/nginx/security-headers.conf;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://client;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
            proxy_set_header Host $host;
        }

        # --------------------------------------------------------------------
        # ADS-422: nginx auth_request pattern for /uploads/.
        #
        # Flow:
        #   1. Client requests /uploads/<path>.
        #   2. nginx makes an internal subrequest to /_auth_uploads which
        #      proxies to the backend's /api/v1/uploads/authorize?path=<path>.
        #      The client's cookies and Authorization header are forwarded so
        #      the backend can authenticate identically to any other API call.
        #   3. Backend returns 200 (authorised) or 401/403/404 (denied).
        #   4. On 200, nginx streams the file directly from the shared volume
        #      — Node never touches the response body.
        #   5. On non-200, nginx returns the error status to the client.
        #
        # Cache headers: uploads use content-addressed filenames (hashed), so
        # `expires 1y` + `Cache-Control: public, immutable` is safe. nginx
        # overrides Cache-Control ONLY after the auth_request succeeds; a
        # denied request never reaches the root directive.
        # --------------------------------------------------------------------
        location /uploads/ {
            auth_request /_auth_uploads;
            auth_request_set $auth_status $upstream_status;

            # Serve from the shared Docker volume mounted at /srv/uploads.
            root /srv;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

            # Pass the original URI to the backend so it can log/audit it.
            auth_request_set $auth_original_uri $request_uri;

            # ADS-598: any historical SVG already on disk must be downloaded,
            # not rendered. New SVG uploads are rejected by the backend
            # allowlist, but this is belt-and-braces for legacy files.
            # Browsers won't execute embedded <script> / event handlers
            # when the response is application/octet-stream + attachment.
            location ~* \.svgz?$ {
                auth_request /_auth_uploads;
                root /srv;
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Content-Disposition "attachment" always;
                include /etc/nginx/security-headers.conf;
                add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.__PROD_HOSTNAME__ wss://api.__PROD_HOSTNAME__; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
                default_type application/octet-stream;
                types { }
            }
        }

        # Internal-only location: forwards the auth subrequest to the backend.
        # `internal` prevents external clients from calling it directly.
        location = /_auth_uploads {
            internal;
            proxy_pass http://backend/api/v1/uploads/authorize$is_args$args;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            # Forward auth credentials so the backend can authenticate the caller.
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
