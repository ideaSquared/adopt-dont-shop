# ============================================================================
# Shared security headers — included from every HTTPS server block AND from
# every location block that uses its own `add_header` directive.
#
# nginx's `add_header` inheritance rule: if a child context (location)
# defines ANY add_header, ALL add_header directives from the parent context
# are dropped at that scope. Without re-including this file inside such
# location blocks, the server-level security headers would be silently
# stripped from those responses. [ADS-693]
#
# HSTS is included here because this file is only included from 443/SSL
# server blocks — plain-HTTP responses never carry it. [ADS-435]
#
# Content-Security-Policy is NOT included here. CSP differs per vhost
# (admin/rescue/client allow the api subdomain in connect-src; the api
# vhost itself does not) so it is set inline in each server block and
# re-set in any location block that uses add_header. [ADS-682]
# ============================================================================

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
