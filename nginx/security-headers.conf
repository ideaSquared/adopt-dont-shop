# ============================================================================
# Shared security headers — included from every HTTPS server block AND from
# every location block that uses its own `add_header` directive.
#
# nginx's `add_header` inheritance rule: if a child context (location)
# defines ANY add_header, ALL add_header directives from the parent context
# are dropped at that scope. Without re-including this file inside such
# location blocks, the server-level security headers (CSP, HSTS, etc.) would
# be silently stripped from those responses. [ADS-693]
#
# HSTS is included here because this file is only included from 443/SSL
# server blocks — plain-HTTP responses never carry it. [ADS-435]
# CSP omits unsafe-inline / unsafe-eval on script-src. style-src keeps
# unsafe-inline for styled-components runtime style injection. [ADS-434]
# ============================================================================

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
