# /uploads is served by the per-stack nginx (which does an auth_request to
# the backend before streaming the file). The gateway just forwards it on.
# [ADS-422]
location /uploads/ {
    proxy_pass http://prod_nginx;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}
