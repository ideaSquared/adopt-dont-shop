# Staging serves /uploads directly through the backend (which still enforces
# auth via the upload routes themselves). The auth_request fast-path used in
# prod via per-stack nginx [ADS-422] is intentionally not wired up for staging.
location /uploads/ {
    proxy_pass http://staging_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}
