events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    server_tokens off;

    # Gzip — application/json excluded (BREACH attack mitigation).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # ADS-962: Socket.IO handshakes are one-shot (not a steady request stream
    # like /api/), so a modest rate with a small burst absorbs page-load
    # reconnect storms without giving an unauthenticated flood room to hammer
    # service.auth's ValidateToken RPC.
    limit_req_zone $binary_remote_addr zone=socketio:10m rate=2r/s;

    # ADS-915: this file is the PUBLIC edge — it terminates connections
    # directly from the internet, so it is the trust boundary for
    # X-Forwarded-For. Every proxy_set_header X-Forwarded-For below sets
    # $remote_addr (the real connecting IP), NOT $proxy_add_x_forwarded_for —
    # the latter APPENDS to whatever XFF value the client sent, letting an
    # attacker prepend an arbitrary spoofed IP that the gateway would then
    # trust. Overwriting discards the client-supplied value entirely so the
    # gateway (trustProxy: 1, one hop) always sees the real client.

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # =========================================================================
    # PRODUCTION UPSTREAMS
    # =========================================================================
    # The Fastify gateway is the REST/WS edge in front of the gRPC services;
    # it terminates Socket.IO and serves /api, /auth and /uploads (port 4000).
    upstream prod_backend {
        server ads_prod_gateway:4000;
    }
    # Frontend containers run the unprivileged nginx image and listen on 8080. [ADS-701]
    upstream prod_client {
        server ads_prod_client:8080;
    }
    upstream prod_admin {
        server ads_prod_admin:8080;
    }
    upstream prod_rescue {
        server ads_prod_rescue:8080;
    }

    # Per-stack nginx — handles /uploads via auth_request to the backend
    # [ADS-422]. Everything else is routed direct to backend/app containers.
    upstream prod_nginx {
        server ads_prod_nginx:80;
    }

    # =========================================================================
    # STAGING UPSTREAMS
    # =========================================================================
    # See prod_backend above — the gateway is the REST/WS edge (port 4000).
    upstream staging_backend {
        server ads_staging_gateway:4000;
    }
    # Frontend containers run the unprivileged nginx image and listen on 8080. [ADS-701]
    upstream staging_client {
        server ads_staging_client:8080;
    }
    upstream staging_admin {
        server ads_staging_admin:8080;
    }
    upstream staging_rescue {
        server ads_staging_rescue:8080;
    }


    # =========================================================================
    # HTTP → HTTPS redirect + ACME challenges
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # 443 catch-all — drop TLS connections from unrecognised Host headers.
    # ssl_reject_handshake (nginx ≥1.19.4) terminates the TLS handshake with a
    # fatal alert before any certificate is exchanged, so no cert is required.
    # This prevents SNI-probing and virtual-host confusion attacks. [ADS-501]
    # =========================================================================
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
    }

    # =========================================================================
    # PRODUCTION — Main client (apex + www)
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name adoptdontshop.com www.adoptdontshop.com;

        ssl_certificate /etc/letsencrypt/live/adoptdontshop.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adoptdontshop.com/privkey.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self' https://api.adoptdontshop.com wss://api.adoptdontshop.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        include /etc/nginx/snippets/uploads-prod.conf;

        # API proxy — allows frontend to use relative URLs (VITE_API_BASE_URL="")
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        location /auth/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            limit_req zone=socketio burst=10 nodelay;
            proxy_pass http://prod_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://prod_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # PRODUCTION — API subdomain (direct API access)
