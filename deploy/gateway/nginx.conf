events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # =========================================================================
    # PRODUCTION UPSTREAMS
    # =========================================================================
    upstream prod_backend {
        server ads_prod_backend:5000;
    }
    upstream prod_client {
        server ads_prod_client:80;
    }
    upstream prod_admin {
        server ads_prod_admin:80;
    }
    upstream prod_rescue {
        server ads_prod_rescue:80;
    }

    # =========================================================================
    # STAGING UPSTREAMS
    # =========================================================================
    upstream staging_backend {
        server ads_staging_backend:5000;
    }
    upstream staging_client {
        server ads_staging_client:80;
    }
    upstream staging_admin {
        server ads_staging_admin:80;
    }
    upstream staging_rescue {
        server ads_staging_rescue:80;
    }

    # =========================================================================
    # HTTP → HTTPS redirect + ACME challenges
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # PRODUCTION — Main client (apex + www)
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name adoptdontshop.com www.adoptdontshop.com;

        ssl_certificate /etc/letsencrypt/live/adoptdontshop.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adoptdontshop.com/privkey.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # API proxy — allows frontend to use relative URLs (VITE_API_BASE_URL="")
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        location /auth/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://prod_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://prod_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

