# Gateway — single nginx that routes all domains to correct stack
# Lives at /opt/ads/gateway/ on the server
# Joins both prod and staging Docker networks

services:
  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: ads_gateway
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./snippets/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - ads-prod-network
      - ads-staging-network
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t 2>/dev/null && test -f /var/run/nginx.pid']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

  certbot:
    image: certbot/certbot:v3.1.0@sha256:fb978b4fef92dc5c85cc0b908836714c600e717b52a3f74c93276eb63a9d0af9
    container_name: ads_certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  certbot_webroot:
  letsencrypt:

networks:
  ads-prod-network:
    external: true
  ads-staging-network:
    external: true
