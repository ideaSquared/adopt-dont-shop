# CI override - removes dev volume mounts that shadow built artifacts
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

services:
  service-backend:
    # !reset actually replaces the base volumes list. Plain `volumes: []`
    # is *appended* under Compose's multi-file merge rules and leaves the
    # dev bind mounts (notably ./uploads:/app/service.backend/uploads,
    # which masks the image's appuser-owned uploads dir and triggers
    # EACCES on mkdirSync).
    volumes: !reset []
    # Restore Dockerfile ENTRYPOINT (dumb-init) — the docker-compose.yml
    # entrypoint uses a relative path (./service.backend/…) that resolves
    # correctly only when bind mounts are active.  In CI (volumes: [])
    # the path doesn't exist; dumb-init is the correct runtime entrypoint.
    entrypoint: ["/usr/bin/dumb-init", "--"]
    # Restore default CMD from Dockerfile — the docker-compose.yml command
    # override creates a runtime symlink for bind-mounted lib.types, which
    # doesn't apply in CI (no bind mounts).  The Dockerfile already copies
    # built lib.types into node_modules via cp.
    command: ["npm", "run", "dev"]
