# Automatically applied labels based on changed file paths.
# Uses actions/labeler v5 syntax.

'area: backend':
  - changed-files:
    - any-glob-to-any-file: 'services/**'

'area: app.client':
  - changed-files:
    - any-glob-to-any-file: 'apps/client/**'

'area: app.admin':
  - changed-files:
    - any-glob-to-any-file: 'apps/admin/**'

'area: app.rescue':
  - changed-files:
    - any-glob-to-any-file: 'apps/rescue/**'

'area: libs':
  - changed-files:
    - any-glob-to-any-file: 'packages/**'

'area: ci':
  - changed-files:
    - any-glob-to-any-file: '.github/**'

'area: config':
  - changed-files:
    - any-glob-to-any-file: 'package.json'
    - any-glob-to-any-file: 'pnpm-lock.yaml'
    - any-glob-to-any-file: 'turbo.json'
    - any-glob-to-any-file: 'tsconfig.json'
    - any-glob-to-any-file: 'vite.shared.config.ts'
    - any-glob-to-any-file: 'docker-compose*.yml'
    - any-glob-to-any-file: 'Dockerfile*'
