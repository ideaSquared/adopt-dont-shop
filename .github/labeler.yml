# Automatically applied labels based on changed file paths.
# Uses actions/labeler v5 syntax.

area: backend:
  - changed-files:
    - any-glob-to-any-file: 'service.backend/**'

area: app.client:
  - changed-files:
    - any-glob-to-any-file: 'app.client/**'

area: app.admin:
  - changed-files:
    - any-glob-to-any-file: 'app.admin/**'

area: app.rescue:
  - changed-files:
    - any-glob-to-any-file: 'app.rescue/**'

area: libs:
  - changed-files:
    - any-glob-to-any-file: 'lib.*/**'

area: ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

area: config:
  - changed-files:
    - any-glob-to-any-file: 'package.json'
    - any-glob-to-any-file: 'package-lock.json'
    - any-glob-to-any-file: 'turbo.json'
    - any-glob-to-any-file: 'tsconfig.json'
    - any-glob-to-any-file: 'eslint-config-base/**'
    - any-glob-to-any-file: 'eslint-config-node/**'
    - any-glob-to-any-file: 'eslint-config-react/**'
    - any-glob-to-any-file: 'vite.shared.config.ts'
    - any-glob-to-any-file: 'docker-compose*.yml'
    - any-glob-to-any-file: 'Dockerfile*'
