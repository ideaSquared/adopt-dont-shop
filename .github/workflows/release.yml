name: Release

# Triggered in two ways:
#   1. workflow_run — fires only after CI passes on main (prevents pushing broken
#      images). The docker push happens against the same SHA that CI validated.
#   2. push tags (v*) — allows tagged releases regardless of CI state so
#      hotfix tags can always be cut manually.
#   3. workflow_dispatch — manual trigger for staging/production deploys.
#
# Branch protection must require the CI workflow to pass before merging to main
# so that by the time workflow_run fires, tests have already passed.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Only proceed if CI passed (or if triggered directly by a tag / manual dispatch)
jobs:
  # ============================================================================
  # GUARD — skip all downstream jobs if CI failed on the triggering commit.
  # Not needed for tag pushes or manual dispatches, which always proceed.
  # ============================================================================
  guard:
    name: CI Gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: CI passed
        run: echo "CI passed — proceeding with release"

  # ============================================================================
  # GITHUB RELEASE — created from tags only
  # ============================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: guard
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in this release

            ${{ github.event.head_commit.message }}

            ## Installation

            ```bash
            docker compose up -d
            ```

            See the [README](README.md) for setup instructions.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  # ============================================================================
  # BUILD & PUSH BACKEND — production image to Docker Hub
  # ============================================================================
  build-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    needs: guard

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # For workflow_run events, check out the commit CI actually validated
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: paragonjenko/adoptdontshop
          flavor: prefix=service-backend-
          # Tags are intentionally immutable so rollbacks are deterministic.
          # `:latest` is only emitted on stable semver tags (v1.2.3) — it is
          # NOT updated on every push to main. SHA + semver tags are the
          # authoritative deploy targets. [ADS-396]
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./service.backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: BUILDKIT_INLINE_CACHE=1

  # ============================================================================
  # BUILD & PUSH FRONTEND APPS — production images to Docker Hub
  # ============================================================================
  build-apps:
    name: Build and Push ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: guard

    strategy:
      fail-fast: false
      matrix:
        app: [app.client, app.admin, app.rescue]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: paragonjenko/adoptdontshop
          flavor: prefix=${{ matrix.app }}-
          # See backend job for tag-strategy rationale. [ADS-396]
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: production
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
