name: Release

# Triggered in two ways:
#   1. workflow_run — fires only after CI passes on main (prevents pushing broken
#      images). The docker push happens against the same SHA that CI validated.
#   2. push tags (v*) — allows tagged releases regardless of CI state so
#      hotfix tags can always be cut manually.
#   3. workflow_dispatch — manual trigger for staging/production deploys.
#
# Branch protection must require the CI workflow to pass before merging to main
# so that by the time workflow_run fires, tests have already passed.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Only proceed if CI passed (or if triggered directly by a tag / manual dispatch)

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # GUARD — skip all downstream jobs if CI failed on the triggering commit.
  # Not needed for tag pushes or manual dispatches, which always proceed.
  # ============================================================================
  guard:
    name: CI Gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: CI passed
        run: echo "CI passed — proceeding with release"

  # ============================================================================
  # GITHUB RELEASE — handled by release-please (see release-please.yml).
  # release-please creates tags and GitHub Releases with auto-generated
  # changelogs from conventional commits. The v* tag trigger on this
  # workflow then kicks off the Docker builds below.
  # ============================================================================

  # ============================================================================
  # BUILD & PUSH GATEWAY + SERVICES — production images to Docker Hub
  # ----------------------------------------------------------------------------
  # Post-monolith: the service.backend image is gone. Each matrix entry builds
  # one image from the shared Dockerfile.service, parameterised by SERVICE
  # (workspace package) + SERVICE_DIR (path under the repo). Image name prefix
  # is service-<name>- to mirror the old service-backend- convention.
  # ============================================================================
  build-services:
    name: Build and Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: guard

    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: service-gateway,       pkg: '@adopt-dont-shop/service.gateway',       dir: services/gateway }
          - { name: service-auth,          pkg: '@adopt-dont-shop/service.auth',          dir: services/auth }
          - { name: service-notifications, pkg: '@adopt-dont-shop/service.notifications', dir: services/notifications }
          - { name: service-pets,          pkg: '@adopt-dont-shop/service.pets',          dir: services/pets }
          - { name: service-rescue,        pkg: '@adopt-dont-shop/service.rescue',        dir: services/rescue }
          - { name: service-applications,  pkg: '@adopt-dont-shop/service.applications',  dir: services/applications }
          - { name: service-chat,          pkg: '@adopt-dont-shop/service.chat',          dir: services/chat }
          - { name: service-moderation,    pkg: '@adopt-dont-shop/service.moderation',    dir: services/moderation }
          - { name: service-matching,      pkg: '@adopt-dont-shop/service.matching',      dir: services/matching }
          - { name: service-audit,         pkg: '@adopt-dont-shop/service.audit',         dir: services/audit }
          - { name: service-cms,           pkg: '@adopt-dont-shop/service.cms',           dir: services/cms }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # For workflow_run events, check out the commit CI actually validated
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: paragonjenko/adoptdontshop
          flavor: prefix=${{ matrix.name }}-
          # Tags are intentionally immutable so rollbacks are deterministic.
          # `:latest` is only emitted on stable semver tags (v1.2.3) — it is
          # NOT updated on every push to main. SHA + semver tags are the
          # authoritative deploy targets. [ADS-396]
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.service
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.pkg }}
            SERVICE_DIR=${{ matrix.dir }}
            BUILDKIT_INLINE_CACHE=1

  # ============================================================================
  # BUILD & PUSH FRONTEND APPS — production images to Docker Hub
  # ============================================================================
  build-apps:
    name: Build and Push ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: guard

    strategy:
      fail-fast: false
      matrix:
        app: [client, admin, rescue]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: paragonjenko/adoptdontshop
          flavor: prefix=app.${{ matrix.app }}-
          # See backend job for tag-strategy rationale. [ADS-396]
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app
          target: production
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
