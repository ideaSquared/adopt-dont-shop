name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  sync:
    name: Sync repository labels
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: EndBug/add-and-delete-github-labels@v1
        with:
          config-file: .github/labels.yml
          token: ${{ secrets.GITHUB_TOKEN }}
