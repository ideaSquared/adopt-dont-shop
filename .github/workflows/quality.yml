name: Quality

on:
  # The two `paths:` blocks below mirror .github/workflow-source-paths.yml
  # (ADS-767). Drift fails scripts/check-workflow-paths.mjs — update the
  # canonical source first, then mirror here.
  push:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          # Cache npm downloads so matrix shards share artifacts instead
          # of re-hitting the public registry.
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      # ADS-387: Single workspace-level outdated check covers every workspace package,
      # replacing the previous 5-package hardcoded matrix.
      # continue-on-error because outdated deps are advisory, not blocking.
      - name: Check for outdated dependencies across all workspaces
        run: npm outdated --workspaces --include-workspace-root
        continue-on-error: true

      - name: Check for duplicate dependencies across all workspaces
        run: npm ls --workspaces --depth=0
        continue-on-error: true
