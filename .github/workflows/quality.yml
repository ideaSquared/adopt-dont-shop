name: Quality

on:
  # The two `paths:` blocks below mirror .github/workflow-source-paths.yml
  # (ADS-767). Drift fails scripts/check-workflow-paths.mjs — update the
  # canonical source first, then mirror here.
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup workspace (Node + pnpm)
        uses: ./.github/actions/setup-workspace

      # ADS-387: Single workspace-level outdated check covers every workspace package,
      # replacing the previous 5-package hardcoded matrix.
      # continue-on-error because outdated deps are advisory, not blocking.
      - name: Check for outdated dependencies across all workspaces
        run: pnpm outdated -r
        continue-on-error: true

      - name: Check for duplicate dependencies across all workspaces
        run: pnpm list -r --depth 0
        continue-on-error: true
