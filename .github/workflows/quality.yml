name: Quality

on:
  # The two `paths:` blocks below mirror .github/workflow-source-paths.yml
  # (ADS-767). Drift fails scripts/check-workflow-paths.mjs — update the
  # canonical source first, then mirror here.
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup workspace (Node + pnpm)
        uses: ./.github/actions/setup-workspace

      # ADS-387: Single workspace-level outdated check covers every workspace package,
      # replacing the previous 5-package hardcoded matrix.
      # ADS-903: Output is written to GITHUB_STEP_SUMMARY so it's visible on PRs
      # without requiring a click-through. Outdated deps are advisory, not blocking.
      # See docs/security/audit-policy.md.
      - name: Report outdated dependencies (advisory)
        run: |
          {
            echo "## Outdated Dependencies"
            echo '```'
            pnpm outdated -r 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for duplicate dependencies across all workspaces
        run: pnpm list -r --depth 0
        continue-on-error: true
