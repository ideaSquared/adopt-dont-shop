name: Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    strategy:
      # One shard hitting a transient registry / cache issue shouldn't
      # mask results for the others.
      fail-fast: false
      matrix:
        project: [service.backend, app.client, app.admin, app.rescue, lib.components]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          # Cache npm downloads so matrix shards share artifacts instead
          # of re-hitting the public registry.
          cache: 'npm'

      # Install once at the workspace root with the deterministic lockfile.
      # Subdir `npm install` in a workspace is racy — see the corresponding
      # comment in security.yml — and was the source of intermittent
      # shard-install failures on this repo.
      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Check for outdated dependencies in ${{ matrix.project }}
        run: npm outdated
        working-directory: ${{ matrix.project }}
        continue-on-error: true

      - name: Check for duplicate dependencies in ${{ matrix.project }}
        run: npm ls --depth=0
        working-directory: ${{ matrix.project }}
