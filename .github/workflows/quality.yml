name: Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          # Cache npm downloads so matrix shards share artifacts instead
          # of re-hitting the public registry.
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      # ADS-387: Single workspace-level outdated check covers all 28 packages,
      # replacing the previous 5-package hardcoded matrix.
      # continue-on-error because outdated deps are advisory, not blocking.
      - name: Check for outdated dependencies across all workspaces
        run: npm outdated --workspaces --include-workspace-root
        continue-on-error: true

      - name: Check for duplicate dependencies across all workspaces
        run: npm ls --workspaces --depth=0
