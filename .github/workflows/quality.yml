name: Quality

on:
  # The two `paths:` blocks below mirror .github/workflow-source-paths.yml
  # (ADS-767). Drift fails scripts/check-workflow-paths.mjs — update the
  # canonical source first, then mirror here.
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup workspace (Node + pnpm)
        uses: ./.github/actions/setup-workspace

      # ADS-387: Single workspace-level outdated check covers every workspace package,
      # replacing the previous 5-package hardcoded matrix.
      # ADS-903: outdated deps are advisory, not blocking — but `continue-on-error: true`
      # on its own hid the signal entirely (green regardless, nobody clicks through the
      # logs). Report to the job summary instead so it's visible without extra clicks,
      # while still never failing the job.
      - name: Check for outdated dependencies across all workspaces
        if: always()
        run: |
          {
            echo '## Outdated dependencies (advisory)'
            echo '_This never fails the build — see [ADS-903](https://linear.app/ideasquared/issue/ADS-903) / `docs/security/dependency-policy.md` for the advisory-vs-blocking policy._'
            echo '```'
            pnpm outdated -r || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for duplicate dependencies across all workspaces
        run: pnpm list -r --depth 0
        continue-on-error: true
