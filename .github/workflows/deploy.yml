name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      skip_ci_check:
        description: 'Skip the CI check-suites gate (use only for emergency deploys)'
        required: false
        type: boolean
        default: false
      # ADS-673: Bypass cosign signature verification. ONLY for documented
      # emergency rollback scenarios where the signing infrastructure is
      # broken — every use is logged loudly in the workflow output.
      skip_cosign_verify:
        description: 'Skip cosign signature verification (EMERGENCY ONLY — see docs/security/image-signing.md)'
        required: false
        type: boolean
        default: false
      # ADS-826: free-text justification for setting either skip_* flag.
      # The preflight job fails the run when a skip flag is set and this is
      # empty. The value is recorded in the run summary and in a
      # `deploy-bypass-audit` issue. Ignored for normal deploys.
      bypass_reason:
        description: 'Justification for skip_ci_check / skip_cosign_verify (required when either is set; recorded in the audit trail)'
        required: false
        type: string
        default: ''
      # ADS-824: per-service tag overrides. Newline- or comma-separated
      # KEY=VALUE pairs where KEY must match ^(SERVICE|APP)_[A-Z_]+_TAG$.
      # Example: SERVICE_AUTH_TAG=abc1234,SERVICE_PETS_TAG=def5678
      # Omit entirely for a full-stack deploy at DEPLOY_SHA.
      tag_overrides:
        description: 'Per-service image tag overrides (KEY=VALUE, comma- or newline-separated). Keys must match (SERVICE|APP)_[A-Z_]+_TAG.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ideasquared/adopt-dont-shop
  DOCKER_BUILDKIT: 1

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  # ADS-826: preflight gate + audit trail for deploy safety bypasses.
  # Runs before anything is built so an unjustified bypass fails fast:
  #   1. requires `bypass_reason` whenever skip_ci_check / skip_cosign_verify
  #      is set;
  #   2. resolves which protected environment the deploy job must clear —
  #      ALL production deploys pause for approval; bypass runs targeting
  #      production route to the dedicated `production-bypass` environment so
  #      reviewers can see at a glance that safety checks are being skipped.
  #      Staging stays automatic (bypasses there are audited but not gated);
  #   3. records every bypass in the run summary AND as a
  #      `deploy-bypass-audit` issue, so the trail survives log retention and
  #      is visible to the approver before they sign off.
  # Admin one-time setup (required reviewers on the two environments) is
  # documented in docs/operations/deploy.md — "Production approval gate".
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # Needed to create the deploy-bypass-audit issue below; the other jobs
      # keep the workflow-level contents:read only.
      issues: write
    outputs:
      deploy_environment: ${{ steps.resolve-env.outputs.deploy_environment }}
    env:
      TARGET_ENV: ${{ github.event.inputs.environment }}
      SKIP_CI_CHECK: ${{ github.event.inputs.skip_ci_check }}
      SKIP_COSIGN_VERIFY: ${{ github.event.inputs.skip_cosign_verify }}
      BYPASS_REASON: ${{ github.event.inputs.bypass_reason }}
    steps:
      - name: Require bypass_reason when a skip flag is set
        run: |
          set -euo pipefail
          if [ "$SKIP_CI_CHECK" != "true" ] && [ "$SKIP_COSIGN_VERIFY" != "true" ]; then
            echo "No safety bypass requested — bypass_reason not required."
            exit 0
          fi
          if [ -z "$(printf '%s' "$BYPASS_REASON" | tr -d '[:space:]')" ]; then
            echo "ERROR: skip_ci_check/skip_cosign_verify is set but bypass_reason is empty."
            echo "Re-run the dispatch with a justification — every bypass is audited."
            exit 1
          fi
          echo "Safety bypass requested. Reason: $BYPASS_REASON"

      - name: Resolve approval environment
        id: resolve-env
        run: |
          set -euo pipefail
          DEPLOY_ENVIRONMENT="$TARGET_ENV"
          if [ "$TARGET_ENV" = "production" ] && \
             { [ "$SKIP_CI_CHECK" = "true" ] || [ "$SKIP_COSIGN_VERIFY" = "true" ]; }; then
            DEPLOY_ENVIRONMENT="production-bypass"
          fi
          echo "deploy_environment=$DEPLOY_ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "Deploy job will run in the '$DEPLOY_ENVIRONMENT' environment."

      - name: Record bypass in run summary
        if: github.event.inputs.skip_ci_check == 'true' || github.event.inputs.skip_cosign_verify == 'true'
        env:
          ACTOR: ${{ github.actor }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_ENVIRONMENT: ${{ steps.resolve-env.outputs.deploy_environment }}
        run: |
          {
            echo "## Deploy safety bypass"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Actor | @${ACTOR} |"
            echo "| Target environment | ${TARGET_ENV} (approval environment: ${DEPLOY_ENVIRONMENT}) |"
            echo "| DEPLOY_SHA | ${DEPLOY_SHA} |"
            echo "| skip_ci_check | ${SKIP_CI_CHECK} |"
            echo "| skip_cosign_verify | ${SKIP_COSIGN_VERIFY} |"
            echo "| Reason | ${BYPASS_REASON} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open deploy-bypass-audit issue
        if: github.event.inputs.skip_ci_check == 'true' || github.event.inputs.skip_cosign_verify == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.resolve-env.outputs.deploy_environment }}
        with:
          script: |
            const {
              TARGET_ENV,
              DEPLOY_ENVIRONMENT,
              SKIP_CI_CHECK,
              SKIP_COSIGN_VERIFY,
              BYPASS_REASON,
            } = process.env;
            const label = 'deploy-bypass-audit';

            // Ensure the audit label exists — the first bypass on a repo
            // without it must not lose its audit record to a 422.
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                ...context.repo,
                name: label,
                color: 'B60205',
                description: 'Audit record of a deploy run that bypassed a safety check',
              });
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            const body = [
              'A deploy was dispatched with one or more safety checks bypassed.',
              '',
              `| Field | Value |`,
              `| --- | --- |`,
              `| Actor | @${context.actor} |`,
              `| Target environment | ${TARGET_ENV} |`,
              `| Approval environment | ${DEPLOY_ENVIRONMENT} |`,
              `| DEPLOY_SHA | ${context.sha} |`,
              `| skip_ci_check | ${SKIP_CI_CHECK} |`,
              `| skip_cosign_verify | ${SKIP_COSIGN_VERIFY} |`,
              `| Reason | ${BYPASS_REASON} |`,
              `| Workflow run | ${runUrl} |`,
              '',
              'See docs/operations/deploy.md ("Production approval gate") for the policy.',
            ].join('\n');

            await github.rest.issues.create({
              ...context.repo,
              title: `Deploy bypass: ${TARGET_ENV} @ ${shortSha} by ${context.actor}`,
              labels: [label],
              body,
            });

  build-and-push:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      checks: read
      # ADS-673: id-token required for cosign keyless signing via the
      # GitHub Actions OIDC token. No private key is provisioned.
      id-token: write
    outputs:
      sha: ${{ github.sha }}
    steps:
      - name: Verify CI passed on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CI_CHECK: ${{ github.event.inputs.skip_ci_check }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Checking CI status for $SHA on $REPO"
          # Fetch all check-suites for the commit
          suites=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${SHA}/check-suites")
          # Filter to GitHub Actions suites (app id 15368) that have completed
          completed=$(echo "$suites" | \
            jq '[.check_suites[] | select(.app.slug == "github-actions" and .status == "completed")]')
          total=$(echo "$completed" | jq 'length')
          if [ "$total" -eq 0 ]; then
            if [ "$SKIP_CI_CHECK" = "true" ]; then
              echo "WARNING: No completed GitHub Actions check-suites found for $SHA — skip_ci_check=true, proceeding."
            else
              echo "ERROR: No completed GitHub Actions check-suites found for $SHA. CI may not have run yet."
              echo "Use the skip_ci_check input to override for emergency deploys."
              exit 1
            fi
          fi
          failed=$(echo "$completed" | jq '[.[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped")] | length')
          if [ "$failed" -gt 0 ]; then
            echo "ERROR: $failed check-suite(s) did not succeed on $SHA. Aborting deploy."
            echo "$completed" | jq '[.[] | {id, status, conclusion}]'
            exit 1
          fi
          echo "All $total completed check-suite(s) passed. Proceeding with deploy."

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup workspace (Node + pnpm)
        uses: ./.github/actions/setup-workspace

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ADS-673: install cosign before any push so we can sign each image
      # by digest after `docker push`. Keyless mode uses the job's OIDC
      # token (id-token: write) — no secrets required. SHA-pinned to match
      # the rest of this workflow's pinning strategy.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Build and push gateway + services
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          # ADS-rollback: :latest is only updated for production deploys.
          # The SHA tag is always pushed so every build is individually
          # addressable for rollback. :latest on non-production would
          # overwrite the production pointer mid-window.
          #
          # Post-monolith: the service.backend image is gone. We build the
          # Fastify gateway + the 10 extracted gRPC services from the shared,
          # parameterised Dockerfile.service (SERVICE = workspace package,
          # SERVICE_DIR = path under the repo). Image name is service-<name>.
          if [ "$ENVIRONMENT" = "production" ]; then
            PUSH_LATEST=true
          else
            PUSH_LATEST=false
          fi
          # "<image-name> <workspace-package> <service-dir>"
          SERVICES=(
            "service-gateway       @adopt-dont-shop/service.gateway       services/gateway"
            "service-auth          @adopt-dont-shop/service.auth          services/auth"
            "service-notifications @adopt-dont-shop/service.notifications services/notifications"
            "service-pets          @adopt-dont-shop/service.pets          services/pets"
            "service-rescue        @adopt-dont-shop/service.rescue        services/rescue"
            "service-applications  @adopt-dont-shop/service.applications  services/applications"
            "service-chat          @adopt-dont-shop/service.chat          services/chat"
            "service-moderation    @adopt-dont-shop/service.moderation    services/moderation"
            "service-matching      @adopt-dont-shop/service.matching      services/matching"
            "service-audit         @adopt-dont-shop/service.audit         services/audit"
            "service-cms           @adopt-dont-shop/service.cms           services/cms"
          )
          for entry in "${SERVICES[@]}"; do
            read -r image pkg dir <<< "$entry"
            ref="$IMAGE_PREFIX/$image:${{ github.sha }}"
            echo "::group::Build $image"
            docker build \
              -f Dockerfile.service \
              --target production \
              --build-arg SERVICE="$pkg" \
              --build-arg SERVICE_DIR="$dir" \
              -t "$ref" \
              .
            docker push "$ref"
            if [ "$PUSH_LATEST" = "true" ]; then
              docker tag "$ref" "$IMAGE_PREFIX/$image:latest"
              docker push "$IMAGE_PREFIX/$image:latest"
            fi
            # ADS-673: sign by digest (immutable) via cosign keyless OIDC.
            # :latest resolves to the same digest so one signature covers both.
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$ref" | cut -d@ -f2)
            echo "Signing $IMAGE_PREFIX/$image@$DIGEST"
            cosign sign --yes "$IMAGE_PREFIX/$image@$DIGEST"
            echo "::endgroup::"
          done

      - name: Build and push app.client
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            PUSH_LATEST=true
          else
            PUSH_LATEST=false
          fi
          docker build \
            -f Dockerfile.app \
            --target production \
            --build-arg APP_NAME=client \
            --build-arg VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" \
            --build-arg VITE_WS_BASE_URL="${{ vars.VITE_WS_BASE_URL }}" \
            --build-arg VITE_SENTRY_DSN="${{ vars.VITE_SENTRY_DSN }}" \
            --build-arg VITE_STATSIG_CLIENT_KEY="${{ vars.VITE_STATSIG_CLIENT_KEY }}" \
            --build-arg SENTRY_ORG="${{ vars.SENTRY_ORG }}" \
            --build-arg SENTRY_PROJECT="${{ vars.SENTRY_PROJECT_CLIENT }}" \
            --build-arg DEPLOY_SHA="${{ github.sha }}" \
            --secret id=sentry_auth,env=SENTRY_AUTH_TOKEN \
            -t $IMAGE_PREFIX/app-client:${{ github.sha }} \
            .
          docker push $IMAGE_PREFIX/app-client:${{ github.sha }}
          if [ "$PUSH_LATEST" = "true" ]; then
            docker tag $IMAGE_PREFIX/app-client:${{ github.sha }} $IMAGE_PREFIX/app-client:latest
            docker push $IMAGE_PREFIX/app-client:latest
          fi
          # ADS-673: cosign keyless sign by digest. See backend step for rationale.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_PREFIX/app-client:${{ github.sha }}" | cut -d@ -f2)
          echo "Signing $IMAGE_PREFIX/app-client@$DIGEST"
          cosign sign --yes "$IMAGE_PREFIX/app-client@$DIGEST"

      - name: Build and push app.admin
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            PUSH_LATEST=true
          else
            PUSH_LATEST=false
          fi
          docker build \
            -f Dockerfile.app \
            --target production \
            --build-arg APP_NAME=admin \
            --build-arg VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" \
            --build-arg VITE_WS_BASE_URL="${{ vars.VITE_WS_BASE_URL }}" \
            --build-arg VITE_SENTRY_DSN="${{ vars.VITE_SENTRY_DSN }}" \
            --build-arg VITE_STATSIG_CLIENT_KEY="${{ vars.VITE_STATSIG_CLIENT_KEY }}" \
            --build-arg SENTRY_ORG="${{ vars.SENTRY_ORG }}" \
            --build-arg SENTRY_PROJECT="${{ vars.SENTRY_PROJECT_ADMIN }}" \
            --build-arg DEPLOY_SHA="${{ github.sha }}" \
            --secret id=sentry_auth,env=SENTRY_AUTH_TOKEN \
            -t $IMAGE_PREFIX/app-admin:${{ github.sha }} \
            .
          docker push $IMAGE_PREFIX/app-admin:${{ github.sha }}
          if [ "$PUSH_LATEST" = "true" ]; then
            docker tag $IMAGE_PREFIX/app-admin:${{ github.sha }} $IMAGE_PREFIX/app-admin:latest
            docker push $IMAGE_PREFIX/app-admin:latest
          fi
          # ADS-673: cosign keyless sign by digest. See backend step for rationale.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_PREFIX/app-admin:${{ github.sha }}" | cut -d@ -f2)
          echo "Signing $IMAGE_PREFIX/app-admin@$DIGEST"
          cosign sign --yes "$IMAGE_PREFIX/app-admin@$DIGEST"

      - name: Build and push app.rescue
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            PUSH_LATEST=true
          else
            PUSH_LATEST=false
          fi
          docker build \
            -f Dockerfile.app \
            --target production \
            --build-arg APP_NAME=rescue \
            --build-arg VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" \
            --build-arg VITE_WS_BASE_URL="${{ vars.VITE_WS_BASE_URL }}" \
            --build-arg VITE_SENTRY_DSN="${{ vars.VITE_SENTRY_DSN }}" \
            --build-arg VITE_STATSIG_CLIENT_KEY="${{ vars.VITE_STATSIG_CLIENT_KEY }}" \
            --build-arg SENTRY_ORG="${{ vars.SENTRY_ORG }}" \
            --build-arg SENTRY_PROJECT="${{ vars.SENTRY_PROJECT_RESCUE }}" \
            --build-arg DEPLOY_SHA="${{ github.sha }}" \
            --secret id=sentry_auth,env=SENTRY_AUTH_TOKEN \
            -t $IMAGE_PREFIX/app-rescue:${{ github.sha }} \
            .
          docker push $IMAGE_PREFIX/app-rescue:${{ github.sha }}
          if [ "$PUSH_LATEST" = "true" ]; then
            docker tag $IMAGE_PREFIX/app-rescue:${{ github.sha }} $IMAGE_PREFIX/app-rescue:latest
            docker push $IMAGE_PREFIX/app-rescue:latest
          fi
          # ADS-673: cosign keyless sign by digest. See backend step for rationale.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_PREFIX/app-rescue:${{ github.sha }}" | cut -d@ -f2)
          echo "Signing $IMAGE_PREFIX/app-rescue@$DIGEST"
          cosign sign --yes "$IMAGE_PREFIX/app-rescue@$DIGEST"

  # ADS-673: Cosign signature verification gate. Runs BEFORE the deploy job
  # so a tampered or unsigned image cannot reach the production host.
  # Verification happens on the GitHub Actions runner (which has cosign and
  # public internet egress to Rekor + Fulcio) rather than on the deploy host,
  # which avoids installing cosign on every server.
  verify-images:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image signatures
        env:
          SHA: ${{ github.sha }}
          SKIP_VERIFY: ${{ github.event.inputs.skip_cosign_verify }}
        run: |
          set -euo pipefail
          if [ "$SKIP_VERIFY" = "true" ]; then
            echo "::warning title=Cosign verification skipped::skip_cosign_verify=true was passed to this deploy. This bypasses supply-chain integrity checks and must only be used for documented emergency rollback scenarios. See docs/security/image-signing.md."
            echo "WARNING: cosign verification SKIPPED for $SHA"
            exit 0
          fi

          # Identity expectation: signatures must be produced by THIS repo's
          # workflows running on main. Any other source (forks, feature
          # branches, manually-pushed images) will fail verification.
          IDENTITY_REGEX='^https://github.com/ideaSquared/adopt-dont-shop/\.github/workflows/.+@refs/heads/main$'
          ISSUER='https://token.actions.githubusercontent.com'

          for image in \
            service-gateway service-auth service-notifications service-pets \
            service-rescue service-applications service-chat service-moderation \
            service-matching service-audit service-cms \
            app-client app-admin app-rescue; do
            ref="$IMAGE_PREFIX/$image:$SHA"
            # Resolve tag -> digest via the registry API so we verify the
            # immutable artifact, not whatever the tag happens to point at
            # right now. `docker buildx imagetools inspect` is pre-installed
            # on ubuntu-latest runners and does not pull image layers.
            digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')
            target="$IMAGE_PREFIX/$image@$digest"
            echo "Verifying $target"
            cosign verify \
              --certificate-identity-regexp "$IDENTITY_REGEX" \
              --certificate-oidc-issuer "$ISSUER" \
              "$target" > /dev/null
            echo "OK: $image signature is valid and produced by main."
          done

  deploy:
    needs: [preflight, verify-images]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # ADS-826: resolved by the preflight job — `staging` (automatic),
    # `production` (required-reviewer approval), or `production-bypass`
    # (separately-reviewed approval for runs that skip a safety check).
    environment: ${{ needs.preflight.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # ADS-824: validate tag_overrides before touching the host.
      # Keys must match ^(SERVICE|APP)_[A-Z_]+_TAG$; values must be
      # alphanumeric with dots, dashes, and underscores — no shell-injection
      # characters. This runs on the Actions runner, not the deploy host.
      - name: Validate tag_overrides input
        if: ${{ github.event.inputs.tag_overrides != '' }}
        # Pass the free-text input via the environment, never interpolated
        # into the shell text — otherwise a value containing a single quote
        # closes the assignment and executes arbitrary commands BEFORE the
        # regex validation below ever runs.
        env:
          TAG_OVERRIDES: ${{ github.event.inputs.tag_overrides }}
        run: |
          set -euo pipefail
          overrides="$TAG_OVERRIDES"
          echo "$overrides" | tr ',' '\n' | while IFS= read -r pair; do
            pair="$(echo "$pair" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$pair" ] && continue
            KEY="${pair%%=*}"
            VALUE="${pair#*=}"
            if ! echo "$KEY" | grep -qE '^(SERVICE|APP)_[A-Z_]+_TAG$'; then
              echo "ERROR: invalid tag override key '$KEY'. Keys must match ^(SERVICE|APP)_[A-Z_]+_TAG\$"
              exit 1
            fi
            if ! echo "$VALUE" | grep -qE '^[A-Za-z0-9._-]+$'; then
              echo "ERROR: invalid tag override value '$VALUE' for key '$KEY'. Values must match ^[A-Za-z0-9._-]+\$"
              exit 1
            fi
            echo "OK: $KEY=$VALUE"
          done

      # ADS-900: the deploy host doesn't hold a full repo checkout — only the
      # specific files it needs under /opt/ads/<env> (compose files, .env,
      # secrets/). Copy the shared health-check script alongside them so the
      # remote script below can call it, the same way backup.yml scp's its
      # snapshot script.
      - name: Copy wait-for-services.sh to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_HOST_FINGERPRINT }}
          source: scripts/wait-for-services.sh
          target: /opt/ads/${{ github.event.inputs.environment }}
          overwrite: true

      # ADS-670: SSH host fingerprint pinned to prevent MitM during deploy.
      # Compute on the host and store as HETZNER_HOST_FINGERPRINT secret:
      #   ssh-keyscan -t ed25519,rsa $HOST | ssh-keygen -lf - | awk '{print $2}'
      - name: Deploy to server
        # Pass secrets via `envs:` rather than `${{ secrets.* }}` interpolation
        # inside `script:`. Interpolation embeds the secret in the wrapper
        # script text that appleboy/ssh-action ships to the server, leaving
        # it visible in process listings and retained deploy logs.
        # ADS-671: GHCR_TOKEN must be scoped `read:packages` only — it is used
        # exclusively for `docker pull` during deployment.
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SECRET_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SECRET_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SECRET_UPLOAD_SIGNING_SECRET: ${{ secrets.UPLOAD_SIGNING_SECRET }}
          SECRET_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_PRINCIPAL_SIGNING_KEY: ${{ secrets.PRINCIPAL_SIGNING_KEY }}
          # Forwarded via `envs:` so the server script reads it as a shell
          # variable — never interpolated into the script text (injection-safe).
          TAG_OVERRIDES: ${{ github.event.inputs.tag_overrides }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_HOST_FINGERPRINT }}
          envs: GHCR_TOKEN,SECRET_JWT_SECRET,SECRET_JWT_REFRESH_SECRET,SECRET_ENCRYPTION_KEY,SECRET_UPLOAD_SIGNING_SECRET,SECRET_DB_PASSWORD,SECRET_PRINCIPAL_SIGNING_KEY,TAG_OVERRIDES,ENVIRONMENT
          script: |
            set -euo pipefail
            ENV="$ENVIRONMENT"
            SHA="${{ github.sha }}"
            IMAGE_PREFIX="ghcr.io/ideasquared/adopt-dont-shop"

            cd /opt/ads/$ENV

            # Login to GHCR (uses a PAT stored on the server, not the job-scoped GITHUB_TOKEN)
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u ideasquared --password-stdin

            # Pull new images — the Fastify gateway + 10 gRPC services replace
            # the deleted service.backend monolith, plus the three frontends.
            for image in \
              service-gateway service-auth service-notifications service-pets \
              service-rescue service-applications service-chat service-moderation \
              service-matching service-audit service-cms \
              app-client app-admin app-rescue; do
              docker pull "$IMAGE_PREFIX/$image:$SHA"
            done

            # Persist SHA in .env so restarts use correct version
            sed -i "s/^DEPLOY_SHA=.*/DEPLOY_SHA=$SHA/" .env || echo "DEPLOY_SHA=$SHA" >> .env

            # ADS-824: inject per-service tag overrides into .env.
            # TAG_OVERRIDES is forwarded from the workflow input as a shell
            # env var via the step's `envs:` list (comma- or newline-separated
            # KEY=VALUE pairs) — NOT interpolated into this script text, so a
            # quote in the value can't break out. Validation runs in the runner
            # step above; here we re-validate and write the pairs.
            if [ -n "${TAG_OVERRIDES:-}" ]; then
              # Normalise commas to newlines, strip blank lines
              echo "$TAG_OVERRIDES" | tr ',' '\n' | while IFS= read -r pair; do
                pair="$(echo "$pair" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
                [ -z "$pair" ] && continue
                KEY="${pair%%=*}"
                VALUE="${pair#*=}"
                # Validate key pattern
                if ! echo "$KEY" | grep -qE '^(SERVICE|APP)_[A-Z_]+_TAG$'; then
                  echo "ERROR: invalid tag override key: $KEY (must match ^(SERVICE|APP)_[A-Z_]+_TAG\$)"
                  exit 1
                fi
                # Validate value pattern (alphanumeric, dots, dashes, underscores only)
                if ! echo "$VALUE" | grep -qE '^[A-Za-z0-9._-]+$'; then
                  echo "ERROR: invalid tag override value for $KEY: '$VALUE' (must match ^[A-Za-z0-9._-]+\$)"
                  exit 1
                fi
                # Remove any existing line for this key, then append
                sed -i "/^${KEY}=/d" .env
                echo "${KEY}=${VALUE}" >> .env
                echo "Tag override applied: ${KEY}=${VALUE}"
              done
            fi

            # Determine compose file
            if [ "$ENV" = "production" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
            else
              COMPOSE_FILE="docker-compose.staging.yml"
            fi

            # Materialize the file-mounted Docker secrets consumed via
            # `file: ./secrets/<name>` by BOTH docker-compose.prod.yml and
            # docker-compose.staging.yml. The set must match the `secrets:`
            # blocks in those files (see secrets/README.md). [ADS-675, ADS-752]
            #
            # database_url / redis_url are composed here from the rotating DB
            # password plus the non-rotating identifiers already in the host
            # .env (POSTGRES_USER / POSTGRES_DB, and the REDIS_PASSWORD the redis
            # container itself authenticates with) so the URLs always match what
            # the database/redis containers use. redis_password is the same
            # value, written separately because the redis container reads its
            # own --requirepass from this file rather than from `environment:`
            # (ADS-878).
            read_env() {  # read a key from the host .env, quotes stripped; fails if absent
              local v
              v="$(grep -E "^$1=" .env | head -n1 | cut -d= -f2-)" || true
              v="${v%\"}"; v="${v#\"}"; v="${v%\'}"; v="${v#\'}"
              [ -n "$v" ] || { echo "ERROR: $1 missing from .env" >&2; exit 1; }
              printf '%s' "$v"
            }
            PG_USER="$(read_env POSTGRES_USER)"
            PG_DB="$(read_env POSTGRES_DB)"
            REDIS_PW="$(read_env REDIS_PASSWORD)"
            mkdir -p secrets
            chmod 700 secrets
            printf '%s' "postgresql://${PG_USER}:${SECRET_DB_PASSWORD}@database:5432/${PG_DB}" > secrets/database_url
            printf '%s' "redis://:${REDIS_PW}@redis:6379"      > secrets/redis_url
            printf '%s' "$REDIS_PW"                             > secrets/redis_password
            printf '%s' "$SECRET_JWT_SECRET"                    > secrets/jwt_secret
            printf '%s' "$SECRET_JWT_REFRESH_SECRET"            > secrets/jwt_refresh_secret
            printf '%s' "$SECRET_ENCRYPTION_KEY"                > secrets/encryption_key
            printf '%s' "$SECRET_UPLOAD_SIGNING_SECRET"         > secrets/upload_signing_secret
            printf '%s' "$SECRET_PRINCIPAL_SIGNING_KEY"         > secrets/principal_signing_key
            printf '%s' "$SECRET_DB_PASSWORD"                   > secrets/db_password
            chmod 600 secrets/*

            # Bring up new containers. Each service migrates its own schema on
            # start (the Dockerfile.service entrypoint runs
            # `pnpm run --if-present db:migrate`), so there is no separate
            # migrate sidecar to wait on. [post-monolith; was ADS-393]
            docker compose -f $COMPOSE_FILE --env-file .env up -d

            # ADS-824: wait for every service to report healthy, not just the
            # gateway. Ordered so infrastructure-layer services are checked
            # before the gateway, which depends on them.
            # ADS-900: shared loop (also used by rollback.yml) — see
            # scripts/wait-for-services.sh for the retry/timeout contract.
            chmod +x scripts/wait-for-services.sh
            ./scripts/wait-for-services.sh "$COMPOSE_FILE" 30 2 \
              service-notifications:5001 \
              service-auth:5002 \
              service-pets:5003 \
              service-rescue:5004 \
              service-applications:5005 \
              service-chat:5006 \
              service-moderation:5007 \
              service-matching:5008 \
              service-audit:5009 \
              service-cms:5010 \
              service-gateway:4000

            # Smoke-check that the gateway registered its /api/v1/* routes.
            # /api/v1/auth/login exists whenever the auth service client is
            # wired: an empty POST returns 400 when registered, 404 if the
            # gateway came up without its routes (e.g. a missing service URL).
            echo "Smoke-checking POST /api/v1/auth/login (verifies gateway routes are registered)..."
            STATUS=$(docker compose -f $COMPOSE_FILE exec -T service-gateway \
              curl -o /dev/null -w '%{http_code}' -s -X POST \
              -H 'content-type: application/json' -d '{}' \
              http://localhost:4000/api/v1/auth/login 2>/dev/null || echo "000")
            if [ "$STATUS" = "404" ] || [ "$STATUS" = "000" ]; then
              echo "ERROR: POST /api/v1/auth/login returned $STATUS — gateway routes are not registered."
              exit 1
            fi
            echo "Smoke check passed (HTTP $STATUS)."

            # Remove secret files now that containers have started (they hold
            # in-memory copies; the files on disk are no longer needed). [ADS-675]
            rm -f secrets/*

            # Record deployed SHA
            echo "$SHA" > .last_sha
            echo "Deployed $SHA to $ENV successfully."
