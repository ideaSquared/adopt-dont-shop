name: Docker

# Two-tier strategy (ADS-streamline-ci):
#
# - Pull requests trigger this workflow ONLY when Docker plumbing actually
#   changes (Dockerfiles, compose files, .dockerignore). Source-only PRs
#   are covered by `ci.yml`'s native `npm run build` and by the E2E job,
#   which does `docker compose up --build` and is the de-facto Dockerfile
#   smoke test for the dev images.
# - Push to main/develop keeps the broader source path set so a regression
#   that only manifests inside a container is caught before deploy.
# - Production-stage builds + Trivy run only on push events. The PR loop
#   doesn't deploy prod images, so re-running the multi-stage prod build
#   on every PR was duplicating native `tsc + vite build` from ci.yml.

on:
  push:
    branches: [main, develop]
    paths:
      - '**/Dockerfile*'
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'docker-compose*.yml'
      - '.dockerignore'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================================
  # BUILD BACKEND — dev + production images
  # ============================================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR (for Trivy DB pulls)
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build development image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./service.backend/Dockerfile
          target: development
          push: false
          tags: paragonjenko/adoptdontshop:service-backend-dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          build-args: BUILDKIT_INLINE_CACHE=1

      # Production build + Trivy scan are deploy-gating signals, not PR
      # signals: ci.yml's test-backend already exercises `tsc` natively, so
      # rebuilding the multi-stage prod image on every PR was duplicative.
      # Keeping them on push-to-main ensures we still catch prod-only
      # regressions (npm prune fallout, asset paths) before deploy.yml runs.
      - name: Build production image
        if: github.event_name == 'push'
        id: build-prod
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./service.backend/Dockerfile
          target: production
          push: false
          load: true
          tags: paragonjenko/adoptdontshop:service-backend-prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          build-args: BUILDKIT_INLINE_CACHE=1

      # ADS-673: sign production images with cosign (keyless / Sigstore).
      # TODO: pin to a full commit SHA once cosign-installer v3.8+ is
      # verified (tag reference used until then).
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign backend image
        if: github.event_name == 'push'
        run: cosign sign --yes paragonjenko/adoptdontshop:service-backend-prod-${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Run Trivy vulnerability scanner
        if: github.event_name == 'push'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" -w /workspace \
            -e TRIVY_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-db:2 \
            -e TRIVY_JAVA_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-java-db:1 \
            aquasec/trivy:0.63.0 image \
              --format sarif \
              --output trivy-results.sarif \
              --severity CRITICAL,HIGH \
              --exit-code 0 \
              paragonjenko/adoptdontshop:service-backend-prod-${{ github.sha }}

      - name: Upload Trivy results to GitHub Security tab
        if: github.event_name == 'push' && always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # BUILD FRONTEND APPS — dev + production images for each app
  # ============================================================================
  build-apps:
    name: Build ${{ matrix.app }} Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [app.client, app.admin, app.rescue]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Build development image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: development
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:${{ matrix.app }}-dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # Push-only: the prod stage re-runs `tsc && vite build` inside Docker,
      # which ci.yml's test-frontend matrix already runs natively. Keep it
      # on main pushes as a final pre-deploy gate.
      - name: Build production image
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: production
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:${{ matrix.app }}-prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

# NOTE: The previous `test-compose` job (backend-container `/health` probe)
# was removed as part of the CI streamline pass. ci.yml's `test-e2e` brings
# up the same stack via `docker compose up -d --build` and would fail
# loudly if the backend didn't reach `/health` — `test-compose` was a
# strict subset of that signal and added ~5 min on every relevant PR.
