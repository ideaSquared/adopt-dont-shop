name: Docker

# Two-tier strategy (ADS-streamline-ci):
#
# - Pull requests trigger this workflow ONLY when Docker plumbing actually
#   changes (Dockerfiles, compose files, .dockerignore). Source-only PRs
#   are covered by `ci.yml`'s native `npm run build` and by the E2E job,
#   which does `docker compose up --build` and is the de-facto Dockerfile
#   smoke test for the dev images.
# - Push to main/develop keeps the broader source path set so a regression
#   that only manifests inside a container is caught before deploy.
# - Production-stage builds + Trivy run only on push events. The PR loop
#   doesn't deploy prod images, so re-running the multi-stage prod build
#   on every PR was duplicating native `tsc + vite build` from ci.yml.

on:
  push:
    branches: [main, develop]
    # Source-path block below mirrors .github/workflow-source-paths.yml plus
    # the Docker-specific `extra:` entries (ADS-767). Drift fails
    # scripts/check-workflow-paths.mjs.
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'package-lock.json'
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  pull_request:
    branches: [main, develop]
    # Intentionally narrower than the canonical list: source-only PRs are
    # covered by ci.yml + E2E. See workflow-source-paths.yml comments.
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================================
  # BUILD FRONTEND APPS — dev + production images for each app
  # ============================================================================
  build-apps:
    name: Build ${{ matrix.app }} Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [client, admin, rescue]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host

      - name: Build development image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: development
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:${{ matrix.app }}-dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # Push-only: the prod stage re-runs `tsc && vite build` inside Docker,
      # which ci.yml's test-frontend matrix already runs natively. Keep it
      # on main pushes as a final pre-deploy gate.
      - name: Build production image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: production
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:${{ matrix.app }}-prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  # ============================================================================
  # BUILD SERVICES — dev image on all triggers, prod image + Trivy scan on push
  #
  # Replaces the CVE-scan coverage lost when the service.backend monolith
  # was deleted in #995 (the old `build-backend` job ran a single Trivy
  # scan against that one image). Each of the 11 microservice images is
  # now built from the shared Dockerfile.service and scanned independently
  # so a CVE in one service surfaces in the Security tab without being
  # masked by another image's findings (fail-fast: false).
  # ============================================================================
  build-services:
    name: Build ${{ matrix.service }} Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth
          - notifications
          - pets
          - rescue
          - applications
          - chat
          - moderation
          - matching
          - audit
          - cms

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host

      - name: Log in to GHCR (for Trivy DB pulls)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build development image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.service
          target: development
          build-args: |
            SERVICE=@adopt-dont-shop/service.${{ matrix.service }}
            SERVICE_DIR=services/${{ matrix.service }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:service-${{ matrix.service }}-dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # Push-only: the prod stage re-runs the full multi-stage build,
      # which is expensive across 11 images. ci.yml + E2E already cover
      # source-level regressions on PRs; keep prod build + Trivy as a
      # pre-deploy gate on main pushes.
      - name: Build production image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.service
          target: production
          load: true
          build-args: |
            SERVICE=@adopt-dont-shop/service.${{ matrix.service }}
            SERVICE_DIR=services/${{ matrix.service }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:service-${{ matrix.service }}-prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" -w /workspace \
            -e TRIVY_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-db:2 \
            -e TRIVY_JAVA_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-java-db:1 \
            aquasec/trivy:0.63.0 image \
              --format sarif \
              --output trivy-results-${{ matrix.service }}.sarif \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              paragonjenko/adoptdontshop:service-${{ matrix.service }}-prod-${{ github.sha }}

      - name: Upload Trivy results to GitHub Security tab
        if: github.event_name != 'pull_request' && always() && hashFiles(format('trivy-results-{0}.sarif', matrix.service)) != ''
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-service-${{ matrix.service }}'

