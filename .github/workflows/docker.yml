name: Docker

# Two-tier strategy (ADS-streamline-ci):
#
# - Pull requests trigger this workflow ONLY when Docker plumbing actually
#   changes (Dockerfiles, compose files, .dockerignore). Source-only PRs
#   are covered by `ci.yml`'s native `npm run build` and by the E2E job,
#   which does `docker compose up --build` and is the de-facto Dockerfile
#   smoke test for the dev images.
# - Push to main/develop keeps the broader source path set so a regression
#   that only manifests inside a container is caught before deploy.
# - Production-stage builds + Trivy run only on push events. The PR loop
#   doesn't deploy prod images, so re-running the multi-stage prod build
#   on every PR was duplicating native `tsc + vite build` from ci.yml.

on:
  push:
    branches: [main, develop]
    # Source-path block below mirrors .github/workflow-source-paths.yml plus
    # the Docker-specific `extra:` entries (ADS-767). Drift fails
    # scripts/check-workflow-paths.mjs.
    paths:
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'package-lock.json'
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  pull_request:
    branches: [main, develop]
    # Intentionally narrower than the canonical list: source-only PRs are
    # covered by ci.yml + E2E. See workflow-source-paths.yml comments.
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================================
  # BUILD FRONTEND APPS — dev + production images for each app
  # ============================================================================
  build-apps:
    name: Build ${{ matrix.app }} Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [app.client, app.admin, app.rescue]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:v0.23.0
            network=host

      - name: Build development image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: development
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:${{ matrix.app }}-dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # Push-only: the prod stage re-runs `tsc && vite build` inside Docker,
      # which ci.yml's test-frontend matrix already runs natively. Keep it
      # on main pushes as a final pre-deploy gate.
      - name: Build production image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.app.optimized
          target: production
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILDKIT_INLINE_CACHE=1
          push: false
          tags: paragonjenko/adoptdontshop:${{ matrix.app }}-prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

