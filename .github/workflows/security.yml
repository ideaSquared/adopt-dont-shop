name: Security

on:
  # The two `paths:` blocks below mirror .github/workflow-source-paths.yml
  # (ADS-767). Drift fails scripts/check-workflow-paths.mjs — update the
  # canonical source first, then mirror here.
  push:
    branches: [main, develop]
    paths:
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          # Cache npm downloads so this workflow is fast and doesn't re-hit
          # the public registry for every matrix shard.
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      # ADS-387: Single workspace-level audit covers every workspace package via
      # the root package-lock.json, replacing the previous 5-package hardcoded matrix.
      - name: Audit all workspaces for high+ vulnerabilities
        run: npm audit --workspaces --include-workspace-root --audit-level=high
