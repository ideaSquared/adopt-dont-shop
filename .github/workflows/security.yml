name: Security

on:
  push:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service.backend/**'
      - 'app.client/**'
      - 'app.admin/**'
      - 'app.rescue/**'
      - 'lib.*/**'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          # Cache npm downloads so this workflow is fast and doesn't re-hit
          # the public registry for every matrix shard.
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      # ADS-387: Single workspace-level audit covers all 28 packages via the
      # root package-lock.json, replacing the previous 5-package hardcoded matrix.
      - name: Audit all workspaces for high+ vulnerabilities
        run: npm audit --workspaces --include-workspace-root --audit-level=high
