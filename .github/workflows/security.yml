name: Security

on:
  # The two `paths:` blocks below mirror .github/workflow-source-paths.yml
  # (ADS-767). Drift fails scripts/check-workflow-paths.mjs — update the
  # canonical source first, then mirror here.
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup workspace (Node + pnpm)
        uses: ./.github/actions/setup-workspace

      # ADS-387: Single workspace-level audit covers every workspace package via
      # the root pnpm-lock.yaml, replacing the previous 5-package hardcoded matrix.
      #
      # Advisory step: all severities are written to the job summary for visibility
      # without blocking the job. See docs/security/audit-policy.md.
      - name: Audit all workspaces — advisory summary (all severities)
        run: |
          {
            echo "## Dependency Security Audit"
            echo '```'
            pnpm audit 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Hard gate: high+ CVEs fail the job. Moderate/low are advisory only.
      - name: Audit all workspaces — gate (high+)
        run: pnpm audit --audit-level high
