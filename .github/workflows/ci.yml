name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # CHANGE DETECTION — gate all downstream jobs on relevant path changes
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      libs: ${{ steps.filter.outputs.libs }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'service.backend/**'
              - 'lib.types/**'
              - 'lib.validation/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'eslint-config-base/**'
              - 'eslint-config-node/**'
            frontend:
              - 'app.client/**'
              - 'app.admin/**'
              - 'app.rescue/**'
              - 'lib.*/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'vite.shared.config.ts'
              - 'eslint-config-base/**'
              - 'eslint-config-react/**'
            libs:
              - 'lib.*/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'eslint-config-base/**'

  # ============================================================================
  # BACKEND — lint → test → build (tsc build doubles as type-check)
  # ============================================================================
  test-backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || format('{0}{1}{2}', github.run_id, github.run_number, github.run_attempt) }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.TEST_DB_PASSWORD }}
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate environment configuration
        run: npm run validate:env

      - name: Build shared libraries
        run: npm run build:libs

      - name: Lint
        run: npm run lint
        working-directory: service.backend

      - name: Test
        run: npm test
        working-directory: service.backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:${{ env.TEST_DB_PASSWORD }}@localhost:5432/test_db

      - name: Build (type-checks via tsc)
        run: npm run build
        working-directory: service.backend

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # FRONTEND APPS — one runner per app, fail-fast disabled so all three report
  # ============================================================================
  test-frontend:
    name: Frontend Tests (${{ matrix.app }})
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    strategy:
      fail-fast: false
      matrix:
        app: [app.client, app.admin, app.rescue]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build:libs

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.app }}

      - name: Test
        run: npm test
        working-directory: ${{ matrix.app }}

      - name: Type check
        run: npx turbo run type-check --filter='@adopt-dont-shop/${{ matrix.app }}'

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.app }}
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # SHARED LIBRARIES — all 21 lib.* packages tested via Turbo
  # Turbo resolves build order via dependsOn, so libs build in dependency order
  # ============================================================================
  test-libs:
    name: Library Tests
    needs: changes
    if: needs.changes.outputs.libs == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build, lint, test and type-check all libraries
        run: npx turbo run build lint test type-check --filter='@adopt-dont-shop/lib.*'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-libs
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # E2E — Playwright journeys against the full docker-compose stack
  # Behaviour-focused tests across app.client, app.rescue and app.admin.
  # Runs only after the unit/integration jobs succeed to gate the more
  # expensive browser job behind cheaper signals.
  # ============================================================================
  test-e2e:
    name: E2E Tests (Playwright)
    needs: [changes, test-backend, test-frontend]
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Install workspace dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./e2e/package.json').devDependencies['@playwright/test']")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Generate secrets and write .env
        run: |
          {
            echo "NODE_ENV=development"
            echo "POSTGRES_USER=postgres"
            echo "POSTGRES_PASSWORD=$(openssl rand -base64 32)"
            echo "POSTGRES_DB=adopt_dont_shop_dev"
            echo "JWT_SECRET=$(openssl rand -base64 32)"
            echo "JWT_REFRESH_SECRET=$(openssl rand -base64 32)"
            echo "SESSION_SECRET=$(openssl rand -base64 32)"
            echo "CSRF_SECRET=$(openssl rand -base64 32)"
            echo "ENCRYPTION_KEY=$(openssl rand -hex 32)"
            echo "CORS_ORIGIN=http://localhost:3000,http://localhost:3001,http://localhost:3002"
          } > .env

      - name: Start database and cache
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d database redis
          timeout 90 bash -c 'until docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T database pg_isready -U postgres; do sleep 2; done'

      - name: Build and start the full stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build service-backend app-client app-admin app-rescue

      - name: Wait for services
        run: |
          set -euo pipefail
          for url in http://localhost:5000/health http://localhost:3000 http://localhost:3001 http://localhost:3002; do
            echo "Waiting for $url"
            for i in $(seq 1 90); do
              if curl -fsS --max-time 5 "$url" >/dev/null 2>&1; then
                echo "  ready: $url"
                break
              fi
              if [ "$i" = "90" ]; then
                echo "  timeout: $url"
                docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
                docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=200
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run database migrations and seeds
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T service-backend npm run migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T service-backend npm run seed

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Capture docker-compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
            docker-compose.log
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
