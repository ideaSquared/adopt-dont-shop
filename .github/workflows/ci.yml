name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # CHANGE DETECTION — gate all downstream jobs on relevant path changes
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      libs: ${{ steps.filter.outputs.libs }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'service.backend/**'
              - 'lib.types/**'
              - 'lib.validation/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'eslint-config-base/**'
              - 'eslint-config-node/**'
            frontend:
              - 'app.client/**'
              - 'app.admin/**'
              - 'app.rescue/**'
              - 'lib.*/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'vite.shared.config.ts'
              - 'eslint-config-base/**'
              - 'eslint-config-react/**'
            libs:
              - 'lib.*/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'eslint-config-base/**'

  # ============================================================================
  # BACKEND — lint → test → build (tsc build doubles as type-check)
  # ============================================================================
  test-backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || format('{0}{1}{2}', github.run_id, github.run_number, github.run_attempt) }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.TEST_DB_PASSWORD }}
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate environment configuration
        run: npm run validate:env

      - name: Build shared libraries
        run: npm run build:libs

      - name: Lint
        run: npm run lint
        working-directory: service.backend

      - name: Test
        run: npm test
        working-directory: service.backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:${{ env.TEST_DB_PASSWORD }}@localhost:5432/test_db

      - name: Build (type-checks via tsc)
        run: npm run build
        working-directory: service.backend

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # FRONTEND APPS — one runner per app, fail-fast disabled so all three report
  # ============================================================================
  test-frontend:
    name: Frontend Tests (${{ matrix.app }})
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    strategy:
      fail-fast: false
      matrix:
        app: [app.client, app.admin, app.rescue]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build:libs

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.app }}

      - name: Test
        run: npm test
        working-directory: ${{ matrix.app }}

      - name: Type check
        run: npx turbo run type-check --filter='@adopt-dont-shop/${{ matrix.app }}'

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.app }}
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # SHARED LIBRARIES — all 21 lib.* packages tested via Turbo
  # Turbo resolves build order via dependsOn, so libs build in dependency order
  # ============================================================================
  test-libs:
    name: Library Tests
    needs: changes
    if: needs.changes.outputs.libs == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build, lint, test and type-check all libraries
        run: npx turbo run build lint test type-check --filter='@adopt-dont-shop/lib.*'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-libs
          path: '**/test-results/junit.xml'
          retention-days: 7
