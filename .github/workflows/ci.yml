name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    # `labeled` is included so adding the `run-e2e` label re-triggers CI and
    # opts the PR into the (otherwise skipped) Playwright E2E job. See test-e2e.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # WORKSPACE DRIFT — verify the pnpm workspace globs still resolve to the
  # filesystem layout. Catches the case where a package is added to the
  # workspaces array but the directory is missing (or vice-versa), which
  # silently breaks Docker image builds.
  # ============================================================================
  workspace-drift:
    name: Verify Workspace ↔ Filesystem Alignment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack (pnpm pinned by package.json "packageManager")
        run: corepack enable
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      - name: Verify workspace ↔ filesystem alignment
        run: |
          # Enumerate every workspace project pnpm-workspace.yaml resolves.
          # Fails if the manifest is malformed or any matched package.json is
          # invalid; the thorough alignment guard is check-workspace-consistency.
          pnpm ls -r --depth -1 >/dev/null

      # ADS-618: Only the root pnpm-lock.yaml is authoritative in a pnpm
      # workspaces setup. Per-package lockfiles drift silently and confuse
      # contributors — fail CI if any get committed.
      - name: Verify no per-package lockfiles exist
        run: |
          if find apps packages services -maxdepth 3 -name pnpm-lock.yaml | grep -q .; then
            echo "Per-package lockfiles found — only the root pnpm-lock.yaml is authoritative."
            find apps packages services -maxdepth 3 -name pnpm-lock.yaml
            exit 1
          fi

      # ADS-622: structural consistency guard — required scripts per workspace,
      # vitest.workspace.ts coverage, vite alias map coverage, nested lockfiles,
      # stale jest references, and (ADS-987) docker-compose.dev.yml's
      # x-dev-volumes anchor mounting node_modules for every current workspace.
      # See scripts/check-workspace-consistency.mjs.
      - name: Verify workspace consistency
        run: node scripts/check-workspace-consistency.mjs

      # ADS-767: workflow `paths:` filters must match the canonical source
      # in .github/workflow-source-paths.yml so adding a new top-level
      # workspace only requires editing one place.
      - name: Verify workflow path filters
        run: node scripts/check-workflow-paths.mjs

      # ADS-846: every third-party base image in the prod/staging compose
      # files must be pinned to an immutable digest (`tag@sha256:...`), not a
      # bare tag, so a deploy can't silently pull swapped bytes.
      - name: Verify prod/staging base images are digest-pinned
        run: node scripts/check-docker-pinning.mjs

      # ADS-847/ADS-958: no CSP in the repo's nginx configs may carry
      # 'unsafe-inline'/'unsafe-eval', and every prod SPA vhost at the edge
      # must declare its own CSP.
      - name: Verify CSP headers
        run: node scripts/check-csp-headers.mjs

      # ADS-984: these three drift guards previously only ran via `pnpm
      # ci:local`, so nothing in GitHub CI caught a required env var missing
      # from `.env.example`, a docs/*.md file not linked from docs/README.md,
      # or a doc referencing a renamed/removed pnpm script.
      - name: Verify .env.example documents all required vars
        run: node scripts/check-env-example.mjs

      - name: Verify every docs/*.md is linked from docs/README.md
        run: node scripts/check-docs-index.mjs

      - name: Verify docs reference only real pnpm scripts
        run: node scripts/check-docs-script-references.mjs

  # ============================================================================
  # CHANGE DETECTION — gate all downstream jobs on relevant path changes
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.backend }}
      frontend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.frontend }}
      libs: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.libs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'services/**'
              - 'packages/**'
              - 'pacts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'turbo.json'
            frontend:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'vite.shared.config.ts'
            libs:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'turbo.json'

  # ============================================================================
  # BUILD-LIBS — single source of truth for compiled lib.*/dist artifacts
  # All downstream jobs depend on this and download instead of rebuilding,
  # eliminating ~4× redundant builds per CI run.
  # ============================================================================
  build-libs:
    name: Build Shared Libraries
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.libs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      # ADS-947: surfaced as a CI-health signal on the coverage-report comment.
      lib-dist-cache-hit: ${{ steps.cache-lib-dist.outputs.cache-hit }}

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: ./.github/actions/checkout-and-setup
        with:
          download-lib-dist: 'false'

      # ADS-390: Cache compiled lib.*/dist across CI runs.
      # Key covers all lib source files, package manifests, tsconfig files and
      # the root lockfile. A cache hit skips the build:libs step entirely.
      - name: Restore lib dist cache
        id: cache-lib-dist
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: packages/lib.*/dist
          key: lib-dist-${{ runner.os }}-${{ hashFiles('packages/lib.*/src/**', 'packages/lib.*/package.json', 'packages/lib.*/tsconfig*.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            lib-dist-${{ runner.os }}-

      - name: Build shared libraries
        if: steps.cache-lib-dist.outputs.cache-hit != 'true'
        run: pnpm build:libs
      # ADS-909: downstream jobs restore this same actions/cache entry
      # (see .github/actions/checkout-and-setup) rather than downloading an
      # artifact from this job — no separate upload step needed.

  # FRONTEND APPS — one runner per app, fail-fast disabled so all three report
  # ============================================================================
  test-frontend:
    name: Frontend Tests (${{ matrix.app }})
    needs: [changes, build-libs]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    strategy:
      fail-fast: false
      matrix:
        app: [client, admin, rescue]

    steps:
      - uses: ./.github/actions/run-package-tests
        with:
          filter: '@adopt-dont-shop/app.${{ matrix.app }}'
          working-directory: 'apps/${{ matrix.app }}'
          run-build: 'true'
          upload-artifact-name: 'test-results-${{ matrix.app }}'
          coverage-cache-key: 'coverage-current-${{ github.run_id }}-${{ matrix.app }}'

  # ============================================================================
  # SHARED LIBRARIES — lint/test/type-check the libs themselves
  # The build job above produces dist/, so we don't repeat it here. Turbo's
  # cache will detect dist/ is up-to-date and short-circuit any rebuild
  # implicitly required by lint/test/type-check.
  # ============================================================================
  test-libs:
    name: Library Tests
    needs: [changes, build-libs]
    if: needs.changes.outputs.libs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: ./.github/actions/run-package-tests
        with:
          filter: '@adopt-dont-shop/lib.*'
          upload-artifact-name: 'test-results-libs'
          coverage-cache-key: 'coverage-current-${{ github.run_id }}-libs'

  # ============================================================================
  # SERVICE TESTS — lint/test:coverage/type-check all service.* packages
  # (ADS-822, coverage added in ADS-831). Mirrors test-libs in structure.
  #
  # ADS-831: COLLECTS coverage but does not yet GATE on it — no service
  # vitest.config.ts declares thresholds, so the floor is 0% (deliberate, so
  # this cannot break current CI). Next step: ratchet a per-service floor the
  # same way lib.* packages do (ADS-708 / ADS-717).
  #
  # Gated on the `backend` path filter — ci-required treats skipped as pass.
  # ============================================================================
  test-services:
    name: Service Tests
    needs: [changes, build-libs]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: ./.github/actions/run-package-tests
        with:
          filter: '@adopt-dont-shop/service.*'
          upload-artifact-name: 'test-results-services'
          coverage-cache-key: 'coverage-current-${{ github.run_id }}-services'

  # ============================================================================
  # CONTRACT TESTS — consumer-driven Pact verification matrix (ADS-816).
  #
  # Separate job from test-services: contract tests need a strict two-phase
  # order (consumers write pact files BEFORE providers read them), which
  # test-services' parallel-under-Turbo execution can't guarantee.
  #
  # Gated on the `backend` path filter (same as test-services) — ci-required
  # treats skipped as success.
  # ============================================================================
  test-contracts:
    name: Contract Tests (Pact)
    needs: [changes, build-libs]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      # Suppress Pact telemetry in CI.
      PACT_DO_NOT_TRACK: 'true'

    steps:
      - uses: ./.github/actions/checkout-and-setup

      # Phase 1 — consumers write pact files to pacts/
      - name: Contract tests — consumer phase
        run: |
          pnpm --filter @adopt-dont-shop/service.gateway test:contracts:consumer
          pnpm --filter @adopt-dont-shop/service.notifications test:contracts:consumer

      # Phase 2 — providers verify against the generated pact files
      - name: Contract tests — provider phase
        run: |
          pnpm --filter @adopt-dont-shop/service.auth test:contracts:provider
          pnpm --filter @adopt-dont-shop/service.applications test:contracts:provider
          pnpm --filter @adopt-dont-shop/service.gateway test:contracts:provider

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: pact-files
          path: pacts/
          retention-days: 7

  # ============================================================================
  # DEV-AUTH GUARD — ensure production frontend bundles never ship dev-auth
  # bypass code (ADS-676). Builds all three apps in production mode and scans
  # the output for patterns like DevLoginPanel, dev_user, dev-token-*, etc.
  # ============================================================================
  dev-auth-guard:
    name: Verify Dev Auth is Properly Gated
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: ./.github/actions/dev-auth-guard

  # ============================================================================
  # E2E — Playwright journeys against the full docker-compose stack
  # Behaviour-focused tests across app.client, app.rescue and app.admin.
  # Runs only after the unit/integration jobs succeed to gate the more
  # expensive browser job behind cheaper signals.
  # ============================================================================
  test-e2e:
    name: E2E Tests (Playwright)
    needs: [test-frontend, test-services]
    # E2E is opt-in on PRs (too slow to pay on every push): runs on push to
    # main, on a PR labelled `run-e2e`, or on workflow_dispatch. Otherwise
    # skipped — which `ci-required` treats as success.
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e'))
      ) &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (needs.test-services.result == 'success' || needs.test-services.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: true
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: ./.github/actions/e2e-suite

  # ============================================================================
  # COVERAGE REPORT — ADS-947: sticky PR comment with per-package coverage
  # delta vs main + this run's job timings. Purely informational: not in
  # ci-required's needs, and continue-on-error so a script/API hiccup (e.g.
  # a fork PR's read-only token) can never block merge.
  # ============================================================================
  coverage-report:
    name: Coverage & Timing Report
    needs: [build-libs, test-frontend, test-libs, test-services]
    if: |
      always() &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: ./.github/actions/coverage-report
        with:
          lib-dist-cache-hit: ${{ needs.build-libs.outputs.lib-dist-cache-hit }}

  # ============================================================================
  # CI REQUIRED — single aggregator gate for branch protection. Branch
  # protection references this one job name, so adding/renaming a job below
  # doesn't require touching the ruleset.
  #
  # Path-filtered jobs (test-frontend, test-libs, dev-auth-guard) and test-e2e
  # (opt-in via `run-e2e`) report `skipped` rather than `success` when they
  # don't run. Classic branch protection treats `skipped` as a failure, so
  # this aggregator only fails on `failure`/`cancelled` — the standard
  # "merge gate" pattern — treating `skipped` as success.
  # ============================================================================
  ci-required:
    name: CI Required
    if: always()
    needs:
      - workspace-drift
      - build-libs
      - test-frontend
      - test-libs
      - test-services
      - test-contracts
      - dev-auth-guard
      - test-e2e
    # ADS-792 + ADS-822: test-e2e re-added (suite reworked for post-monolith
    # gateway stack in bd64b1b/#1004); test-services added so zero-test
    # services no longer merge green.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs succeeded or skipped
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq .
          failed=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$failed" ]; then
            echo "::error::Required jobs failed or were cancelled:"
            echo "$failed"
            exit 1
          fi
          echo "All required jobs passed or were skipped (path filter)."
