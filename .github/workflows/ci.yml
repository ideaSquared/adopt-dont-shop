name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # WORKSPACE DRIFT — verify package.json workspaces matches filesystem lib.*
  # Catches the case where a lib is added to workspaces but the directory is
  # missing (or vice-versa), which silently breaks Docker image builds.
  # ============================================================================
  workspace-drift:
    name: Verify Workspace ↔ Filesystem Alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify workspace ↔ filesystem alignment
        run: |
          expected=$(node -p "require('./package.json').workspaces.filter(w => w.startsWith('lib.')).sort().join('\n')")
          actual=$(ls -d lib.* | sort)
          diff <(echo "$expected") <(echo "$actual") || (echo "Workspace drift!" && exit 1)

  # ============================================================================
  # CHANGE DETECTION — gate all downstream jobs on relevant path changes
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      libs: ${{ steps.filter.outputs.libs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.0
        id: filter
        with:
          filters: |
            backend:
              - 'service.backend/**'
              - 'lib.types/**'
              - 'lib.validation/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'eslint-config-base/**'
              - 'eslint-config-node/**'
            frontend:
              - 'app.client/**'
              - 'app.admin/**'
              - 'app.rescue/**'
              - 'lib.*/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'vite.shared.config.ts'
              - 'eslint-config-base/**'
              - 'eslint-config-react/**'
            libs:
              - 'lib.*/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'eslint-config-base/**'

  # ============================================================================
  # BUILD-LIBS — single source of truth for compiled lib.*/dist artifacts
  # All downstream jobs depend on this and download instead of rebuilding,
  # eliminating ~4× redundant builds per CI run.
  # ============================================================================
  build-libs:
    name: Build Shared Libraries
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.libs == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      # ADS-390: Cache compiled lib.*/dist across CI runs.
      # Key covers all lib source files, package manifests, tsconfig files and
      # the root lockfile. A cache hit skips the build:libs step entirely.
      - name: Restore lib dist cache
        id: cache-lib-dist
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: lib.*/dist
          key: lib-dist-${{ runner.os }}-${{ hashFiles('lib.*/src/**', 'lib.*/package.json', 'lib.*/tsconfig*.json', 'package-lock.json') }}
          restore-keys: |
            lib-dist-${{ runner.os }}-

      - name: Build shared libraries
        if: steps.cache-lib-dist.outputs.cache-hit != 'true'
        run: npm run build:libs

      # Bundle every lib.*/dist (and matching package.json) into a single artifact
      # that downstream jobs pick up via download-artifact. Wildcard expansion
      # is handled by upload-artifact's tar layer.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lib-dist
          path: |
            lib.*/dist/**
            lib.*/package.json
          retention-days: 1
          if-no-files-found: error

  # ============================================================================
  # BACKEND — lint → test → build (tsc build doubles as type-check)
  # ============================================================================
  test-backend:
    name: Backend Tests
    needs: [changes, build-libs]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || format('{0}{1}{2}', github.run_id, github.run_number, github.run_attempt) }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.TEST_DB_PASSWORD }}
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate environment configuration
        # `validate:env` (ADS-408) refuses placeholder secrets and demands
        # real lengths/distinctness — that's what we want pre-deploy. In CI
        # we don't have production secrets, so pass deterministic
        # test-grade values just for the validator step. These NEVER touch
        # the test suite below; vitest seeds its own fixtures.
        env:
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_chars_at_least_thirty_two_a
          JWT_REFRESH_SECRET: ci_jwt_refresh_secret_at_least_32_b
          SESSION_SECRET: ci_session_secret_at_least_thirty_two_c
          CSRF_SECRET: ci_csrf_secret_chars_at_least_thirty_two
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          TEST_DB_NAME: adopt_dont_shop_test
          DEV_DB_NAME: adopt_dont_shop_dev
          PROD_DB_NAME: adopt_dont_shop_prod
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379
          FRONTEND_URL: http://localhost:5173
          RESCUE_FRONTEND_URL: http://localhost:5174
          API_URL: http://localhost:5000
          STATSIG_SERVER_SECRET_KEY: secret-test-statsig-server-key
        run: npm run validate:env

      - name: Download pre-built libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: lib-dist

      - name: Lint
        run: npm run lint
        working-directory: service.backend

      # ADS-418: run with coverage so the thresholds in vitest.config.ts
      # block the build when behaviour coverage regresses.
      - name: Test (with coverage thresholds)
        run: npm run test:coverage
        working-directory: service.backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:${{ env.TEST_DB_PASSWORD }}@localhost:5432/test_db

      - name: Build (type-checks via tsc)
        run: npm run build
        working-directory: service.backend

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-backend
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # FRONTEND APPS — one runner per app, fail-fast disabled so all three report
  # ============================================================================
  test-frontend:
    name: Frontend Tests (${{ matrix.app }})
    needs: [changes, build-libs]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    strategy:
      fail-fast: false
      matrix:
        app: [app.client, app.admin, app.rescue]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Download pre-built libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: lib-dist

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.app }}

      - name: Test
        run: npm test
        working-directory: ${{ matrix.app }}

      - name: Type check
        run: npx turbo run type-check --filter='@adopt-dont-shop/${{ matrix.app }}'

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}
        env:
          CI: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-${{ matrix.app }}
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # SHARED LIBRARIES — lint/test/type-check the libs themselves
  # The build job above produces dist/, so we don't repeat it here. Turbo's
  # cache will detect dist/ is up-to-date and short-circuit any rebuild
  # implicitly required by lint/test/type-check.
  # ============================================================================
  test-libs:
    name: Library Tests
    needs: [changes, build-libs]
    if: needs.changes.outputs.libs == 'true'
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Download pre-built libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: lib-dist

      - name: Lint, test and type-check all libraries
        run: npx turbo run lint test type-check --filter='@adopt-dont-shop/lib.*'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-libs
          path: '**/test-results/junit.xml'
          retention-days: 7

  # ============================================================================
  # E2E — Playwright journeys against the full docker-compose stack
  # Behaviour-focused tests across app.client, app.rescue and app.admin.
  # Runs only after the unit/integration jobs succeed to gate the more
  # expensive browser job behind cheaper signals.
  # ============================================================================
  test-e2e:
    name: E2E Tests (Playwright)
    needs: [changes, test-backend, test-frontend]
    # ADS-419: e2e is now a blocking signal. The previous continue-on-error
    # escape hatch was removed because broken integration tests must fail PRs
    # — a green CI badge that ignores e2e failures gives a false sense of
    # readiness. After this lands, add `test-e2e` as a required status check
    # in branch protection.
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: true
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Install workspace dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./e2e/package.json').devDependencies['@playwright/test']")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Generate secrets and write .env
        run: |
          {
            echo "NODE_ENV=development"
            echo "POSTGRES_USER=postgres"
            echo "POSTGRES_PASSWORD=$(openssl rand -base64 32)"
            echo "POSTGRES_DB=adopt_dont_shop_dev"
            echo "JWT_SECRET=$(openssl rand -base64 32)"
            echo "JWT_REFRESH_SECRET=$(openssl rand -base64 32)"
            echo "SESSION_SECRET=$(openssl rand -base64 32)"
            echo "CSRF_SECRET=$(openssl rand -base64 32)"
            echo "ENCRYPTION_KEY=$(openssl rand -hex 32)"
            echo "CORS_ORIGIN=http://localhost:3000,http://localhost:3001,http://localhost:3002"
          } > .env

      - name: Start database and cache
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d database redis
          timeout 90 bash -c 'until docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T database pg_isready -U postgres; do sleep 2; done'

      - name: Build and start the full stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build service-backend app-client app-admin app-rescue

      - name: Wait for services
        run: |
          set -euo pipefail
          for url in http://localhost:5000/health http://localhost:3000 http://localhost:3001 http://localhost:3002; do
            echo "Waiting for $url"
            for i in $(seq 1 90); do
              if curl -fsS --max-time 5 "$url" >/dev/null 2>&1; then
                echo "  ready: $url"
                break
              fi
              if [ "$i" = "90" ]; then
                echo "  timeout: $url"
                docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
                docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=200
                exit 1
              fi
              sleep 2
            done
          done

      - name: Warm up Vite bundles
        # Vite dev servers compile on first request. Hit /login on each app
        # so the JS is built before Playwright tries to interact with it.
        run: |
          for url in \
            http://localhost:3000/login \
            http://localhost:3001/login \
            http://localhost:3002/login; do
            echo "Warming $url"
            curl -fsS --max-time 60 "$url" >/dev/null || true
          done

      - name: Run Playwright suite
        # The backend bootstraps the database (sync + runAllSeeders) on
        # startup in development mode, so by the time /health responds in
        # the previous step the seeded data is already available.
        # Retries are configured in e2e/playwright.config.ts (retries: CI ? 2 : 0).
        run: npm run test:e2e

      # ADS-386: Surface flaky-retry signal so engineers can see which tests
      # needed retries without having to open the full HTML report.
      # This step never blocks CI — it is informational only.
      - name: Report E2E retry counts
        if: always()
        run: |
          report_dir="e2e/test-results"
          if [ ! -d "$report_dir" ]; then
            echo "No test-results directory found — Playwright may not have run."
            exit 0
          fi
          retried=$(find "$report_dir" -name '*.json' -exec grep -l '"retry":[^0]' {} \; 2>/dev/null | wc -l)
          if [ "$retried" -gt 0 ]; then
            echo "::warning::$retried test result file(s) contain retries — check the Playwright report artifact for details."
          else
            echo "No retried tests detected in this run."
          fi

      - name: Capture docker-compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose.log

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: e2e-playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
            docker-compose.log
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
