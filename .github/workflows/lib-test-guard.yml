name: Lib Test Guard

# Fail when any lib.* package has zero test files. This is the safety net
# behind ADS-186 / ADS-328 — `--passWithNoTests` was previously hiding whole
# packages with no behaviour tests. The script lives at scripts/check-lib-tests.mjs
# and maintains an explicit allowlist for packages that are still being
# back-filled.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-lib-tests:
    name: Verify every lib.* package has tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Run lib-tests guard
        run: node scripts/check-lib-tests.mjs
