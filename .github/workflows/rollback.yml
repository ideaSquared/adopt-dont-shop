name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      sha:
        description: 'Git SHA to roll back to (must already exist in GHCR)'
        required: true
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      # ADS-670: pin SSH host fingerprint to prevent MitM.
      # ADS-671: GHCR_TOKEN and SHA passed via envs (not interpolated into script).
      # SHA is validated server-side to prevent shell injection.
      - name: Rollback on server
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ROLLBACK_SHA: ${{ github.event.inputs.sha }}
          ROLLBACK_ENV: ${{ github.event.inputs.environment }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_HOST_FINGERPRINT }}
          envs: GHCR_TOKEN,ROLLBACK_SHA,ROLLBACK_ENV
          script: |
            set -euo pipefail
            # Validate SHA before use to prevent shell injection.
            if ! [[ "$ROLLBACK_SHA" =~ ^[0-9a-f]{7,40}$ ]]; then
              echo "Invalid SHA: must be 7-40 lowercase hex characters"
              exit 1
            fi
            ENV="$ROLLBACK_ENV"
            SHA="$ROLLBACK_SHA"
            IMAGE_PREFIX="ghcr.io/ideasquared/adopt-dont-shop"

            cd /opt/ads/$ENV

            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u ideasquared --password-stdin

            docker pull $IMAGE_PREFIX/backend:$SHA
            docker pull $IMAGE_PREFIX/app-client:$SHA
            docker pull $IMAGE_PREFIX/app-admin:$SHA
            docker pull $IMAGE_PREFIX/app-rescue:$SHA

            # Update SHA in .env
            sed -i "s/^DEPLOY_SHA=.*/DEPLOY_SHA=$SHA/" .env || echo "DEPLOY_SHA=$SHA" >> .env

            if [ "$ENV" = "production" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
            else
              COMPOSE_FILE="docker-compose.staging.yml"
            fi

            docker compose -f $COMPOSE_FILE --env-file .env up -d

            # Wait for backend health
            for i in $(seq 1 30); do
              if docker compose -f $COMPOSE_FILE exec -T service-backend wget -q --spider http://localhost:5000/health/simple > /dev/null 2>&1; then
                echo "Backend healthy after rollback."
                break
              fi
              if [ $i -eq 30 ]; then
                echo "WARNING: Backend not healthy after rollback"
                exit 1
              fi
              sleep 2
            done

            echo "$SHA" > .last_sha
            echo "Rolled back $ENV to $SHA."
