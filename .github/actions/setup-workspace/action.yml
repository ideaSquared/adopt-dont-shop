name: 'Setup Workspace'
description: 'Install Node + pnpm (via Corepack), cache the pnpm store and install workspace dependencies'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version-file: '.nvmrc'
    - name: Enable Corepack (pnpm version pinned by package.json "packageManager")
      shell: bash
      env:
        COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      run: |
        corepack enable
        corepack prepare --activate
    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - name: Cache pnpm store
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-
    # ADS-901: the pnpm STORE cache above only avoids re-downloading tarballs —
    # `pnpm install` still has to relink every workspace node_modules tree on
    # every (ephemeral) runner, which dominates the ~15-20s cost regardless of
    # a store hit. Caching node_modules itself, keyed on the same lockfile
    # hash, lets an unchanged-lockfile run skip the install step entirely.
    #
    # ADS-983: this path list must cover every top-level workspace glob in
    # ../../../pnpm-workspace.yaml (apps/*, packages/*, services/*, e2e) — on
    # a cache hit the install step below is skipped entirely, so a workspace
    # missing here gets no node_modules at all. e2e was missing until
    # ADS-983; if pnpm-workspace.yaml grows a new top-level workspace, add its
    # node_modules path here too.
    - name: Cache workspace node_modules
      id: node-modules-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: |
          node_modules
          apps/*/node_modules
          services/*/node_modules
          packages/*/node_modules
          e2e/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
    - name: Install workspace dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
