name: Feature request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion!
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what opportunity does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - app.client
        - app.admin
        - app.rescue
        - service.backend
        - lib (shared library)
        - Infrastructure / Docker
        - Developer experience
        - Other
    validations:
      required: true
