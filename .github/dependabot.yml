version: 2
updates:
  # npm workspace — covers all packages via root lockfile.
  # Patch + minor updates surface here so security fixes that ship as
  # patch releases are caught automatically. Major bumps still raise
  # individual PRs; minor/patch are grouped to keep PR volume manageable. [ADS-499]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 15
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - patch
          - minor
      development-minor-patch:
        dependency-type: development
        update-types:
          - patch
          - minor
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      jest:
        patterns:
          - "jest"
          - "ts-jest"
          - "@types/jest"
          - "jest-environment-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
          - "jsdom"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      turbo:
        patterns:
          - "turbo"

  # GitHub Actions — keep workflow actions current; patch + minor allowed.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - patch
          - minor

  # Docker — backend
  - package-ecosystem: docker
    directory: /service.backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # Docker — frontend app Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
