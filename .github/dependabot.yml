version: 2
updates:
  # npm workspace — covers all packages via root lockfile
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      jest:
        patterns:
          - "jest"
          - "ts-jest"
          - "@types/jest"
          - "jest-environment-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
          - "jsdom"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      turbo:
        patterns:
          - "turbo"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 5

  # Docker — backend
  - package-ecosystem: docker
    directory: /service.backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # Docker — frontend app Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
