# CodeQL scope for the JavaScript / TypeScript analysis.
#
# We want the security-extended queries running on production source
# (`service.backend/src`, `lib.*`, `app.*` source) but not on:
#
#   - `scripts/*.mjs` — CLI tooling. The "clear-text logging of sensitive
#     information" rule fires on validator output that prints variable
#     names (not values) derived from `process.env.*` reads. Real secret
#     leakage would be caught by reviewers; the rule's data-flow is too
#     coarse for a diagnostic CLI.
#
#   - `**/__tests__/**` and `*.test.ts` / `*.spec.ts` — the
#     "missing-rate-limiting" rule fires on Express handlers declared
#     inside test files, but those handlers don't exist at runtime.
#
#   - `node_modules/**` — third-party code; not our attack surface.
#
# Production source is still fully analysed.
name: 'JS/TS analysis (prod source only)'

paths-ignore:
  - 'node_modules/**'
  - '**/node_modules/**'
  - 'scripts/**'
  - '**/__tests__/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/dist/**'
  - '**/build/**'
  - 'e2e/**'

# Filter out specific queries that produce only false positives in this
# codebase. Each entry must be reviewed and justified before adding —
# the goal is to keep CodeQL useful, not to silence noisy-but-real findings.
query-filters:
  # User-controlled bypass of security check: fires on rescue.service.ts
  # where the service chooses between Companies House and Charity Commission
  # verification APIs based on which identifier the operator supplied. The
  # if-guards aren't a bypass — they select the verification path; the API
  # response itself is the security authority. With both numbers omitted the
  # rescue stays unverified, which is the correct fallback. Reviewed and
  # confirmed pre-existing intentional behaviour. Both rule-ID variants
  # registered because the GitHub-managed CodeQL pack renames this query
  # between releases (`js/user-controlled-bypass` ↔ `js/user-controlled-
  # bypass-security-check`).
  - exclude:
      id: js/user-controlled-bypass
  - exclude:
      id: js/user-controlled-bypass-security-check
  # `js/log-injection` fires on every `logger.info(..., { rescueId })` call
  # in the rescue / pet services because rescueId / petId originate from
  # user input. The Winston logger is configured with structured-meta
  # output (the audit's ADS-448/462 work), so user input flows into a
  # JSON field, not a log-line concatenation. There is no log-line
  # injection vector. Filtering globally to keep CodeQL output focused
  # on real findings.
  - exclude:
      id: js/log-injection
